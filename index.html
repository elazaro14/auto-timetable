<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TT-PRO Admin System</title>

<style>
:root {
  --primary:#0f172a;
  --secondary:#1e293b;
  --accent:#22c55e;
  --bg:#f1f5f9;
}

body { margin:0; font-family:Segoe UI; display:flex; }

.sidebar {
  width:220px; background:var(--secondary); color:white; padding:15px;
}
.sidebar button {
  width:100%; margin:5px 0; padding:10px;
  background:#334155; color:white; border:none; border-radius:6px;
  cursor:pointer;
}

.main { flex:1; padding:20px; background:var(--bg); }

.card {
  background:white; padding:15px; border-radius:10px;
  margin-bottom:15px;
}

table { width:100%; border-collapse:collapse; }
th,td { border:1px solid #ccc; padding:6px; text-align:center; }

.slot {
  padding:5px; border-radius:6px; cursor:grab;
}
</style>
</head>

<body>

<div class="sidebar">
<h3>TT-PRO</h3>

<button onclick="renderDashboard()">📊 Dashboard</button>
<button onclick="renderRegistry()">🗂 Registry</button>
<button onclick="generate()">⚙️ Generate</button>

<hr>

<button onclick="renderTeachers()">👨‍🏫 Teachers</button>
<button onclick="renderClasses()">🏫 Classes</button>
<button onclick="renderSubjects()">📚 Subjects</button>
<button onclick="renderRooms()">🚪 Rooms</button>

<hr>

<button onclick="saveData()">💾 Save</button>
<input type="file" onchange="loadData(event)">
</div>

<div class="main">
<div id="app"></div>
</div>

<script>
let DATA=[];
let REGISTRY=[];
let TEACHERS=[];
let CLASSES=[];
let SUBJECTS=[];
let ROOMS=[];

const DAYS=["MON","TUE","WED","THU","FRI"];
const PERIODS=["P1","P2","P3","P4","P5","P6","P7"];

let dragIndex=null;

/* DASHBOARD */
function renderDashboard(){
let conflicts=0;
DATA.forEach((a,i)=>{
 DATA.forEach((b,j)=>{
  if(i!==j && a.d===b.d && a.p===b.p){
   if(a.tea===b.tea||a.frm===b.frm) conflicts++;
  }
 });
});

let html=`
<div class="card">
<h2>Dashboard</h2>
<p>Teachers: ${TEACHERS.length}</p>
<p>Classes: ${CLASSES.length}</p>
<p>Subjects: ${SUBJECTS.length}</p>
<p>Total Slots: ${DATA.length}</p>
<p>Conflicts: ${conflicts}</p>
</div>`;
document.getElementById("app").innerHTML=html;
}

/* TEACHERS */
function renderTeachers(){
let h=`<div class="card"><h2>Teachers</h2>
<button onclick="addTeacher()">+ Add</button><table>`;
TEACHERS.forEach((t,i)=>{
h+=`<tr><td>${t}</td><td><button onclick="TEACHERS.splice(${i},1);renderTeachers()">❌</button></td></tr>`;
});
h+="</table></div>";
app.innerHTML=h;
}
function addTeacher(){
let n=prompt("Name"); if(n) TEACHERS.push(n.toUpperCase());
renderTeachers();
}

/* CLASSES */
function renderClasses(){
let h=`<div class="card"><h2>Classes</h2>
<button onclick="addClass()">+ Add</button><table>`;
CLASSES.forEach((c,i)=>{
h+=`<tr><td>${c}</td><td><button onclick="CLASSES.splice(${i},1);renderClasses()">❌</button></td></tr>`;
});
h+="</table></div>";
app.innerHTML=h;
}
function addClass(){
let n=prompt("Class"); if(n) CLASSES.push(n.toUpperCase());
renderClasses();
}

/* SUBJECTS */
function renderSubjects(){
let h=`<div class="card"><h2>Subjects</h2>
<button onclick="addSubject()">+ Add</button><table>`;
SUBJECTS.forEach((s,i)=>{
h+=`<tr><td>${s}</td><td><button onclick="SUBJECTS.splice(${i},1);renderSubjects()">❌</button></td></tr>`;
});
h+="</table></div>";
app.innerHTML=h;
}
function addSubject(){
let n=prompt("Subject"); if(n) SUBJECTS.push(n.toUpperCase());
renderSubjects();
}

/* ROOMS */
function renderRooms(){
let h=`<div class="card"><h2>Rooms</h2>
<button onclick="addRoom()">+ Add</button><table>`;
ROOMS.forEach((r,i)=>{
h+=`<tr><td>${r}</td><td><button onclick="ROOMS.splice(${i},1);renderRooms()">❌</button></td></tr>`;
});
h+="</table></div>";
app.innerHTML=h;
}
function addRoom(){
let n=prompt("Room"); if(n) ROOMS.push(n.toUpperCase());
renderRooms();
}

/* REGISTRY */
function renderRegistry(){
let h=`<div class="card"><h2>Registry</h2>
<button onclick="addReg()">+ Add</button><table>
<tr><th>Sub</th><th>Teacher</th><th>Class</th><th>Periods</th></tr>`;

REGISTRY.forEach((r,i)=>{
h+=`<tr>
<td>${r.sub}</td>
<td>${r.tea}</td>
<td>${r.frm}</td>
<td>${r.pwk}</td>
</tr>`;
});

h+="</table></div>";
app.innerHTML=h;
}

function addReg(){
let sub=prompt("Subject");
let tea=prompt("Teacher");
let frm=prompt("Class");
let p=parseInt(prompt("Periods"));
if(sub&&tea&&frm) REGISTRY.push({sub,tea,frm,pwk:p});
renderRegistry();
}

/* GENERATE */
function generate(){
DATA=[];
REGISTRY.forEach(r=>{
let left=r.pwk;
DAYS.forEach(d=>{
PERIODS.forEach(p=>{
if(left>0 && !busy(d,p,r)){
DATA.push({...r,d,p});
left--;
}
});
});
});
renderTable();
}

function busy(d,p,r){
return DATA.some(x=>x.d===d&&x.p===p&&(x.tea===r.tea||x.frm===r.frm));
}

/* TABLE */
function renderTable(){
let h="";
CLASSES.forEach(f=>{
h+=`<div class="card"><h3>${f}</h3><table><tr><th>Day</th>`;
PERIODS.forEach(p=>h+=`<th>${p}</th>`);
h+="</tr>";

DAYS.forEach(d=>{
h+=`<tr><td>${d}</td>`;
PERIODS.forEach(p=>{
let idx=DATA.findIndex(x=>x.d===d&&x.p===p&&x.frm===f);
let m=DATA[idx];
h+=`<td ondrop="drop(event,'${d}','${p}','${f}')" ondragover="event.preventDefault()">`;
if(m){
h+=`<div class="slot" draggable="true"
ondragstart="drag(${idx})"
style="background:#bbf7d0">
${m.sub}<br>${m.tea}
</div>`;
}
h+="</td>";
});
h+="</tr>";
});
h+="</table></div>";
});
app.innerHTML=h;
}

/* DRAG */
function drag(i){ dragIndex=i; }

function drop(e,d,p,f){
let item=DATA[dragIndex];
item.d=d; item.p=p; item.frm=f;
renderTable();
}

/* SAVE */
function saveData(){
let blob=new Blob([JSON.stringify({
DATA,REGISTRY,TEACHERS,CLASSES,SUBJECTS,ROOMS
})]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="ttpro.json";
a.click();
}

/* LOAD */
function loadData(e){
let reader=new FileReader();
reader.onload=(ev)=>{
let d=JSON.parse(ev.target.result);
DATA=d.DATA||[];
REGISTRY=d.REGISTRY||[];
TEACHERS=d.TEACHERS||[];
CLASSES=d.CLASSES||[];
SUBJECTS=d.SUBJECTS||[];
ROOMS=d.ROOMS||[];
renderDashboard();
};
reader.readAsText(e.target.files[0]);
}

/* INIT */
renderDashboard();
</script>

</body>
</html>
