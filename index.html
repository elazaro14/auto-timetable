<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TT-PRO Enterprise - Strict Priority Double</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root {
  --primary:#0f172a; --secondary:#1e293b; --accent:#22c55e;
  --sidebar-gradient: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
  --bg:#f8fafc; --border:#e2e8f0; --text:#334155; --danger:#ef4444; --warning:#f59e0b; --whatsapp:#25d366; --pdf:#e11d48;
}
body { margin:0; font-family:'Inter', system-ui, sans-serif; display:flex; height: 100vh; background:var(--bg); overflow:hidden; }

#lockScreen { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.98); color:white; z-index:9999; flex-direction:column; align-items:center; justify-content:center; text-align:center; }

.sidebar { 
    width:340px; background: var(--sidebar-gradient); color:white; padding:20px; 
    display: flex; flex-direction: column; gap: 10px; overflow-y: auto;
    box-shadow: 4px 0 15px rgba(0,0,0,0.3); z-index:10;
    border-right: 1px solid #334155;
}
.sidebar h2 { color: var(--accent); font-size: 1.1rem; text-align: center; border-bottom: 1px solid #334155; padding-bottom: 15px; margin:0; letter-spacing: 1px; }

.setting-card { background: rgba(30, 41, 59, 0.5); padding: 12px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 5px; }
.setting-card label { display: block; font-size: 10px; text-transform: uppercase; color: #94a3b8; margin-bottom: 4px; font-weight: 700; }
.setting-card input, .setting-card select { 
    width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 13px; box-sizing: border-box; margin-bottom: 5px;
}

.nav-label { font-size: 11px; color: #38bdf8; font-weight: 800; margin-top: 10px; border-left: 3px solid var(--accent); padding-left: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

.btn { width: 100%; padding: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; font-size: 12px; transition: 0.2s; display: flex; align-items: center; gap: 8px; justify-content: center; margin-top: 5px;}
.btn-gen { background: var(--accent); color: #064e3b; box-shadow: 0 4px 0 #15803d; }
.btn-gen:active { transform: translateY(2px); box-shadow: 0 2px 0 #15803d; }
.btn-sec { background: #475569; color: white; }
.btn-pdf { background: var(--pdf); color: white; }

.main { flex:1; display: flex; flex-direction: column; overflow: hidden; }
.top-bar { background: white; padding: 10px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.tab-group { display: flex; gap: 5px; }
.tab-group button { padding: 8px 15px; border: 1px solid var(--border); background: white; cursor: pointer; font-size: 12px; border-radius: 4px; font-weight: 600; }
.tab-group button.active { background: var(--primary); color: white; border-color: var(--primary); }

.content { flex:1; padding: 20px; overflow-y: auto; }
#printableArea { background: white; }
.table-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

table { width: 100%; border-collapse: collapse; border: 2px solid #000; table-layout: fixed; }
th, td { border: 1px solid #000; padding: 4px; text-align: center; font-size: 9px; height: 45px; }
th { background: #f1f5f9; }

.slot { padding: 2px; border-radius: 4px; font-weight: 700; background: #dcfce7; border: 1px solid #22c55e; line-height: 1.1; }
.break-cell { background: #cbd5e1; font-weight: bold; width: 30px; writing-mode: vertical-rl; text-orientation: mixed; font-size: 9px; }
.time-hdr { display: block; font-size: 7px; color: #64748b; font-weight: 500; }

@media print { 
    .sidebar, .top-bar { display: none !important; } 
    body { height: auto; overflow: visible; }
    .main { height: auto; overflow: visible; }
    .content { overflow: visible; }
}
</style>
</head>
<body>

<div id="lockScreen"><h1>LICENSE EXPIRED</h1></div>

<div class="sidebar">
    <h2>TT-PRO COMMAND</h2>
    <div class="setting-card">
        <label>School Name</label>
        <input type="text" id="schName" value="TANZANIA SECONDARY SCHOOL" oninput="renderActiveView()">
        <label>Academic Year</label>
        <input type="text" id="acadYear" value="2026" oninput="renderActiveView()">
    </div>

    <div class="nav-label">Scheduling Rules</div>
    <div class="setting-card">
        <label>Double Periods</label>
        <select id="optDouble"><option value="yes">YES (Priority)</option><option value="no">NO</option></select>
    </div>

    <div class="nav-label">Special Blocks</div>
    <div class="setting-card">
        <label>Religion (Day & P#)</label>
        <div style="display:flex; gap:2px;">
            <select id="relDay"><option>WEDNESDAY</option><option>FRIDAY</option></select>
            <input type="text" id="relPeriods" value="8,9">
        </div>
    </div>

    <div class="nav-label">Intervals</div>
    <div class="setting-card">
        <div style="display:flex; gap:5px;">
            <div><label>Break After</label><input type="number" id="brkAfter" value="2"></div>
            <div><label>Lunch After</label><input type="number" id="lchAfter" value="4"></div>
        </div>
    </div>

    <div class="nav-label">Actions</div>
    <button class="btn btn-gen" onclick="generate()">⚡ GENERATE TIMETABLE</button>
    <button class="btn btn-sec" onclick="document.getElementById('csvIn').click()">📥 IMPORT CSV</button>
    <input type="file" id="csvIn" style="display:none" accept=".csv" onchange="handleCSV(event)">
    <button class="btn btn-pdf" onclick="exportPDF()">📄 SAVE PDF</button>
    <button class="btn btn-sec" onclick="saveProject()">💾 EXPORT JSON</button>
</div>

<div class="main">
    <div class="top-bar">
        <div class="tab-group">
            <button id="tab-GENERAL" class="active" onclick="setView('GENERAL')">Master View</button>
            <button id="tab-STREAM" onclick="setView('STREAM')">Stream View</button>
            <button id="tab-TEACHER" onclick="setView('TEACHER')">Teacher View</button>
        </div>
        <select id="viewFilter" onchange="renderActiveView()" style="display:none; padding:5px;"></select>
    </div>

    <div class="content">
        <div id="printableArea">
            <div id="header" style="text-align:center; margin-bottom:15px;">
                <h1 id="headerTitle">TANZANIA SECONDARY SCHOOL</h1>
                <h4 id="headerYear">ACADEMIC YEAR: 2026</h4>
            </div>
            <div id="app"></div>
        </div>
    </div>
</div>

<script>
let DATA = [], REGISTRY = [], CLASSES = [], TEACHERS = [], SLOTS = [], currentView = 'GENERAL';
const DAYS = ["MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY"];

// Initialization
window.onload = () => {
    const saved = localStorage.getItem('TT_PERSIST');
    if(saved) {
        const p = JSON.parse(saved);
        DATA = p.DATA || []; REGISTRY = p.REGISTRY || []; 
        CLASSES = p.CLASSES || []; TEACHERS = p.TEACHERS || [];
        renderActiveView();
    }
};

function buildSlots() {
    SLOTS = [];
    let cur = new Date("2026-01-01T08:00");
    let brkPos = parseInt(document.getElementById('brkAfter').value);
    let lchPos = parseInt(document.getElementById('lchAfter').value);

    for(let i=1; i<=9; i++) {
        let sTime = cur.toTimeString().slice(0,5);
        cur.setMinutes(cur.getMinutes() + 40);
        SLOTS.push({ id: 'P'+i, time: `${sTime}-${cur.toTimeString().slice(0,5)}`, type: 'period', index: i });
        
        if(i === brkPos) {
            let bs = cur.toTimeString().slice(0,5);
            cur.setMinutes(cur.getMinutes() + 20);
            SLOTS.push({ id: 'BRK', time: `${bs}-${cur.toTimeString().slice(0,5)}`, type: 'break' });
        }
        if(i === lchPos) {
            let ls = cur.toTimeString().slice(0,5);
            cur.setMinutes(cur.getMinutes() + 45);
            SLOTS.push({ id: 'LCH', time: `${ls}-${cur.toTimeString().slice(0,5)}`, type: 'lunch' });
        }
    }
}

function isSpecial(day, pId) {
    const pNum = pId.replace('P','');
    const relD = document.getElementById('relDay').value;
    const relP = document.getElementById('relPeriods').value.split(',');
    if(day === relD && relP.includes(pNum)) return {bool: true, name: "SPECIAL"};
    return {bool: false};
}

function generate() {
    if (REGISTRY.length === 0) return alert("Please import CSV first!");
    
    DATA = []; buildSlots();
    const useDouble = document.getElementById('optDouble').value === 'yes';
    
    // Sort registry: prioritize teachers with most periods
    let pool = [...REGISTRY].sort((a,b) => b.pwk - a.pwk);

    pool.forEach(r => {
        let periodsLeft = r.pwk;
        let shuffledDays = [...DAYS].sort(() => Math.random() - 0.5);

        for (let d of shuffledDays) {
            if (periodsLeft <= 0) break;
            
            let pSlots = SLOTS.filter(s => s.type === 'period');
            let placedToday = false;

            // 1. Try Double Period Priority
            if (useDouble && periodsLeft >= 2) {
                for (let i = 0; i < pSlots.length - 1; i++) {
                    let s1 = pSlots[i], s2 = pSlots[i+1];
                    let collision = DATA.some(x => x.d===d && (x.p===s1.id || x.p===s2.id) && (x.tea===r.tea || x.frm===r.frm));
                    
                    if (!collision && !isSpecial(d, s1.id).bool && !isSpecial(d, s2.id).bool && (s1.index+1 === s2.index)) {
                        DATA.push({...r, d, p: s1.id}, {...r, d, p: s2.id});
                        periodsLeft -= 2; placedToday = true; break;
                    }
                }
            }

            // 2. Try Single Period if no double placed
            if (!placedToday && periodsLeft > 0) {
                let randSlots = pSlots.sort(() => Math.random() - 0.5);
                for (let s of randSlots) {
                    let collision = DATA.some(x => x.d===d && x.p===s.id && (x.tea===r.tea || x.frm===r.frm));
                    if (!collision && !isSpecial(d, s.id).bool) {
                        DATA.push({...r, d, p: s.id});
                        periodsLeft--; break;
                    }
                }
            }
        }
    });
    saveToLocal();
    renderActiveView();
}

function handleCSV(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const lines = ev.target.result.split('\n').filter(l => l.trim() !== "");
        REGISTRY = []; CLASSES = []; TEACHERS = [];
        lines.slice(1).forEach(line => {
            const [sub, tea, pwk, frm] = line.split(',').map(c => c.trim().toUpperCase());
            if(sub && tea && pwk && frm) {
                REGISTRY.push({ sub, tea, pwk: parseInt(pwk), frm });
                if(!CLASSES.includes(frm)) CLASSES.push(frm);
                if(!TEACHERS.includes(tea)) TEACHERS.push(tea);
            }
        });
        alert("Data Loaded: " + REGISTRY.length + " entries.");
    };
    reader.readAsText(e.target.files[0]);
}

function setView(v) {
    currentView = v;
    document.querySelectorAll('.tab-group button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-'+v).classList.add('active');
    let fil = document.getElementById('viewFilter');
    fil.style.display = (v === 'GENERAL') ? 'none' : 'inline-block';
    
    if(v === 'STREAM') { 
        fil.innerHTML = CLASSES.sort().map(c => `<option value="${c}">${c}</option>`).join('');
    } else if(v === 'TEACHER') {
        fil.innerHTML = TEACHERS.sort().map(t => `<option value="${t}">${t}</option>`).join('');
    }
    renderActiveView();
}

function renderActiveView() {
    document.getElementById('headerTitle').innerText = document.getElementById('schName').value;
    buildSlots();
    let h = "";
    const filterVal = document.getElementById('viewFilter').value;

    if(currentView === 'GENERAL') {
        DAYS.forEach(day => {
            h += `<div class="table-card"><h3>${day}</h3><table><tr><th>Form</th>`;
            SLOTS.forEach(s => h += `<th>${s.id}<span class="time-hdr">${s.time}</span></th>`);
            h += `</tr>`;
            CLASSES.sort().forEach(f => {
                h += `<tr><td><b>${f}</b></td>`;
                SLOTS.forEach(s => {
                    if(s.type !== 'period') h += `<td class="break-cell">${s.id}</td>`;
                    else {
                        let m = DATA.find(x => x.d===day && x.p===s.id && x.frm===f);
                        h += `<td>${m ? `<div class="slot">${m.sub}<br>${m.tea}</div>` : ''}</td>`;
                    }
                });
                h += `</tr>`;
            });
            h += `</table></div>`;
        });
    } else {
        const key = currentView === 'STREAM' ? 'frm' : 'tea';
        h += `<div class="table-card"><h3>${filterVal} Timetable</h3><table><tr><th>Day</th>`;
        SLOTS.forEach(s => h += `<th>${s.id}</th>`);
        h += `</tr>`;
        DAYS.forEach(d => {
            h += `<tr><td><b>${d}</b></td>`;
            SLOTS.forEach(s => {
                if(s.type !== 'period') h += `<td class="break-cell">${s.id}</td>`;
                else {
                    let m = DATA.find(x => x.d===d && x.p===s.id && x[key]===filterVal);
                    h += `<td>${m ? `<div class="slot">${currentView==='TEACHER'?m.frm:m.sub}</div>` : ''}</td>`;
                }
            });
            h += `</tr>`;
        });
        h += `</table></div>`;
    }
    document.getElementById('app').innerHTML = h;
}

function saveToLocal() {
    localStorage.setItem('TT_PERSIST', JSON.stringify({ DATA, REGISTRY, CLASSES, TEACHERS }));
}

function exportPDF() {
    const opt = { margin: 5, filename: 'Timetable.pdf', jsPDF: { orientation: 'landscape' } };
    html2pdf().set(opt).from(document.getElementById('printableArea')).save();
}

function saveProject() {
    const blob = new Blob([JSON.stringify({DATA, REGISTRY, CLASSES, TEACHERS})], {type:"application/json"});
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "TT_Backup.json"; a.click();
}
</script>
</body>
</html>
