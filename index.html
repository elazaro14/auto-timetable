<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TT-PRO Diamond | Advanced Master System</title>
    <style>
        :root { --row-height: 45px; --font-size: 11px; --cell-padding: 5px; --primary: #2c3e50; --accent: #28a745; }
        body { font-family: Arial, sans-serif; background: #f8f9fa; margin: 0; padding: 10px; }
        .container { max-width: 1450px; margin: 0 auto; }
        .panel { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        
        .print-header { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 10px; }
        .header-text { text-align: center; }
        .header-text h1 { margin: 0; font-size: 22px; text-transform: uppercase; }

        table { width: 100%; border-collapse: collapse; background: white; table-layout: fixed; margin-bottom: 25px; border: 1px solid #444; }
        th, td { border: 1px solid #444; padding: var(--cell-padding); text-align: center; font-size: var(--font-size); height: var(--row-height); overflow: hidden; }
        th { background: var(--primary); color: white; }
        
        .day-title { background: #34495e; color: white; padding: 8px; font-size: 16px; text-align: center; margin: 15px 0 5px; border-radius: 4px; }
        .break-cell { background: #f1f3f5; font-weight: bold; color: #777; width: 25px !important; font-size: 8px; writing-mode: vertical-rl; text-orientation: mixed; }
        .unavailable-block { background: #ffcdd2; color: #b71c1c; font-weight: bold; font-size: 9px; }
        
        .controls { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; }
        .view-bar { background: #e9ecef; padding: 12px; border-radius: 6px; display: none; text-align: center; margin-bottom: 10px; }
        .avail-panel { background: #fdfdfe; border: 1px dashed #ccc; padding: 10px; margin: 10px 0; display: none; }
        
        button, select { padding: 8px 12px; border-radius: 4px; border: 1px solid #ccc; cursor: pointer; font-weight: bold; }
        .btn-gen { background: var(--accent); color: white; border: none; }

        @media print { 
            .panel, .view-bar, .avail-panel, .no-print { display: none !important; } 
            body { background: white; padding: 0; }
            .day-section { page-break-after: always; }
        }
    </style>
</head>
<body>

<div class="panel container no-print">
    <div class="header-text" style="margin-bottom: 20px;">
        <h1>TT-PRO Diamond Edition 2026</h1>
    </div>

    <div class="controls">
        <input type="file" id="ttproFile" accept=".ttpro" hidden onchange="loadProject(event)">
        <button onclick="document.getElementById('ttproFile').click()" style="background:#007bff; color:white;">📂 Load .ttpro</button>
        
        <input type="file" id="csvFile" accept=".csv" hidden onchange="loadCSV(event)">
        <button onclick="document.getElementById('csvFile').click()" style="background:#17a2b8; color:white;">📥 Upload CSV</button>
        
        <button onclick="toggleAvail()" style="background:#6c757d; color:white;">Set Teacher Off-Times</button>
        <button class="btn-gen" onclick="generate()">🚀 Generate Timetable</button>
        <button onclick="window.print()" style="background:#455a64; color:white;">🖨️ Print PDF</button>
    </div>

    <div id="availPanel" class="avail-panel">
        <h4 style="margin:0 0 10px 0">Teacher Unavailability Rules</h4>
        <select id="avTea"></select>
        <select id="avDay"></select>
        <select id="avPer"></select>
        <button onclick="addUnavailability()">Add Rule</button>
        <div id="availList" style="margin-top:10px; display:flex; gap:5px; flex-wrap:wrap;"></div>
    </div>
    
    <div class="view-bar" id="viewBar">
        <button onclick="renderMaster()">Master View</button>
        <select id="selStream" onchange="renderIndividual('stream')"><option value="">-- View Class --</option></select>
        <select id="selTeacher" onchange="renderIndividual('teacher')"><option value="">-- View Teacher --</option></select>
        <button onclick="renderLoadSummary()" style="background:#6f42c1; color:white;">Load Summary</button>
    </div>
</div>

<div id="output" class="container"></div>

<script>
const DAYS = ["MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY"];
const PERIODS = [
    {p:"P1", t:"08:00"}, {p:"P2", t:"08:40"}, {p:"P3", t:"09:20"}, {p:"P4", t:"10:00"},
    {p:"BREAK", t:"10:40"},
    {p:"P5", t:"11:10"}, {p:"P6", t:"11:50"}, {p:"P7", t:"12:30"}, {p:"P8", t:"13:10"}, {p:"P9", t:"13:50"}
];
let REGISTRY = [], TIMETABLE = [], UNAVAIL = [];

function toggleAvail() { const p = document.getElementById('availPanel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }

function loadProject(ev) {
    const reader = new FileReader();
    reader.onload = (e) => {
        const p = JSON.parse(e.target.result);
        const source = p.registry || p.reg || [];
        // Map shorthand keys (s, t, f, p) from your .ttpro file 
        REGISTRY = source.map(i => ({
            subject: i.s || i.sub || "",
            teacher: i.t || i.tea || "",
            form: i.f || i.frm || "",
            pwk: parseInt(i.p || i.pwk || 0)
        }));
        initFilters();
        alert("Project Loaded. Click Generate to build.");
    };
    reader.readAsText(ev.target.files[0]);
}

function loadCSV(ev) {
    const reader = new FileReader();
    reader.onload = (e) => {
        const lines = e.target.result.split('\n').slice(1).filter(l => l.trim());
        REGISTRY = lines.map(l => {
            const c = l.split(',');
            return { subject: c[0].trim(), teacher: c[1].trim(), form: c[2].trim(), pwk: parseInt(c[3]) };
        });
        initFilters();
        generate();
    };
    reader.readAsText(ev.target.files[0]);
}

function initFilters() {
    const ts = [...new Set(REGISTRY.map(x => x.teacher))].sort();
    const fs = [...new Set(REGISTRY.map(x => x.form))].sort();
    document.getElementById('selTeacher').innerHTML = '<option value="">-- View Teacher --</option>' + ts.map(t => `<option>${t}</option>`).join('');
    document.getElementById('selStream').innerHTML = '<option value="">-- View Class --</option>' + fs.map(f => `<option>${f}</option>`).join('');
    document.getElementById('avTea').innerHTML = ts.map(t => `<option>${t}</option>`).join('');
    document.getElementById('avDay').innerHTML = DAYS.map(d => `<option>${d}</option>`).join('');
    document.getElementById('avPer').innerHTML = PERIODS.filter(p=>p.p!=="BREAK").map(p => `<option>${p.p}</option>`).join('');
}

function addUnavailability() {
    const t = document.getElementById('avTea').value, d = document.getElementById('avDay').value, p = document.getElementById('avPer').value;
    if(!UNAVAIL.some(u => u.t===t && u.d===d && u.p===p)) {
        UNAVAIL.push({t, d, p});
        updateAvailList();
    }
}

function updateAvailList() {
    document.getElementById('availList').innerHTML = UNAVAIL.map((u, i) => 
        `<span style="background:#eee; padding:4px; font-size:10px;">${u.t}(${u.d} ${u.p}) <b onclick="UNAVAIL.splice(${i},1);updateAvailList()" style="color:red;cursor:pointer">×</b></span>`
    ).join('');
}

function generate() {
    TIMETABLE = [];
    const validSlots = ["P1","P2","P3","P4","P5","P6","P7","P8","P9"];
    
    // Sort by workload to place heavier subjects first
    REGISTRY.sort((a,b) => b.pwk - a.pwk).forEach(item => {
        let remaining = item.pwk;
        
        // Strategy: Try placing double periods first (but not spanning the break) 
        for(let d of DAYS) {
            if(remaining < 2) break;
            for(let i=0; i<validSlots.length-1; i++) {
                const p1 = validSlots[i], p2 = validSlots[i+1];
                if(p1 === "P4" && p2 === "P5") continue; // Skip break span 
                
                if(canPlace(d, p1, item) && canPlace(d, p2, item)) {
                    TIMETABLE.push({...item, day: d, period: p1}, {...item, day: d, period: p2});
                    remaining -= 2; break; 
                }
            }
        }
        
        // Place remaining single periods
        for(let d of DAYS) {
            if(remaining <= 0) break;
            for(let p of validSlots) {
                if(remaining <= 0) break;
                if(canPlace(d, p, item)) {
                    TIMETABLE.push({...item, day: d, period: p});
                    remaining--;
                }
            }
        }
    });

    document.getElementById('viewBar').style.display = 'block';
    renderMaster();
}

function canPlace(d, p, l) {
    const teacherBusy = TIMETABLE.some(t => t.day === d && t.period === p && t.teacher === l.teacher);
    const formBusy = TIMETABLE.some(t => t.day === d && t.period === p && t.form === l.form);
    const offTime = UNAVAIL.some(u => u.t === l.teacher && u.d === d && u.p === p);
    return !teacherBusy && !formBusy && !offTime;
}

function renderMaster() {
    const forms = [...new Set(REGISTRY.map(x => x.form))].sort();
    let html = "";
    DAYS.forEach(day => {
        html += `<div class="day-section"><div class="day-title">${day}</div>`;
        html += `<table><tr><th>CLASS</th>` + PERIODS.map(p => `<th>${p.p}</th>`).join('') + `</tr>`;
        forms.forEach(f => {
            html += `<tr><td style="font-weight:bold">${f}</td>`;
            PERIODS.forEach(p => {
                if(p.p === "BREAK") html += `<td class="break-cell">TEA BREAK</td>`;
                else {
                    const m = TIMETABLE.find(x => x.day === day && x.period === p.p && x.form === f);
                    html += `<td>${m ? `<b>${m.subject}</b><br>${m.teacher}` : ''}</td>`;
                }
            });
            html += `</tr>`;
        });
        html += `</table></div>`;
    });
    document.getElementById('output').innerHTML = html;
}

function renderIndividual(type) {
    const val = type === 'stream' ? document.getElementById('selStream').value : document.getElementById('selTeacher').value;
    if(!val) return;
    let html = `<h2 style="text-align:center">${val} TIMETABLE</h2><table><tr><th>DAY</th>` + PERIODS.map(p => `<th>${p.p}</th>`).join('') + `</tr>`;
    DAYS.forEach(day => {
        html += `<tr><td><b>${day}</b></td>`;
        PERIODS.forEach(p => {
            const isOff = type === 'teacher' && UNAVAIL.some(u => u.t === val && u.d === day && u.p === p.p);
            if(p.p === "BREAK") html += `<td class="break-cell">TEA BREAK</td>`;
            else if(isOff) html += `<td class="unavailable-block">OFF</td>`;
            else {
                const m = TIMETABLE.find(x => x.day === day && x.period === p.p && (type === 'stream' ? x.form === val : x.teacher === val));
                html += `<td>${m ? `<b>${m.subject}</b><br>${type==='stream'?m.teacher:'Form: '+m.form}` : ''}</td>`;
            }
        });
        html += `</tr>`;
    });
    document.getElementById('output').innerHTML = html + `</table>`;
}

function renderLoadSummary() {
    let html = `<h2 style="text-align:center">TEACHER WORKLOAD SUMMARY</h2><table style="width:600px; margin:auto;"><tr><th>Teacher</th><th>Periods / Week</th></tr>`;
    const load = {};
    REGISTRY.forEach(r => load[r.teacher] = (load[r.teacher] || 0) + r.pwk);
    Object.keys(load).sort().forEach(t => {
        html += `<tr><td>${t}</td><td>${load[t]}</td></tr>`;
    });
    document.getElementById('output').innerHTML = html + `</table>`;
}
</script>
</body>
</html>
