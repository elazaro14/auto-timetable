<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Timetable 2026 - Tanzania Official Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --row-height: 38px; --font-size: 11px; --cell-padding: 4px; --primary: #2c3e50; --accent: #27ae60; }
        .compact-mode { --row-height: 28px !important; --font-size: 10px !important; --cell-padding: 2px !important; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
        
        .panel { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 10px; border-top: 4px solid var(--primary); }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 11px; font-weight: bold; color: #666; }
        .inline-group { display: flex; align-items: center; gap: 8px; font-size: 11px; }
        
        .upload-zone { border: 2px dashed #ccc; padding: 12px; border-radius: 6px; background: #fffcf0; margin-bottom: 15px; text-align: center; }
        .registry-area { border: 1px solid #ddd; padding: 10px; border-radius: 4px; background: #fafafa; }
        
        /* Official Template Grid: Subject, Teacher, Room, Form, P/WK, Action */
        .registry-header { display: grid; grid-template-columns: 1.5fr 1.2fr 0.8fr 0.8fr 0.6fr 40px; gap: 8px; font-weight: bold; font-size: 10px; color: #555; margin-bottom: 5px; padding-left: 5px; }
        .registry-row { display: grid; grid-template-columns: 1.5fr 1.2fr 0.8fr 0.8fr 0.6fr 40px; gap: 8px; margin-bottom: 5px; }
        .registry-row input { padding: 6px; border: 1px solid #ccc; border-radius: 3px; font-size: 11px; width: 100%; box-sizing: border-box; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; background: white; border: 2px solid #000; margin-top: 10px; }
        th, td { border: 1px solid #000; text-align: center; padding: var(--cell-padding); font-size: var(--font-size); height: var(--row-height); overflow: hidden; }
        th { background: #f8f9fa; }
        
        .tt-header { text-align: center; margin-bottom: 10px; border-bottom: 2px double #333; padding-bottom: 10px; }
        .tt-school-name { font-size: 24px; font-weight: bold; text-transform: uppercase; margin: 0; }
        .tt-sub-header { font-size: 14px; font-weight: bold; color: #444; margin: 5px 0; }

        .day-title { background: var(--primary); color: white; padding: 8px; font-weight: bold; text-align: center; margin-top: 15px; border: 2px solid #000; }
        .break-cell, .spec-merged { background: #eee !important; font-weight: bold; width: 30px !important; }
        .vertical-text { writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg); display: inline-block; white-space: nowrap; }
        
        .controls { display: flex; gap: 10px; justify-content: center; margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; flex-wrap: wrap; }
        button { padding: 8px 16px; border-radius: 4px; border: 1px solid #ccc; background: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #f0f0f0; }
        .btn-gen { background: var(--accent) !important; color: white; border: none; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 6px 12px; font-size: 11px; }
        
        @media print { .no-print { display: none !important; } .day-section { page-break-after: always; } }
    </style>
</head>
<body class="compact-mode">

<div class="panel no-print">
    <div class="config-grid">
        <div class="input-group"><label>School Name</label><input type="text" id="schoolName" value="YOUR SCHOOL NAME HERE"></div>
        <div class="input-group"><label>Calendar Year</label><input type="text" id="calYear" value="2026"></div>
        <div class="input-group"><label>Start Time</label><input type="time" id="tTime" value="08:00"></div>
        <div class="input-group"><label>Period Duration (min)</label><input type="number" id="tDur" value="40"></div>
        <div class="input-group"><label>Total Periods</label><input type="number" id="tCount" value="9"></div>
        
        <div class="input-group">
            <label>Break Interval</label>
            <div class="inline-group">
                <input type="checkbox" id="breakEn" checked> Use? 
                <input type="number" id="breakDur" value="20" style="width:40px"> min 
                after P<input type="number" id="breakAfter" value="3" style="width:30px">
            </div>
        </div>

        <div class="input-group">
            <label>Lunch Interval</label>
            <div class="inline-group">
                <input type="checkbox" id="lunchEn" checked> Use? 
                <input type="number" id="lunchDur" value="45" style="width:40px"> min 
                after P<input type="number" id="lunchAfter" value="6" style="width:30px">
            </div>
        </div>
    </div>

    <div class="upload-zone">
        <label style="font-weight:bold; display:block; margin-bottom:5px;">IMPORT FROM TANZANIA TEMPLATE (CSV)</label>
        <input type="file" id="csvUpload" accept=".csv" onchange="handleFileUpload(event)">
        <p style="font-size: 10px; color: #d35400; margin-top: 5px;">Upload your file with columns: Subject, Teacher, Room, Form</p>
    </div>

    <div class="registry-area">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <label style="font-weight:bold; font-size:13px;">SUBJECT REGISTRY (MANUAL ADDING)</label>
            <button class="btn-add" onclick="addRow()">+ ADD NEW ROW</button>
        </div>
        <div class="registry-header">
            <div>SUBJECT</div><div>TEACHER</div><div>ROOM</div><div>FORM</div><div>P/WK</div><div></div>
        </div>
        <div id="registryList">
            <div class="registry-row">
                <input type="text" class="reg-sub" value="MATHEMATICS">
                <input type="text" class="reg-tea" value="SEURI">
                <input type="text" class="reg-room" value="">
                <input type="text" class="reg-frm" value="F1A">
                <input type="number" class="reg-pwk" value="5">
                <button onclick="this.parentElement.remove()" style="color:red; border:none; background:none; cursor:pointer;">✕</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-gen" onclick="runGenerator()">GENERATE FULL TIMETABLE</button>
        <button onclick="drawLoad()">TEACHER LOAD</button>
        <button onclick="window.print()">PRINT TO PDF</button>
    </div>
</div>

<div id="viewBar" class="no-print" style="text-align:center; display:none; padding:10px; background:#e9ecef;">
    <button onclick="drawMaster()">MASTER VIEW</button> | 
    <select id="selStream" onchange="drawIndiv('stream')"><option value="">Select Form/Stream</option></select>
    <select id="selTeacher" onchange="drawIndiv('teacher')"><option value="">Select Teacher</option></select>
</div>

<div id="mainDisplay"></div>

<script>
let DATA = [], TIME = [];
const DAYS = ["MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY"];

function addRow(sub="", tea="", room="", frm="", pwk=4) {
    const div = document.createElement('div');
    div.className = 'registry-row';
    div.innerHTML = `
        <input type="text" class="reg-sub" value="${sub}" placeholder="Subject">
        <input type="text" class="reg-tea" value="${tea}" placeholder="Teacher">
        <input type="text" class="reg-room" value="${room}" placeholder="Room (Opt)">
        <input type="text" class="reg-frm" value="${frm}" placeholder="Form">
        <input type="number" class="reg-pwk" value="${pwk}">
        <button onclick="this.parentElement.remove()" style="color:red; border:none; background:none; cursor:pointer;">✕</button>
    `;
    document.getElementById('registryList').appendChild(div);
}

function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const lines = e.target.result.split('\n');
        const counts = {};
        lines.forEach(line => {
            if (!line.trim() || line.toUpperCase().includes("TEACHER")) return;
            const c = line.split(',').map(item => item.trim());
            if (c.length >= 4) {
                const key = `${c[0]}|${c[1]}|${c[2]}|${c[3]}`; // Sub|Tea|Room|Form
                counts[key] = (counts[key] || 0) + 1;
            }
        });
        document.getElementById('registryList').innerHTML = '';
        for (const key in counts) {
            const [sub, tea, room, frm] = key.split('|');
            addRow(sub, tea, room, frm, counts[key]);
        }
    };
    reader.readAsText(file);
}

function getSpec(d, p) {
    if (d === "WEDNESDAY" && (p === "P8" || p === "P9")) return "RELIGION";
    if (d === "THURSDAY" && (p === "P8" || p === "P9")) return "DEBATE";
    if (d === "FRIDAY" && (p === "P7" || p === "P8" || p === "P9")) return "MOSQUE";
    return null;
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function check(d, p, l) {
    if(getSpec(d, p)) return false;
    // Strict conflict check: Teacher, Form, and Room (if specified)
    return !DATA.some(x => x.d === d && x.p === p && (x.tea === l.tea || x.frm === l.frm || (l.room && x.room === l.room)));
}

function getHeaderHTML(subTitle) {
    const school = document.getElementById('schoolName').value.toUpperCase();
    const year = document.getElementById('calYear').value;
    return `
        <div class="tt-header">
            <h1 class="tt-school-name">${school}</h1>
            <p class="tt-sub-header">ACADEMIC CALENDAR: ${year} | ${subTitle}</p>
        </div>
    `;
}

function runGenerator() {
    const rows = document.querySelectorAll('.registry-row');
    let RAW_DATA = [];
    rows.forEach(row => {
        const sub = row.querySelector('.reg-sub').value.trim().toUpperCase();
        const tea = row.querySelector('.reg-tea').value.trim();
        const room = row.querySelector('.reg-room').value.trim();
        const frm = row.querySelector('.reg-frm').value.trim().toUpperCase();
        const pwk = parseInt(row.querySelector('.reg-pwk').value) || 0;
        if(sub && tea && frm && pwk > 0) RAW_DATA.push({ sub, tea, room, frm, pwk });
    });

    if(RAW_DATA.length === 0) return alert("Please add subjects first.");

    DATA = []; TIME = [];
    const count = parseInt(document.getElementById('tCount').value);
    const dur = parseInt(document.getElementById('tDur').value);
    const bEn = document.getElementById('breakEn').checked, bAft = parseInt(document.getElementById('breakAfter').value);
    const lEn = document.getElementById('lunchEn').checked, lAft = parseInt(document.getElementById('lunchAfter').value);

    let curr = new Date("2026-01-01T" + document.getElementById('tTime').value);
    for(let i=1; i<=count; i++) {
        let s = curr.toTimeString().slice(0,5);
        curr.setMinutes(curr.getMinutes() + dur);
        TIME.push({ p: 'P'+i, t: s + '-' + curr.toTimeString().slice(0,5), isB: false });
        if(bEn && i === bAft) {
            let ts = curr.toTimeString().slice(0,5);
            curr.setMinutes(curr.getMinutes() + parseInt(document.getElementById('breakDur').value));
            TIME.push({ p: 'BREAK', t: ts + '-' + curr.toTimeString().slice(0,5), isB: true });
        }
        if(lEn && i === lAft) {
            let ts = curr.toTimeString().slice(0,5);
            curr.setMinutes(curr.getMinutes() + parseInt(document.getElementById('lunchDur').value));
            TIME.push({ p: 'LUNCH', t: ts + '-' + curr.toTimeString().slice(0,5), isB: true });
        }
    }

    // Logic: Spreading periods across days (MAX ONE BLOCK PER DAY)
    RAW_DATA.forEach(item => {
        let pwk = item.pwk;
        let shuffledDays = shuffle([...DAYS]);
        
        // As you requested, prioritizing double periods while keeping the "Once a Day" rule.
        // We decide how many days will have Doubles vs Singles.
        // If pwk = 6, we want 3 days of Doubles (2+2+2).
        // If pwk = 5, we want 2 days of Doubles and 1 day of Single (2+2+1).
        let numDoubles = Math.min(Math.floor(pwk / 2), 5); // Max 5 doubles as there are only 5 days
        let numSingles = Math.min(pwk - (numDoubles * 2), 5 - numDoubles);
        
        let plan = [];
        for(let i=0; i<numDoubles; i++) plan.push('double');
        for(let i=0; i<numSingles; i++) plan.push('single');

        plan.forEach(type => {
            let placed = false;
            // Iterate through days to find one where we haven't placed this subject yet
            for(let d of shuffledDays) {
                // Ensure once-a-day rule: check if subject already exists on this day for this form
                if (DATA.some(x => x.d === d && x.sub === item.sub && x.frm === item.frm)) continue;

                if (type === 'double') {
                    let badStarts = [];
                    if(bEn) badStarts.push(bAft); if(lEn) badStarts.push(lAft);
                    let starts = shuffle([...Array(count-1).keys()]).filter(s => !badStarts.includes(s+1));
                    for(let sIdx of starts) {
                        const p1 = 'P'+(sIdx+1), p2 = 'P'+(sIdx+2);
                        if(check(d, p1, item) && check(d, p2, item)) {
                            DATA.push({...item, d, p: p1}, {...item, d, p: p2});
                            placed = true; break;
                        }
                    }
                } else {
                    let periods = shuffle([...Array(count).keys()]);
                    for(let sIdx of periods) {
                        const p = 'P'+(sIdx+1);
                        if(check(d, p, item)) {
                            DATA.push({...item, d, p});
                            placed = true; break;
                        }
                    }
                }
                if(placed) break;
            }
        });
    });

    document.getElementById('viewBar').style.display = 'block';
    populateDropdowns();
    drawMaster();
}

function populateDropdowns() {
    const fList = [...new Set(DATA.map(x => x.frm))].sort();
    const tList = [...new Set(DATA.map(x => x.tea))].sort();
    document.getElementById('selStream').innerHTML = '<option value="">Select Form/Stream</option>' + fList.map(f => `<option>${f}</option>`).join('');
    document.getElementById('selTeacher').innerHTML = '<option value="">Select Teacher</option>' + tList.map(t => `<option>${t}</option>`).join('');
}

function drawMaster() {
    let h = getHeaderHTML("MASTER TIMETABLE");
    const frms = [...new Set(DATA.map(x => x.frm))].sort();
    DAYS.forEach(day => {
        h += `<div class="day-section"><div class="day-title">${day}</div><table><tr><th style="width:65px">FORM</th>`;
        TIME.forEach(tp => h += tp.isB ? `<th class="break-cell"></th>` : `<th>${tp.p}<br><small>${tp.t}</small></th>`);
        h += `</tr>`;
        frms.forEach((f, idx) => {
            h += `<tr><td><b>${f}</b></td>`;
            TIME.forEach(tp => {
                const sp = getSpec(day, tp.p);
                if(tp.isB) { if(idx===0) h+=`<td class="break-cell" rowspan="${frms.length}"><span class="vertical-text">${tp.p}</span></td>`; }
                else if(sp) { if(idx===0) h+=`<td class="spec-merged" rowspan="${frms.length}"><span class="vertical-text">${sp}</span></td>`; }
                else {
                    const m = DATA.find(x => x.d === day && x.p === tp.p && x.frm === f);
                    h += `<td>${m ? `<b>${m.sub}</b><br>${m.tea}${m.room ? ' ('+m.room+')' : ''}` : ''}</td>`;
                }
            });
            h += `</tr>`;
        });
        h += `</table></div>`;
    });
    document.getElementById('mainDisplay').innerHTML = h;
}

function drawLoad() {
    const list = [...new Set(DATA.map(x => x.tea))].sort();
    let h = getHeaderHTML("TEACHER WORKLOAD SUMMARY");
    h += `<table style="width:60%; margin:auto;"><tr><th>TEACHER</th><th>TOTAL PERIODS</th></tr>`;
    list.forEach(t => h += `<tr><td>${t}</td><td>${DATA.filter(x => x.tea === t).length}</td></tr>`);
    document.getElementById('mainDisplay').innerHTML = h + `</table>`;
}

function drawIndiv(type) {
    const val = document.getElementById(type === 'stream' ? 'selStream' : 'selTeacher').value;
    if(!val) return;
    let h = getHeaderHTML(`${type.toUpperCase()}: ${val}`);
    h += `<table><tr><th>DAY</th>` + TIME.map(tp => tp.isB ? `<th class="break-cell"></th>` : `<th>${tp.p}</th>`).join('') + `</tr>`;
    DAYS.forEach(d => {
        h += `<tr><td><b>${d}</b></td>`;
        TIME.forEach(tp => {
            const sp = getSpec(d, tp.p);
            if(tp.isB) h += `<td class="break-cell">${tp.p}</td>`;
            else if(sp) h += `<td class="spec-merged">${sp}</td>`;
            else {
                const m = DATA.find(x => x.d === d && x.p === tp.p && (type==='stream'? x.frm===val : x.tea===val));
                h += `<td>${m ? `<b>${m.sub}</b><br>${type==='stream' ? m.tea + (m.room ? ' ['+m.room+']' : '') : m.frm}` : ''}</td>`;
            }
        });
        h += `</tr>`;
    });
    document.getElementById('mainDisplay').innerHTML = h + `</table>`;
}
</script>
</body>
</html>
