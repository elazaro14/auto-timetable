<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TT-PRO Enterprise - Strict Daily Frequency</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root {
  --primary:#0f172a; --secondary:#1e293b; --accent:#22c55e;
  --sidebar-gradient: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
  --bg:#f8fafc; --border:#e2e8f0; --text:#334155; --danger:#ef4444; --warning:#f59e0b; --pdf:#e11d48;
}
body { margin:0; font-family:'Inter', system-ui, sans-serif; display:flex; height: 100vh; background:var(--bg); overflow:hidden; }
.sidebar { 
    width:340px; background: var(--sidebar-gradient); color:white; padding:20px; 
    display: flex; flex-direction: column; gap: 10px; overflow-y: auto;
    border-right: 1px solid #334155;
}
.sidebar h2 { color: var(--accent); font-size: 1.1rem; text-align: center; border-bottom: 1px solid #334155; padding-bottom: 15px; margin:0; }
.setting-card { background: rgba(30, 41, 59, 0.5); padding: 12px; border-radius: 8px; border: 1px solid #334155; }
.setting-card label { display: block; font-size: 10px; text-transform: uppercase; color: #94a3b8; margin-bottom: 4px; font-weight: 700; }
.setting-card input, .setting-card select { 
    width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 13px; box-sizing: border-box; margin-bottom: 5px;
}
.nav-label { font-size: 11px; color: #38bdf8; font-weight: 800; margin-top: 10px; border-left: 3px solid var(--accent); padding-left: 8px; text-transform: uppercase; }
.btn { width: 100%; padding: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; font-size: 12px; display: flex; align-items: center; gap: 8px; justify-content: center; }
.btn-gen { background: var(--accent); color: #064e3b; }
.btn-sec { background: #475569; color: white; }
.main { flex:1; display: flex; flex-direction: column; overflow: hidden; }
.top-bar { background: white; padding: 10px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.content { flex:1; padding: 20px; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; border: 2px solid #000; table-layout: fixed; }
th, td { border: 1px solid #000; padding: 4px; text-align: center; font-size: 9px; height: 45px; }
.slot { padding: 2px; border-radius: 4px; font-weight: 700; background: #dcfce7; border: 1px solid #22c55e; }
.break-cell { background: #cbd5e1; font-weight: bold; writing-mode: vertical-rl; }
#logoImg { height: 80px; display: none; margin: 0 auto; }
</style>
</head>
<body>

<div class="sidebar">
    <h2>TT-PRO COMMAND</h2>
    <div class="setting-card">
        <label>School Name</label>
        <input type="text" id="schName" value="TANZANIA SECONDARY SCHOOL">
        <label>Academic Year</label>
        <input type="text" id="acadYear" value="2026">
    </div>

    <div class="nav-label">Scheduling Rules</div>
    <div class="setting-card">
        <label>Double Period Logic</label>
        <select id="optDouble">
            <option value="yes">YES (Once Per Day/Subject)</option>
            <option value="no">NO (Singles Only)</option>
        </select>
    </div>

    <div class="nav-label">Intervals</div>
    <div class="setting-card">
        <div style="display:flex; gap:5px;">
            <div style="flex:1"><label>Break @ P#</label><input type="number" id="brkAfter" value="2"></div>
            <div style="flex:1"><label>Lunch @ P#</label><input type="number" id="lchAfter" value="4"></div>
        </div>
    </div>

    <div class="nav-label">Config</div>
    <div class="setting-card">
        <label>Total Periods</label>
        <select id="totalPeriods"><option value="8">8 Periods</option><option value="9" selected>9 Periods</option><option value="10">10 Periods</option></select>
        <label>Start Time</label><input type="time" id="startTime" value="08:00">
    </div>

    <button class="btn btn-gen" onclick="generate()">⚡ GENERATE TIMETABLE</button>
    <button class="btn btn-sec" onclick="document.getElementById('csvIn').click()">📥 IMPORT CSV</button>
    <input type="file" id="csvIn" style="display:none" accept=".csv" onchange="handleCSV(event)">
</div>

<div class="main">
    <div class="top-bar">
        <div style="font-weight: bold;">VIEW: MASTER SCHEDULE</div>
        <button class="btn btn-sec" style="width:auto; padding:5px 15px;" onclick="exportPDF()">📄 PDF</button>
    </div>
    <div class="content">
        <div id="printableArea">
            <div id="header" style="text-align:center; margin-bottom:15px;">
                <h1 id="headerTitle" style="margin:0;">TANZANIA SECONDARY SCHOOL</h1>
                <h4 id="headerYear" style="margin:5px 0;">ACADEMIC YEAR: 2026</h4>
            </div>
            <div id="app"></div>
        </div>
    </div>
</div>

<script>
let DATA = [], REGISTRY = [], CLASSES = [], TEACHERS = [], SLOTS = [];
const DAYS = ["MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY"];

function buildSlots() {
    SLOTS = [];
    let start = document.getElementById('startTime').value;
    let cur = new Date("2026-01-01T" + start);
    let totalP = parseInt(document.getElementById('totalPeriods').value);
    let brkPos = parseInt(document.getElementById('brkAfter').value);
    let lchPos = parseInt(document.getElementById('lchAfter').value);

    for(let i=1; i<=totalP; i++) {
        let sTime = cur.toTimeString().slice(0,5);
        cur.setMinutes(cur.getMinutes() + 40);
        SLOTS.push({ id: 'P'+i, time: `${sTime}-${cur.toTimeString().slice(0,5)}`, type: 'period', index: i });
        if(i === brkPos) { cur.setMinutes(cur.getMinutes() + 20); SLOTS.push({ id: 'BREAK', type: 'break' }); }
        if(i === lchPos) { cur.setMinutes(cur.getMinutes() + 45); SLOTS.push({ id: 'LUNCH', type: 'lunch' }); }
    }
}

function generate() {
    DATA = []; buildSlots();
    const useDouble = document.getElementById('optDouble').value === 'yes';
    
    // Sort pool: subjects with higher frequency handled first
    let pool = [...REGISTRY].sort((a, b) => b.pwk - a.pwk);

    pool.forEach(r => {
        let left = r.pwk;
        
        // Shuffle days to ensure variety
        let shuffledDays = [...DAYS].sort(() => Math.random() - 0.5);

        for (let d of shuffledDays) {
            if (left <= 0) break;

            let pSlots = SLOTS.filter(s => s.type === 'period');
            let placedToday = false;

            // Rule: Double OR Single ONCE per day.
            if (useDouble && left >= 2) {
                for (let i = 0; i < pSlots.length - 1; i++) {
                    let s1 = pSlots[i], s2 = pSlots[i+1];
                    if (s1.index + 1 === s2.index && 
                        !DATA.some(x => x.d===d && x.p===s1.id && (x.tea===r.tea || x.frm===r.frm)) &&
                        !DATA.some(x => x.d===d && x.p===s2.id && (x.tea===r.tea || x.frm===r.frm))) {
                        
                        DATA.push({...r, d, p: s1.id}, {...r, d, p: s2.id});
                        left -= 2; placedToday = true;
                        break; // Exit day loop after double
                    }
                }
            }

            // If double wasn't possible or needed, try single
            if (!placedToday && left > 0) {
                let shuffledSlots = [...pSlots].sort(() => Math.random() - 0.5);
                for (let s of shuffledSlots) {
                    if (!DATA.some(x => x.d===d && x.p===s.id && (x.tea===r.tea || x.frm===r.frm))) {
                        DATA.push({...r, d, p: s.id});
                        left--; placedToday = true;
                        break; // Exit day loop after single
                    }
                }
            }
        }
    });
    renderMaster();
}

function handleCSV(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const lines = ev.target.result.split('\n').filter(l => l.trim() !== "");
        REGISTRY = []; CLASSES = []; TEACHERS = [];
        lines.slice(1).forEach(line => {
            const [sub, tea, pwk, frm] = line.split(',').map(c => c.trim().toUpperCase());
            REGISTRY.push({ sub, tea, pwk: parseInt(pwk), frm });
            if(!CLASSES.includes(frm)) CLASSES.push(frm);
            if(!TEACHERS.includes(tea)) TEACHERS.push(tea);
        });
        alert("CSV Loaded.");
    };
    reader.readAsText(e.target.files[0]);
}

function renderMaster() {
    let h = "";
    document.getElementById('headerTitle').innerText = document.getElementById('schName').value;
    DAYS.forEach(day => {
        h += `<div style="margin-bottom:20px;"><h3>${day}</h3><table><tr><th>Class</th>`;
        SLOTS.forEach(s => h += `<th>${s.id}</th>`);
        h += `</tr>`;
        CLASSES.sort().forEach(f => {
            h += `<tr><td><b>${f}</b></td>`;
            SLOTS.forEach(s => {
                if(s.type!=='period') h += `<td class="break-cell">${s.id}</td>`;
                else {
                    let m = DATA.find(x => x.d===day && x.p===s.id && x.frm===f);
                    h += `<td>${m ? `<div class="slot">${m.sub}<br><small>${m.tea}</small></div>` : ''}</td>`;
                }
            });
            h += `</tr>`;
        });
        h += `</table></div>`;
    });
    document.getElementById('app').innerHTML = h;
}

function exportPDF() {
    html2pdf().from(document.getElementById('printableArea')).save();
}
</script>
</body>
</html>
