<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TT-PRO MAX FINAL</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{margin:0;font-family:system-ui;display:flex;height:100vh;background:#f1f5f9}
.sidebar{width:320px;background:#0f172a;color:white;padding:15px;overflow:auto}
.sidebar h2{color:#22c55e;text-align:center}
.setting-card input,.setting-card select{width:100%;padding:6px;margin:4px 0}
.btn{width:100%;padding:10px;margin-top:5px;background:#22c55e;border:none;cursor:pointer}
.main{flex:1;display:flex;flex-direction:column}
.top{background:white;padding:10px;border-bottom:1px solid #ddd;display:flex;gap:10px;flex-wrap:wrap}
.content{padding:10px;overflow:auto}
.card{background:white;padding:10px;margin-bottom:10px;border-radius:6px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid black;font-size:10px;text-align:center;padding:4px}
.slot{background:#dcfce7;font-weight:bold}
.break{background:#ddd}
.special{background:#fef3c7;font-weight:bold}
</style>
</head>

<body>

<div class="sidebar">
<h2>TT-PRO MAX</h2>

<label>School</label>
<input id="schName" value="SECONDARY SCHOOL">

<label>Academic Year</label>
<input id="acadYear" value="2026">

<label>Total Periods</label>
<select id="totalPeriods">
<option>6</option><option>7</option><option selected>8</option><option>9</option>
</select>

<label>Period Duration</label>
<input type="number" id="periodDur" value="40">

<label>Start Time</label>
<input type="time" id="startTime" value="08:00">

<hr>

<label>Break After</label>
<input type="number" id="breakAfter" value="2">

<label>Break Duration</label>
<input type="number" id="breakDur" value="20">

<label>Lunch After</label>
<input type="number" id="lunchAfter" value="4">

<label>Lunch Duration</label>
<input type="number" id="lunchDur" value="45">

<hr>

<button class="btn" onclick="generate()">⚡ Generate</button>
<button class="btn" onclick="exportPDF()">📄 PDF</button>

<input type="file" onchange="loadCSV(event)">
<button class="btn" onclick="saveProject()">💾 Save</button>
<input type="file" onchange="loadProject(event)">

</div>

<div class="main">

<div class="top">
<button onclick="setView('MASTER')">Master</button>
<button onclick="setView('STREAM')">Stream</button>
<button onclick="setView('TEACHER')">Teacher</button>
<button onclick="setView('LOAD')">Loads</button>

<select id="displayMode" onchange="render()">
<option value="both">Subject + Teacher</option>
<option value="sub">Subject Only</option>
</select>

<select id="filter"></select>
</div>

<div class="content">
<h2 id="headerTitle"></h2>
<h4 id="headerYear"></h4>
<div id="stats"></div>
<div id="app"></div>
</div>

</div>

<script>

let REGISTRY=[],DATA=[],CLASSES=[],TEACHERS=[],SLOTS=[];
let currentView="MASTER";
const DAYS=["MON","TUE","WED","THU","FRI"];

// CSV
function loadCSV(e){
let r=new FileReader();
r.onload=(ev)=>{
let lines=ev.target.result.split('\n');
REGISTRY=[];CLASSES=[];TEACHERS=[];
lines.slice(1).forEach(l=>{
let [sub,tea,pwk,frm]=l.split(',').map(x=>x?.trim().toUpperCase());
if(!sub||!tea||isNaN(pwk)) return;
REGISTRY.push({sub,tea,pwk:+pwk,frm});
if(!CLASSES.includes(frm)) CLASSES.push(frm);
if(!TEACHERS.includes(tea)) TEACHERS.push(tea);
});
alert("CSV Loaded");
};
r.readAsText(e.target.files[0]);
}

// SLOTS
function buildSlots(){
SLOTS=[];
let cur=new Date("2026-01-01T"+startTime.value);
let dur=+periodDur.value;

for(let i=1;i<=+totalPeriods.value;i++){
let s=cur.toTimeString().slice(0,5);
cur.setMinutes(cur.getMinutes()+dur);
let e=cur.toTimeString().slice(0,5);

SLOTS.push({id:"P"+i,label:`P${i}<br>${s}-${e}`,type:"period"});

if(i==breakAfter.value){
SLOTS.push({type:"break",label:"BREAK"});
cur.setMinutes(cur.getMinutes()+ +breakDur.value);
}

if(i==lunchAfter.value){
SLOTS.push({type:"lunch",label:"LUNCH"});
cur.setMinutes(cur.getMinutes()+ +lunchDur.value);
}
}
}

// RULES
function canPlace(r,d,p){
let slot=SLOTS.find(s=>s.id===p);
if(!slot || slot.type!=="period") return false;
if(DATA.some(x=>x.d===d && x.p===p && x.tea===r.tea)) return false;
if(DATA.some(x=>x.d===d && x.p===p && x.frm===r.frm)) return false;
return true;
}

function shuffle(a){return [...a].sort(()=>Math.random()-0.5);}

// GENERATOR
function generate(){

if(REGISTRY.length==0) return alert("Upload CSV");

buildSlots();

let success=false;

for(let attempt=0;attempt<30 && !success;attempt++){

DATA=[]; success=true;

let pool=[...REGISTRY].sort((a,b)=>b.pwk-a.pwk);

for(let r of pool){

let left=r.pwk;

for(let d of shuffle(DAYS)){

if(left<=0) break;

if(DATA.some(x=>x.d===d && x.frm===r.frm && x.sub===r.sub)) continue;

let periods=SLOTS.filter(x=>x.type==="period");

// DOUBLE FIRST
if(left>=2){
for(let i=0;i<periods.length-1;i++){
let p1=periods[i].id;
let p2=periods[i+1].id;
if(canPlace(r,d,p1)&&canPlace(r,d,p2)){
DATA.push({...r,d,p:p1},{...r,d,p:p2});
left-=2;
break;
}
}
}

// SINGLE
if(left>0){
for(let p of shuffle(periods)){
if(canPlace(r,d,p.id)){
DATA.push({...r,d,p:p.id});
left--;
break;
}
}
}

}

if(left>0){success=false;break;}
}

}

if(!success) alert("⚠️ Some subjects not fully allocated");

render();
}

// VIEWS
function setView(v){
currentView=v;
let f=filter;

if(v==="STREAM") f.innerHTML=CLASSES.map(c=>`<option>${c}</option>`);
else if(v==="TEACHER") f.innerHTML=TEACHERS.map(t=>`<option>${t}</option>`);
else f.innerHTML="";

render();
}

// RENDER
function render(){

headerTitle.innerText=schName.value;
headerYear.innerText="Academic Year: "+acadYear.value;

renderStats();

if(currentView==="MASTER") renderMaster();
if(currentView==="STREAM") renderSingle("frm");
if(currentView==="TEACHER") renderSingle("tea");
if(currentView==="LOAD") renderLoads();
}

function renderMaster(){
let mode=displayMode.value;
let html="";

DAYS.forEach(d=>{
html+=`<div class="card"><h4>${d}</h4><table><tr><th>Class</th>`;
SLOTS.forEach(s=>html+=`<th>${s.label}</th>`);
html+="</tr>";

CLASSES.forEach(c=>{
html+=`<tr><td>${c}</td>`;
SLOTS.forEach(s=>{
if(s.type!=="period") html+=`<td class="break">${s.label}</td>`;
else{
let m=DATA.find(x=>x.d===d && x.p===s.id && x.frm===c);
html+=`<td>${m?`<div class="slot">${mode==="both"?m.sub+"<br>"+m.tea:m.sub}</div>`:""}</td>`;
}
});
html+="</tr>";
});

html+="</table></div>";
});

app.innerHTML=html;
}

function renderSingle(key){
let val=filter.value;
let html=`<div class="card"><table><tr><th>Day</th>`;
SLOTS.forEach(s=>html+=`<th>${s.label}</th>`);
html+="</tr>";

DAYS.forEach(d=>{
html+=`<tr><td>${d}</td>`;
SLOTS.forEach(s=>{
if(s.type!=="period") html+=`<td class="break">${s.label}</td>`;
else{
let m=DATA.find(x=>x.d===d && x.p===s.id && x[key]===val);
html+=`<td>${m?m.sub:""}</td>`;
}
});
html+="</tr>";
});

app.innerHTML=html+"</table></div>";
}

function renderLoads(){
let html="<div class='card'><table><tr><th>Teacher</th><th>Load</th></tr>";
TEACHERS.forEach(t=>{
html+=`<tr><td>${t}</td><td>${DATA.filter(x=>x.tea===t).length}</td></tr>`;
});
app.innerHTML=html+"</table></div>";
}

// STATS
function renderStats(){
stats.innerHTML=`<div class="card">
Classes: ${CLASSES.length} | Teachers: ${TEACHERS.length} | Lessons: ${DATA.length}
</div>`;
}

// SAVE
function saveProject(){
let blob=new Blob([JSON.stringify({DATA,REGISTRY,CLASSES,TEACHERS})]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="tt_backup.json";
a.click();
}

function loadProject(e){
let r=new FileReader();
r.onload=(ev)=>{
let p=JSON.parse(ev.target.result);
DATA=p.DATA;REGISTRY=p.REGISTRY;CLASSES=p.CLASSES;TEACHERS=p.TEACHERS;
render();
};
r.readAsText(e.target.files[0]);
}

// PDF
function exportPDF(){
html2pdf().from(document.body).save();
}

</script>
</body>
</html>
