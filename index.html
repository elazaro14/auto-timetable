<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TT-PRO ULTIMATE 2026</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

:root{
--primary:#2563eb;
--success:#16a34a;
--dark:#0f172a;
--dark2:#1e293b;
--bg:#f8fafc;
--border:#cbd5e1;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial;
background:var(--bg);
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:340px;
background:linear-gradient(180deg,var(--dark),var(--dark2));
color:white;
padding:20px;
overflow-y:auto;
}

.sidebar h2{
text-align:center;
color:#38bdf8;
}

label{
font-size:11px;
color:#94a3b8;
display:block;
margin-top:8px;
font-weight:700;
}

input,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #334155;
background:#1e293b;
color:white;
}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
font-weight:700;
cursor:pointer;
}

.btn-primary{background:#2563eb;color:white;}
.btn-success{background:#16a34a;color:white;}
.btn-dark{background:#334155;color:white;}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
overflow:hidden;
}

.topbar{
background:white;
padding:10px;
display:flex;
gap:10px;
border-bottom:1px solid var(--border);
}

.content{
flex:1;
overflow:auto;
padding:20px;
}

/* TABLE */

.card{
background:white;
border:1px solid var(--border);
border-radius:15px;
padding:15px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
}

th,td{
border:1px solid #cbd5e1;
text-align:center;
font-size:10px;
padding:5px;
}

th{background:#f1f5f9;font-weight:800}

.slot{
background:#dcfce7;
padding:5px;
border-radius:6px;
font-weight:700;
}

.break{
background:#e2e8f0;
font-weight:700;
}

.special{
background:#fef3c7;
font-weight:800;
color:#92400e;
}

/* PRINT */

@media print{
.sidebar,.topbar{display:none!important}
body{background:white}
}

</style>
</head>

<body>

<div class="sidebar">

<h2>TT-PRO</h2>

<label>School</label>
<input id="schName" value="SECONDARY SCHOOL">

<label>Year</label>
<input id="acadYear" value="2026">

<label>Total Periods</label>
<input id="totalPeriods" type="number" value="8">

<label>Period Minutes</label>
<input id="periodDur" type="number" value="40">

<label>Start Time</label>
<input id="startTime" type="time" value="08:00">

<label>Break After</label>
<input id="breakAfter" type="number" value="2">

<label>Lunch After</label>
<input id="lunchAfter" type="number" value="4">

<!-- SPECIAL -->
<hr>
<h3>Special Block</h3>

<input id="spName" placeholder="ASSEMBLY">

<select id="spDay">
<option value="ALL">EVERY DAY</option>
<option>MON</option>
<option>TUE</option>
<option>WED</option>
<option>THU</option>
<option>FRI</option>
</select>

<input id="spPeriods" placeholder="6,7,8">

<input id="spDur" type="number" placeholder="Minutes per period">

<button class="btn-primary" onclick="addSpecial()">ADD SPECIAL</button>

<div id="specialList"></div>

<hr>

<button class="btn-success" onclick="generate()">GENERATE</button>
<button class="btn-dark" onclick="window.print()">PRINT</button>
<button class="btn-dark" onclick="exportPDF()">PDF</button>
<button class="btn-dark" onclick="saveBackup()">SAVE</button>

<input type="file" id="file" hidden onchange="loadCSV(event)">
<button class="btn-primary" onclick="file.click()">IMPORT CSV</button>

</div>

<div class="main">

<div class="topbar">
<button onclick="view='MASTER';render()">MASTER</button>
<button onclick="view='STREAM';render()">STREAM</button>
<button onclick="view='TEACHER';render()">TEACHER</button>
<button onclick="view='LOADS';render()">LOADS</button>
</div>

<div class="content">
<div id="app"></div>
</div>

</div>

<script>

let REGISTRY=[],DATA=[],CLASSES=[],TEACHERS=[],SPECIALS=[];
let view="MASTER";

const DAYS=["MON","TUE","WED","THU","FRI"];

/* SPECIAL */

function addSpecial(){

SPECIALS.push({
name:spName.value,
day:spDay.value,
periods:spPeriods.value.split(',').map(x=>+x),
dur:+spDur.value
});

renderSpecialList();

}

/* SLOTS */

function buildSlots(day){

let slots=[];
let cur=new Date("2026-01-01T"+startTime.value);
let total=+totalPeriods.value;
let dur=+periodDur.value;

for(let i=1;i<=total;i++){

let special=SPECIALS.find(s=>
(s.day==="ALL"||s.day===day)
&& s.periods.includes(i)
);

if(special){

slots.push({
id:"S"+i,
type:"special",
label:special.name
});

cur.setMinutes(cur.getMinutes()+special.dur);

}else{

let st=cur.toTimeString().slice(0,5);
cur.setMinutes(cur.getMinutes()+dur);

slots.push({
id:"P"+i,
type:"period",
label:"P"+i
});
}

if(i==breakAfter.value){
slots.push({type:"break",label:"BREAK"});
cur.setMinutes(cur.getMinutes()+20);
}

if(i==lunchAfter.value){
slots.push({type:"break",label:"LUNCH"});
cur.setMinutes(cur.getMinutes()+45);
}

}

return slots;
}

/* GENERATE */

function generate(){

DATA=[];

for(let r of REGISTRY){

let left=r.pwk;

for(let d of DAYS){

if(left<=0) break;

if(DATA.some(x=>x.sub==r.sub&&x.frm==r.frm&&x.d==d))
continue;

let slots=buildSlots(d);

let periods=slots.filter(x=>x.type=="period");

for(let i=0;i<periods.length;i++){

if(left<=0) break;

let p=periods[i];

if(!DATA.find(x=>x.d==d&&x.p==p.id)){

DATA.push({sub:r.sub,tea:r.tea,frm:r.frm,d,p:p.id});
left--;
}
}

}

}

render();

}

/* RENDER */

function render(){

let html="";

DAYS.forEach(d=>{

html+=`<div class="card"><h3>${d}</h3><table><tr><th>Class</th>`;

let slots=buildSlots(d);

slots.forEach(s=>html+=`<th>${s.label}</th>`);

html+=`</tr>`;

CLASSES.forEach(c=>{

html+=`<tr><td>${c}</td>`;

slots.forEach(s=>{

let m=DATA.find(x=>x.d==d&&x.p==s.id&&x.frm==c);

if(s.type=="special")
html+=`<td class="special">${s.label}</td>`;
else if(s.type=="break")
html+=`<td class="break">${s.label}</td>`;
else
html+=`<td>${m?m.sub:""}</td>`;

});

html+=`</tr>`;
});

html+=`</table></div>`;

});

app.innerHTML=html;

}

/* CSV */

function loadCSV(e){

let reader=new FileReader();

reader.onload=function(ev){

let lines=ev.target.result.split("\n");

REGISTRY=[];

for(let l of lines.slice(1)){

let p=l.split(",");

if(p.length<4) continue;

REGISTRY.push({
sub:p[0],
tea:p[1],
pwk:+p[2],
frm:p[3]
});

}

alert("Loaded");

};

reader.readAsText(e.target.files[0]);

}

</script>

</body>
</html>
