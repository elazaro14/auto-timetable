<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TT-PRO Admin - Tanzania Edition</title>
<style>
:root {
  --primary:#0f172a; --secondary:#1e293b; --accent:#22c55e;
  --bg:#f1f5f9; --danger:#ef4444; --info: #0ea5e9;
}

body { margin:0; font-family:'Segoe UI', Tahoma, sans-serif; display:flex; height: 100vh; overflow:hidden; }

.sidebar { width:260px; background:var(--secondary); color:white; padding:15px; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-y: auto; }
.sidebar h3 { text-align: center; border-bottom: 1px solid #334155; padding-bottom: 10px; color: var(--accent); }

.config-group { background: #1e293b; border: 1px solid #334155; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
.config-group label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
.config-group input, .config-group select { width: 100%; padding: 6px; border-radius: 4px; border: none; margin-bottom: 8px; box-sizing: border-box; }

.sidebar button {
  width:100%; margin:5px 0; padding:10px;
  background:#334155; color:white; border:none; border-radius:6px;
  cursor:pointer; text-align: left; transition: 0.3s; font-size: 13px;
}
.sidebar button:hover { background: #475569; }

.main { flex:1; padding:20px; background:var(--bg); overflow-y: auto; }
.card { background:white; padding:20px; border-radius:10px; margin-bottom:15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
table { width:100%; border-collapse:collapse; background: white; }
th, td { border:1px solid #e2e8f0; padding:8px; text-align:center; font-size: 12px; }
th { background: #f8fafc; color: var(--primary); }

.break-cell { background: #f1f5f9; color: #64748b; font-style: italic; font-weight: bold; width: 40px; writing-mode: vertical-rl; text-orientation: mixed; }
.slot { padding:4px; border-radius:4px; font-weight: 500; font-size: 10px; border: 1px solid #cbd5e1; }

@media print { .sidebar, .no-print { display: none !important; } .main { padding: 0; } .card { box-shadow: none; border: 1px solid #000; } }
</style>
</head>

<body>

<div class="sidebar no-print">
    <h3>TT-PRO ADMIN</h3>
    
    <div class="config-group">
        <label>School Start Time</label>
        <input type="time" id="startTime" value="08:00">
        
        <label>Period Duration (mins)</label>
        <input type="number" id="pDur" value="40">
    </div>

    <div class="config-group">
        <label>Include Break/Lunch?</label>
        <select id="breakOpt" onchange="toggleBreakUI()">
            <option value="yes">YES</option>
            <option value="no">NO</option>
        </select>
        
        <div id="breakConfig">
            <label>After Period No.</label>
            <input type="number" id="breakAfter" value="4">
            <label>Break Duration (mins)</label>
            <input type="number" id="breakDur" value="30">
        </div>
    </div>

    <button onclick="renderDashboard()">📊 Dashboard</button>
    <button onclick="renderRegistry()">🗂 Registry</button>
    <button onclick="generate()">⚙️ Generate Timetable</button>
    <button onclick="renderWorkload()">⚖️ Teacher Loads</button>

    <div style="margin-top: auto;">
        <input type="file" id="csvIn" style="display:none" accept=".csv" onchange="handleCSV(event)">
        <button onclick="document.getElementById('csvIn').click()" style="background:var(--info)">📥 Upload CSV Template</button>
        <button onclick="window.print()" style="background:#4b5563; margin-top: 5px;">🖨️ Print to PDF</button>
    </div>
</div>

<div class="main">
    <div id="app"></div>
</div>

<script>
let DATA=[];
let REGISTRY=[];
let TEACHERS=[];
let CLASSES=[];
let SLOTS=[];

const DAYS=["MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY"];

function toggleBreakUI() {
    document.getElementById('breakConfig').style.display = 
        document.getElementById('breakOpt').value === 'yes' ? 'block' : 'none';
}

/* BUILD TIME SLOTS */
function buildTimeSlots() {
    SLOTS = [];
    let currentTime = new Date("2026-01-01T" + document.getElementById('startTime').value);
    const duration = parseInt(document.getElementById('pDur').value);
    const breakOpt = document.getElementById('breakOpt').value;
    const breakAfter = parseInt(document.getElementById('breakAfter').value);
    const breakDur = parseInt(document.getElementById('breakDur').value);
    
    // We assume a standard 9-period day for Tanzania schools
    for(let i=1; i<=9; i++) {
        let startStr = currentTime.toTimeString().slice(0,5);
        currentTime.setMinutes(currentTime.getMinutes() + duration);
        let endStr = currentTime.toTimeString().slice(0,5);
        
        SLOTS.push({ id: 'P'+i, time: `${startStr}-${endStr}`, isBreak: false });

        if(breakOpt === 'yes' && i === breakAfter) {
            let bStart = currentTime.toTimeString().slice(0,5);
            currentTime.setMinutes(currentTime.getMinutes() + breakDur);
            let bEnd = currentTime.toTimeString().slice(0,5);
            SLOTS.push({ id: 'BREAK', time: `${bStart}-${bEnd}`, isBreak: true });
        }
    }
}

/* CSV HANDLER (MATCHING YOUR TEMPLATE) */
function handleCSV(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim() !== "");
        const rawMap = {};
        lines.slice(1).forEach(line => {
            const cols = line.split(',').map(c => c.trim().toUpperCase());
            if (cols.length >= 4) {
                const [sub, tea, rm, frm] = [cols[0], cols[1], cols[2], cols[3]];
                const key = `${sub}|${tea}|${frm}|${rm}`;
                rawMap[key] = (rawMap[key] || 0) + 1;
            }
        });
        REGISTRY = [];
        TEACHERS = []; CLASSES = [];
        for (let key in rawMap) {
            const [sub, tea, frm, rm] = key.split('|');
            REGISTRY.push({ sub, tea, frm, rm, pwk: rawMap[key] });
            if(!TEACHERS.includes(tea)) TEACHERS.push(tea);
            if(!CLASSES.includes(frm)) CLASSES.push(frm);
        }
        renderRegistry();
    };
    reader.readAsText(e.target.files[0]);
}

/* ENGINE: DOUBLE PERIOD RULE */
function generate(){
    buildTimeSlots();
    DATA=[];
    let sortedReg = [...REGISTRY].sort((a,b) => b.pwk - a.pwk);

    sortedReg.forEach(r => {
        let left = r.pwk;
        
        // Priority 1: Double Period (once per day)
        DAYS.forEach(day => {
            if(left < 2) return;
            for(let i=0; i < SLOTS.length - 1; i++) {
                let s1 = SLOTS[i], s2 = SLOTS[i+1];
                if(!s1.isBreak && !s2.isBreak && !isBusy(day, s1.id, r) && !isBusy(day, s2.id, r)) {
                    DATA.push({...r, d: day, p: s1.id}, {...r, d: day, p: s2.id});
                    left -= 2;
                    break; 
                }
            }
        });

        // Priority 2: Singles
        DAYS.forEach(day => {
            if(left <= 0) return;
            SLOTS.forEach(s => {
                if(!s.isBreak && left > 0 && !isBusy(day, s.id, r)) {
                    DATA.push({...r, d: day, p: s.id});
                    left--;
                }
            });
        });
    });
    renderTable();
}

function isBusy(d,p,r){
    return DATA.some(x=>x.d===d && x.p===p && (x.tea===r.tea || x.frm===r.frm));
}

function renderTable(){
    let h=`<h2>Generated Timetables</h2>`;
    CLASSES.sort().forEach(f => {
        h += `<div class="card page-break"><h3>FORM: ${f}</h3><table><tr><th>Day</th>`;
        SLOTS.forEach(s => h += `<th>${s.id}<br><small style="font-weight:normal">${s.time}</small></th>`);
        h += `</tr>`;
        DAYS.forEach(d => {
            h += `<tr><td><b>${d}</b></td>`;
            SLOTS.forEach(s => {
                if(s.isBreak) {
                    h += `<td class="break-cell">BREAK</td>`;
                } else {
                    let m = DATA.find(x => x.d===d && x.p===s.id && x.frm===f);
                    h += `<td>${m ? `<div class="slot"><b>${m.sub}</b><br>${m.tea}</div>` : ''}</td>`;
                }
            });
            h += `</tr>`;
        });
        h += `</table></div>`;
    });
    document.getElementById("app").innerHTML = h;
}

function renderDashboard() {
    document.getElementById("app").innerHTML = `<div class="card"><h2>Dashboard</h2><p>Teachers: ${TEACHERS.length}</p><p>Classes: ${CLASSES.length}</p></div>`;
}

function renderRegistry() {
    let h=`<div class="card"><h2>Registry</h2><table><tr><th>Sub</th><th>Teacher</th><th>Class</th><th>P/W</th></tr>`;
    REGISTRY.forEach(r => h+=`<tr><td>${r.sub}</td><td>${r.tea}</td><td>${r.frm}</td><td>${r.pwk}</td></tr>`);
    document.getElementById("app").innerHTML = h+"</table></div>";
}

function renderWorkload() {
    let loads = {};
    DATA.forEach(x => loads[x.tea] = (loads[x.tea] || 0) + 1);
    let h = `<div class="card"><h2>Workload</h2><table><tr><th>Teacher</th><th>Periods</th></tr>`;
    Object.keys(loads).sort().forEach(t => h += `<tr><td>${t}</td><td>${loads[t]}</td></tr>`);
    document.getElementById("app").innerHTML = h + `</table></div>`;
}
</script>
</body>
</html>
