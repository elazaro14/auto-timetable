<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TT-PRO Enterprise - Workload & Breaks</title>
<style>
:root {
  --primary:#0f172a; --secondary:#1e293b; --accent:#22c55e;
  --bg:#f8fafc; --border:#e2e8f0; --text:#334155; --danger:#ef4444; --info:#3b82f6;
}
body { margin:0; font-family:'Inter', system-ui, sans-serif; display:flex; height: 100vh; background:var(--bg); color: var(--text); overflow:hidden; }

/* SIDEBAR */
.sidebar { 
    width:350px; background:var(--primary); color:white; padding:20px; 
    display: flex; flex-direction: column; gap: 10px; overflow-y: auto;
    box-shadow: 4px 0 15px rgba(0,0,0,0.2); z-index:10;
}
.sidebar h2 { color: var(--accent); font-size: 1.1rem; text-align: center; border-bottom: 1px solid #334155; padding-bottom: 10px; margin:0; }

.setting-card { background: #1e293b; padding: 12px; border-radius: 8px; border: 1px solid #334155; }
.setting-card label { display: block; font-size: 10px; text-transform: uppercase; color: #94a3b8; margin-bottom: 4px; font-weight: 700; }
.setting-card input, .setting-card select { 
    width: 100%; padding: 8px; border-radius: 4px; border: none; background: #0f172a; color: white; font-size: 13px; box-sizing: border-box; margin-bottom: 5px;
}

.nav-label { font-size: 11px; color: #64748b; font-weight: 800; margin-top: 10px; border-left: 3px solid var(--accent); padding-left: 8px; text-transform: uppercase; }

.btn { width: 100%; padding: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; font-size: 13px; transition: 0.2s; text-align: left; display: flex; align-items: center; gap: 10px; }
.btn-gen { background: var(--accent); color: #064e3b; }
.btn-sec { background: #475569; color: white; }
.btn-info { background: var(--info); color: white; }
.btn:hover { opacity: 0.9; transform: translateX(3px); }

/* MAIN AREA */
.main { flex:1; display: flex; flex-direction: column; overflow: hidden; }
.top-bar { background: white; padding: 12px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.content { flex:1; padding: 20px; overflow-y: auto; }
.table-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 2px solid #000; }
th, td { border: 1px solid #000; padding: 4px; text-align: center; font-size: 9px; height: 40px; }
th { background: #f1f5f9; }
.break-cell { background: #cbd5e1; font-weight: bold; width: 30px; writing-mode: vertical-rl; text-orientation: mixed; }
.slot { padding: 3px; border-radius: 4px; font-weight: 700; background: #dcfce7; border: 1px solid #22c55e; }
.load-tag { padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: bold; }

@media print { .sidebar, .top-bar { display: none !important; } .main { padding: 0; } .table-card { page-break-after: always; border:none; } }
</style>
</head>
<body>

<div class="sidebar no-print">
    <h2>TT-PRO COMMAND</h2>

    <div class="setting-card">
        <label>School Name</label>
        <input type="text" id="schName" value="TANZANIA SECONDARY SCHOOL">
    </div>

    <div class="nav-label">Time & Break Config</div>
    <div class="setting-card">
        <div style="display: flex; gap: 5px;">
            <div style="flex:1"><label>Start</label><input type="time" id="startTime" value="08:00"></div>
            <div style="flex:1"><label>Period (min)</label><input type="number" id="dur" value="40"></div>
        </div>
        <div style="display: flex; gap: 5px; margin-top:5px;">
            <div style="flex:1"><label>Break After</label><input type="number" id="breakAfter" value="2"></div>
            <div style="flex:1"><label>Break Min</label><input type="number" id="breakMin" value="20"></div>
        </div>
        <div style="display: flex; gap: 5px; margin-top:5px;">
            <div style="flex:1"><label>Lunch After</label><input type="number" id="lunchAfter" value="4"></div>
            <div style="flex:1"><label>Lunch Min</label><input type="number" id="lunchMin" value="45"></div>
        </div>
    </div>

    <div class="nav-label">Operations</div>
    <button class="btn btn-gen" onclick="generate()">⚡ Generate Timetable</button>
    <button class="btn btn-info" onclick="viewTeacherLoads()">⚖️ View Teacher Loads</button>
    <button class="btn btn-sec" onclick="document.getElementById('csvIn').click()">📥 Import CSV Data</button>
    <input type="file" id="csvIn" style="display:none" accept=".csv" onchange="handleCSV(event)">

    <div class="nav-label">Backup</div>
    <button class="btn btn-sec" onclick="saveProject()">💾 Export Backup (.json)</button>
    <button class="btn btn-sec" onclick="document.getElementById('loadProj').click()">📂 Load Saved Project</button>
    <input type="file" id="loadProj" style="display:none" accept=".json" onchange="loadProject(event)">
    <button class="btn btn-sec" onclick="window.print()" style="background:#000;">🖨️ Print View</button>
</div>

<div class="main">
    <div class="top-bar">
        <div class="view-tabs">
            <button onclick="setView('GENERAL')">Master View</button>
            <button onclick="setView('STREAM')">By Stream</button>
            <button onclick="setView('TEACHER')">By Teacher</button>
        </div>
        <select id="viewFilter" onchange="renderActiveView()" style="padding: 6px; border-radius: 4px; display:none; min-width:150px;"></select>
    </div>
    <div class="content">
        <div id="header" style="text-align:center; margin-bottom:20px;"><h1 id="headerTitle">TANZANIA SECONDARY SCHOOL</h1></div>
        <div id="app"></div>
    </div>
</div>

<script>
let DATA = [], REGISTRY = [], CLASSES = [], TEACHERS = [], SLOTS = [], currentView = 'GENERAL';
const DAYS = ["MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY"];

// --- PERSISTENCE ---
window.onload = () => {
    const saved = localStorage.getItem('TT_PERSIST_STATE');
    if(saved) {
        const p = JSON.parse(saved);
        DATA = p.DATA; REGISTRY = p.REGISTRY; CLASSES = p.CLASSES; TEACHERS = p.TEACHERS;
        document.getElementById('schName').value = p.schName || "";
        renderActiveView();
    }
};

function autoSave() {
    localStorage.setItem('TT_PERSIST_STATE', JSON.stringify({
        DATA, REGISTRY, CLASSES, TEACHERS, schName: document.getElementById('schName').value
    }));
}

// --- LOGIC ---
function handleCSV(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim() !== "");
        const rawMap = {};
        lines.slice(1).forEach(line => {
            const cols = line.split(',').map(c => c.trim().toUpperCase());
            if (cols.length >= 4) {
                const [sub, tea, frm] = [cols[0], cols[1], cols[cols.length-1]];
                const key = `${sub}|${tea}|${frm}`;
                rawMap[key] = (rawMap[key] || 0) + 1;
            }
        });
        REGISTRY = []; CLASSES = []; TEACHERS = [];
        for (let key in rawMap) {
            const [sub, tea, frm] = key.split('|');
            REGISTRY.push({ sub, tea, frm, pwk: rawMap[key] });
            if(!CLASSES.includes(frm)) CLASSES.push(frm);
            if(!TEACHERS.includes(tea)) TEACHERS.push(tea);
        }
        autoSave();
        alert("CSV Data Imported.");
    };
    reader.readAsText(e.target.files[0]);
}

function buildSlots() {
    SLOTS = [];
    let cur = new Date("2026-01-01T" + document.getElementById('startTime').value);
    let pDur = parseInt(document.getElementById('dur').value);
    let bAft = parseInt(document.getElementById('breakAfter').value);
    let lAft = parseInt(document.getElementById('lunchAfter').value);

    for(let i=1; i<=9; i++) {
        let sS = cur.toTimeString().slice(0,5);
        cur.setMinutes(cur.getMinutes() + pDur);
        SLOTS.push({ id: 'P'+i, time: `${sS}-${cur.toTimeString().slice(0,5)}`, type: 'period' });
        
        if(i === bAft) {
            let bS = cur.toTimeString().slice(0,5);
            cur.setMinutes(cur.getMinutes() + parseInt(document.getElementById('breakMin').value));
            SLOTS.push({ id: 'BREAK', time: `${bS}-${cur.toTimeString().slice(0,5)}`, type: 'break' });
        }
        if(i === lAft) {
            let lS = cur.toTimeString().slice(0,5);
            cur.setMinutes(cur.getMinutes() + parseInt(document.getElementById('lunchMin').value));
            SLOTS.push({ id: 'LUNCH', time: `${lS}-${cur.toTimeString().slice(0,5)}`, type: 'lunch' });
        }
    }
}

function generate() {
    DATA = []; buildSlots();
    document.getElementById('headerTitle').innerText = document.getElementById('schName').value;
    let sortedReg = [...REGISTRY].sort((a,b) => b.pwk - a.pwk);

    sortedReg.forEach(r => {
        let left = r.pwk;
        // Priority Double
        for(let d=0; d<DAYS.length; d++) {
            if(left < 2) break;
            let day = DAYS[d];
            for(let i=0; i<SLOTS.length-1; i++) {
                let s1 = SLOTS[i], s2 = SLOTS[i+1];
                if(s1.type==='period' && s2.type==='period' && !isSpecial(day, s1.id) && !isSpecial(day, s2.id)) {
                    if(!isBusy(day, s1.id, r) && !isBusy(day, s2.id, r)) {
                        DATA.push({...r, d: day, p: s1.id}, {...r, d: day, p: s2.id});
                        left -= 2; break;
                    }
                }
            }
        }
        // Single
        for(let d=0; d<DAYS.length; d++) {
            if(left <= 0) break;
            let day = DAYS[d];
            if(DATA.some(x => x.d===day && x.sub===r.sub && x.frm===r.frm)) continue;
            for(let i=0; i<SLOTS.length; i++) {
                let s = SLOTS[i];
                if(s.type==='period' && !isSpecial(day, s.id) && !isBusy(day, s.id, r)) {
                    DATA.push({...r, d: day, p: s.id});
                    left--; break;
                }
            }
        }
    });
    autoSave();
    renderActiveView();
}

function isBusy(d,p,r){ return DATA.some(x=>x.d===d && x.p===p && (x.tea===r.tea || x.frm===r.frm)); }
function isSpecial(day, p) {
    if(day === 'WEDNESDAY' && (p === 'P8' || p === 'P9')) return true;
    if(day === 'THURSDAY' && (p === 'P8' || p === 'P9')) return true;
    if(day === 'FRIDAY' && (p === 'P7' || p === 'P8' || p === 'P9')) return true;
    return false;
}

// --- WORKLOAD MONITOR ---
function viewTeacherLoads() {
    let loads = {}; 
    TEACHERS.forEach(t => loads[t] = DATA.filter(x => x.tea === t).length);
    let h = `<div class="table-card"><h2>Teacher Workload (Periods/Week)</h2><table><tr><th>Teacher Name</th><th>Total Periods</th><th>Status</th></tr>`;
    Object.keys(loads).sort().forEach(t => {
        let count = loads[t];
        let status = count > 30 ? '<span class="load-tag" style="background:#fee2e2;color:#ef4444">OVERLOAD</span>' : '<span class="load-tag" style="background:#dcfce7;color:#16a34a">OK</span>';
        h += `<tr><td>${t}</td><td><b>${count}</b></td><td>${status}</td></tr>`;
    });
    document.getElementById('app').innerHTML = h + `</table></div>`;
}

// --- BACKUP ---
function saveProject() {
    const payload = { DATA, REGISTRY, CLASSES, TEACHERS, schName: document.getElementById('schName').value };
    const blob = new Blob([JSON.stringify(payload)], {type: "application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `TT_Project.json`;
    a.click();
}

function loadProject(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const p = JSON.parse(ev.target.result);
        DATA = p.DATA; REGISTRY = p.REGISTRY; CLASSES = p.CLASSES; TEACHERS = p.TEACHERS;
        document.getElementById('schName').value = p.schName;
        autoSave(); renderActiveView();
    };
    reader.readAsText(e.target.files[0]);
}

// --- VIEWS ---
function setView(v) { currentView = v; let fil = document.getElementById('viewFilter'); fil.style.display = v==='GENERAL'?'none':'inline-block';
    let list = v==='STREAM'?CLASSES.sort():TEACHERS.sort(); fil.innerHTML = ''; list.forEach(i=>fil.innerHTML+=`<option value="${i}">${i}</option>`); renderActiveView(); }

function renderActiveView() { if(currentView==='GENERAL') renderMaster(); else renderFiltered(); }

function renderMaster() {
    let h = ""; buildSlots();
    DAYS.forEach(day => {
        h += `<div class="table-card"><h3>${day}</h3><table><tr><th>Stream</th>`;
        SLOTS.forEach(s => h += `<th>${s.id}<br><small>${s.time}</small></th>`);
        h += `</tr>`;
        CLASSES.sort().forEach(f => {
            h += `<tr><td style="font-weight:bold">${f}</td>`;
            SLOTS.forEach(s => {
                if(s.type==='break'||s.type==='lunch') h += `<td class="break-cell">${s.id}</td>`;
                else if(isSpecial(day, s.id)) h += `<td style="background:#fef3c7;font-size:7px">SPEC</td>`;
                else {
                    let m = DATA.find(x => x.d===day && x.p===s.id && x.frm===f);
                    h += `<td>${m?`<div class="slot">${m.sub}<br>${m.tea}</div>`:''}</td>`;
                }
            });
            h += `</tr>`;
        });
        h += `</table></div>`;
    });
    document.getElementById('app').innerHTML = h;
}

function renderFiltered() {
    const val = document.getElementById('viewFilter').value;
    let key = currentView==='STREAM'?'frm':'tea';
    let h = `<div class="table-card"><h3>${val}</h3><table><tr><th>Day</th>`;
    SLOTS.forEach(s => h += `<th>${s.id}</th>`);
    h += `</tr>`;
    DAYS.forEach(d => {
        h += `<tr><td><b>${d}</b></td>`;
        SLOTS.forEach(s => {
            if(s.type==='break'||s.type==='lunch') h += `<td class="break-cell">${s.id}</td>`;
            else if(isSpecial(d, s.id)) h += `<td style="background:#fef3c7">SPEC</td>`;
            else {
                let m = DATA.find(x => x.d===d && x.p===s.id && x[key]===val);
                h += `<td>${m?`<div class="slot">${m.sub}<br>${key==='tea'?m.frm:m.tea}</div>`:''}</td>`;
            }
        });
        h += `</tr>`;
    });
    document.getElementById('app').innerHTML = h + `</table></div>`;
}
</script>
</body>
</html>
