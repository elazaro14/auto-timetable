<style>

/* ===== PROFESSIONAL COLOR SYSTEM ===== */

:root{

    /* Brand */
    --primary:#2563eb;
    --primary-dark:#1d4ed8;
    --primary-light:#dbeafe;

    /* Success */
    --success:#16a34a;
    --success-light:#dcfce7;

    /* Warning */
    --warning:#f59e0b;
    --warning-light:#fef3c7;

    /* Danger */
    --danger:#dc2626;

    /* Layout */
    --sidebar:#0f172a;
    --sidebar-light:#1e293b;
    --background:#f8fafc;
    --card:#ffffff;

    /* Text */
    --text:#0f172a;
    --text-light:#64748b;
    --white:#ffffff;

    /* Borders */
    --border:#e2e8f0;

    /* Shadows */
    --shadow-sm:0 1px 2px rgba(0,0,0,.05);
    --shadow-md:0 4px 10px rgba(0,0,0,.08);
    --shadow-lg:0 10px 25px rgba(0,0,0,.12);

    /* Radius */
    --radius:12px;
}

/* ===== BODY ===== */

body{
    margin:0;
    font-family:'Inter',system-ui,sans-serif;
    display:flex;
    height:100vh;
    background:var(--background);
    color:var(--text);
}

/* ===== SIDEBAR ===== */

.sidebar{
    width:340px;
    background:linear-gradient(180deg,#0f172a 0%,#1e293b 100%);
    color:white;
    padding:20px;
    overflow-y:auto;
    box-shadow:var(--shadow-lg);
    border-right:1px solid #334155;
}

.sidebar h2{
    color:#38bdf8;
    text-align:center;
    margin-top:0;
    margin-bottom:25px;
    font-size:1.5rem;
    letter-spacing:1px;
    font-weight:800;
}

/* ===== LABELS ===== */

label{
    display:block;
    font-size:11px;
    text-transform:uppercase;
    color:#94a3b8;
    margin-bottom:5px;
    margin-top:12px;
    font-weight:700;
    letter-spacing:.5px;
}

/* ===== INPUTS ===== */

input,
select{
    width:100%;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid #334155;
    background:#1e293b;
    color:white;
    outline:none;
    transition:.2s;
    font-size:13px;
}

input:focus,
select:focus{
    border-color:#38bdf8;
    box-shadow:0 0 0 3px rgba(56,189,248,.2);
}

/* ===== BUTTONS ===== */

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:8px;
    cursor:pointer;
    font-weight:700;
    transition:.2s;
    font-size:13px;
}

button:hover{
    transform:translateY(-1px);
}

.btn-green{
    background:linear-gradient(135deg,#22c55e,#16a34a);
    color:white;
    box-shadow:0 4px 10px rgba(34,197,94,.25);
}

.btn-green:hover{
    background:linear-gradient(135deg,#16a34a,#15803d);
}

.btn-blue{
    background:linear-gradient(135deg,#3b82f6,#2563eb);
    color:white;
    box-shadow:0 4px 10px rgba(59,130,246,.25);
}

.btn-blue:hover{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

.btn-gray{
    background:#334155;
    color:white;
}

.btn-gray:hover{
    background:#475569;
}

.btn-red{
    background:linear-gradient(135deg,#ef4444,#dc2626);
    color:white;
}

/* ===== SPECIAL BOX ===== */

.special-box{
    background:rgba(255,255,255,.03);
    border:1px dashed #475569;
    padding:15px;
    border-radius:var(--radius);
    margin-top:15px;
}

/* ===== MAIN ===== */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

/* ===== TOPBAR ===== */

.topbar{
    background:white;
    padding:14px 20px;
    border-bottom:1px solid var(--border);
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
    box-shadow:var(--shadow-sm);
}

/* ===== CONTENT ===== */

.content{
    flex:1;
    overflow:auto;
    padding:25px;
}

/* ===== STATS ===== */

.stats{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.stat{
    background:white;
    padding:15px 20px;
    border-radius:16px;
    box-shadow:var(--shadow-sm);
    border:1px solid var(--border);
    font-weight:700;
    min-width:180px;
}

/* ===== CARDS ===== */

.card{
    background:white;
    border-radius:18px;
    padding:18px;
    margin-bottom:25px;
    box-shadow:var(--shadow-md);
    border:1px solid var(--border);
}

/* ===== TABLE ===== */

table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
    overflow:hidden;
    border-radius:12px;
}

th,
td{
    border:1px solid var(--border);
    text-align:center;
    padding:6px;
    font-size:11px;
}

th{
    background:#f8fafc;
    color:#475569;
    font-weight:800;
}

/* ===== TIMETABLE CELLS ===== */

.slot{
    background:linear-gradient(135deg,#dcfce7,#bbf7d0);
    color:#14532d;
    border:1px solid #86efac;
    border-radius:10px;
    padding:6px;
    font-weight:700;
    min-height:42px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    transition:.2s;
}

.slot:hover{
    transform:scale(1.02);
}

/* ===== BREAK ===== */

.break-cell{
    background:linear-gradient(135deg,#f1f5f9,#e2e8f0);
    color:#475569;
    font-weight:700;
}

/* ===== SPECIAL ===== */

.special-cell{
    background:linear-gradient(135deg,#fef3c7,#fde68a);
    color:#92400e;
    font-weight:800;
    border:1px solid #facc15;
}

/* ===== HEADINGS ===== */

h2,h3,h4{
    margin-top:0;
    color:var(--text);
}

/* ===== SCROLLBAR ===== */

::-webkit-scrollbar{
    width:10px;
    height:10px;
}

::-webkit-scrollbar-thumb{
    background:#94a3b8;
    border-radius:20px;
}

::-webkit-scrollbar-track{
    background:#e2e8f0;
}

/* ===== PRINT ===== */

@media print{

    .sidebar,
    .topbar{
        display:none!important;
    }

    body{
        display:block;
        background:white;
    }

    .main{
        display:block;
    }

    .card{
        page-break-inside:avoid;
        box-shadow:none;
    }
}

</style>
