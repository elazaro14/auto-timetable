<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TT-PRO Platinum | 2026 Professional Edition</title>
    <style>
        :root { --row-height: 48px; --font-size: 11px; --primary: #2c3e50; --accent: #28a745; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 5px solid var(--primary); }
        
        .header-main { text-align: center; margin-bottom: 20px; }
        .header-main h1 { margin: 0; color: var(--primary); font-size: 24px; letter-spacing: 1px; }
        .expiry-tag { color: #d9534f; font-weight: bold; font-size: 12px; margin-top: 5px; display: block; }

        table { width: 100%; border-collapse: collapse; background: white; table-layout: fixed; margin-bottom: 30px; border: 2px solid #333; }
        th, td { border: 1px solid #444; padding: 5px; text-align: center; font-size: var(--font-size); height: var(--row-height); }
        th { background: var(--primary); color: white; font-weight: 600; text-transform: uppercase; }
        
        .break-cell { background: #e9ecef; font-weight: bold; color: #555; width: 30px !important; font-size: 9px; writing-mode: vertical-rl; text-orientation: mixed; }
        .day-label { background: #34495e; color: white; font-size: 16px; padding: 10px; text-align: center; margin-top: 20px; border-radius: 6px 6px 0 0; }
        
        .controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 15px; }
        .btn { padding: 10px 18px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; }
        .btn-blue { background: #007bff; }
        .btn-green { background: var(--accent); }
        .btn-wa { background: #25D366; display: flex; align-items: center; gap: 5px; margin: 10px auto; }

        .view-bar { background: #fff; padding: 15px; border-radius: 8px; display: none; text-align: center; border: 1px solid #ddd; }
        
        @media print { 
            .panel, .view-bar, .no-print { display: none !important; } 
            body { background: white; padding: 0; }
            .day-section { page-break-after: always; }
        }
    </style>
</head>
<body>

<div class="panel container no-print">
    <div class="header-main">
        <h1>SCHOOL MANAGEMENT TIMETABLE 2026</h1>
        <span id="expiryStatus" class="expiry-tag"></span>
    </div>

    <div class="controls">
        <input type="file" id="ttproFile" accept=".ttpro" hidden onchange="loadProject(event)">
        <button class="btn btn-blue" onclick="document.getElementById('ttproFile').click()">📂 Load Data (.ttpro)</button>
        <button class="btn btn-green" id="genBtn" onclick="generate()" style="display:none;">🚀 Generate Full School</button>
        <button class="btn" onclick="window.print()" style="background:#455a64;">🖨️ Print to PDF</button>
    </div>
    
    <div class="view-bar" id="viewBar">
        <button onclick="renderMaster()">Full School View</button>
        <select id="selTeacher" onchange="renderIndividual('teacher')"><option value="">-- View Teacher --</option></select>
        <select id="selStream" onchange="renderIndividual('stream')"><option value="">-- View Class --</option></select>
    </div>
</div>

<div id="output" class="container"></div>

<script>
// CONFIGURATION
const DAYS = ["MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY"];
const PERIODS = [
    {p:"P1", t:"08:00"}, {p:"P2", t:"08:40"}, {p:"P3", t:"09:20"}, {p:"P4", t:"10:00"},
    {p:"BREAK", t:"10:40"},
    {p:"P5", t:"11:10"}, {p:"P6", t:"11:50"}, {p:"P7", t:"12:30"}, {p:"P8", t:"13:10"}, {p:"P9", t:"13:50"}
];
const EXPIRY_DATE = new Date("2026-12-31"); // Professional expiry logic

let REGISTRY = [], TIMETABLE = [];

function checkExpiry() {
    const now = new Date();
    const diff = Math.ceil((EXPIRY_DATE - now) / (1000 * 60 * 60 * 24));
    const tag = document.getElementById('expiryStatus');
    if (diff <= 0) {
        tag.innerHTML = "❌ LICENSE EXPIRED: Please contact administrator for 2027 renewal.";
        document.body.innerHTML = `<h1 style='color:red; text-align:center; margin-top:100px;'>${tag.innerHTML}</h1>`;
    } else {
        tag.innerHTML = `✔ License Active (${diff} days remaining)`;
    }
}
checkExpiry();

function loadProject(ev) {
    const reader = new FileReader();
    reader.onload = (e) => {
        const p = JSON.parse(e.target.result);
        const source = p.registry || p.reg || [];
        REGISTRY = source.map(i => ({
            subject: i.s || i.sub || "",
            teacher: i.t || i.tea || "",
            form: i.f || i.frm || "",
            pwk: parseInt(i.p || i.pwk || 0)
        }));
        initUI();
        document.getElementById('genBtn').style.display = 'inline-block';
        alert("System Synchronized: " + REGISTRY.length + " entries loaded.");
    };
    reader.readAsText(ev.target.files[0]);
}

function initUI() {
    const ts = [...new Set(REGISTRY.map(x => x.teacher))].sort();
    const fs = [...new Set(REGISTRY.map(x => x.form))].sort();
    document.getElementById('selTeacher').innerHTML = '<option value="">-- View Teacher --</option>' + ts.map(t => `<option>${t}</option>`).join('');
    document.getElementById('selStream').innerHTML = '<option value="">-- View Class --</option>' + fs.map(f => `<option>${f}</option>`).join('');
}

function generate() {
    TIMETABLE = [];
    const slots = PERIODS.filter(p => p.p !== "BREAK").map(p => p.p);
    
    // Sort REGISTRY: Heavy workloads first to ensure they get space
    const sorted = [...REGISTRY].sort((a,b) => b.pwk - a.pwk);

    sorted.forEach(item => {
        let remaining = item.pwk;
        
        // Pass 1: Try placing double periods (not spanning break)
        for(let d of DAYS) {
            if(remaining < 2) break;
            for(let i=0; i<slots.length-1; i++) {
                const p1 = slots[i], p2 = slots[i+1];
                if(p1 === "P4" && p2 === "P5") continue; // The "Break Yes" constraint 
                
                if(canPlace(d, p1, item) && canPlace(d, p2, item)) {
                    TIMETABLE.push({...item, day: d, period: p1}, {...item, day: d, period: p2});
                    remaining -= 2; break; 
                }
            }
        }
        
        // Pass 2: Place remaining singles
        for(let d of DAYS) {
            if(remaining <= 0) break;
            for(let p of slots) {
                if(remaining <= 0) break;
                if(canPlace(d, p, item)) {
                    TIMETABLE.push({...item, day: d, period: p});
                    remaining--;
                }
            }
        }
    });

    document.getElementById('viewBar').style.display = 'block';
    renderMaster();
}

function canPlace(d, p, l) {
    const tBusy = TIMETABLE.some(t => t.day === d && t.period === p && t.teacher === l.teacher);
    const fBusy = TIMETABLE.some(t => t.day === d && t.period === p && t.form === l.form);
    return !tBusy && !fBusy;
}

function renderMaster() {
    const forms = [...new Set(REGISTRY.map(x => x.form))].sort();
    let html = "";
    DAYS.forEach(day => {
        html += `<div class="day-section"><div class="day-label">${day}</div>`;
        html += `<table><tr><th>CLASS</th>` + PERIODS.map(p => `<th>${p.p}<br><small>${p.t}</small></th>`).join('') + `</tr>`;
        forms.forEach(f => {
            html += `<tr><td style="font-weight:bold; background:#f8f9fa;">${f}</td>`;
            PERIODS.forEach(p => {
                if(p.p === "BREAK") html += `<td class="break-cell">TEA BREAK</td>`;
                else {
                    const m = TIMETABLE.find(x => x.day === day && x.period === p.p && x.form === f);
                    html += `<td>${m ? `<b>${m.subject}</b><br>${m.teacher}` : ''}</td>`;
                }
            });
            html += `</tr>`;
        });
        html += `</table></div>`;
    });
    document.getElementById('output').innerHTML = html;
}

function renderIndividual(type) {
    const val = type === 'teacher' ? document.getElementById('selTeacher').value : document.getElementById('selStream').value;
    if(!val) return;
    
    let whatsappText = `*OFFICIAL TIMETABLE: ${val}*%0A%0A`;
    let html = `<div class="panel" style="max-width:900px; margin:auto;">`;
    html += `<h2 style="text-align:center; color:var(--primary);">${val} PERSONAL SCHEDULE</h2>`;
    html += `<table><tr><th>DAY</th>` + PERIODS.map(p => `<th>${p.p}</th>`).join('') + `</tr>`;
    
    DAYS.forEach(day => {
        html += `<tr><td style="font-weight:bold">${day}</td>`;
        whatsappText += `*${day}:*%0A`;
        PERIODS.forEach(p => {
            if(p.p === "BREAK") {
                html += `<td class="break-cell">BREAK</td>`;
            } else {
                const m = TIMETABLE.find(x => x.day === day && x.period === p.p && (type === 'teacher' ? x.teacher === val : x.form === val));
                const content = m ? (type === 'teacher' ? `${m.subject} (${m.form})` : `${m.subject} [${m.teacher}]`) : '-';
                html += `<td>${content}</td>`;
                if(m) whatsappText += `${p.p} (${p.t}): ${content}%0A`;
            }
        });
        whatsappText += `%0A`;
        html += `</tr>`;
    });
    
    html += `</table>`;
    html += `<button class="btn btn-wa no-print" onclick="window.open('https://wa.me/?text=${whatsappText}')">📲 Share via WhatsApp</button></div>`;
    document.getElementById('output').innerHTML = html;
}
</script>
</body>
</html>
