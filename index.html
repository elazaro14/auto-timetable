<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TT-Pro Diamond - Final Stable Suite</title>
    <style>
        :root { --primary: #1a237e; --secondary: #0d47a1; --accent: #00c853; --bg: #f0f2f5; --danger: #d32f2f; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 320px; background: var(--primary); color: white; display: flex; flex-direction: column; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.2); z-index: 10; overflow-y: auto; }
        .sidebar h2 { font-size: 18px; margin: 0 0 20px 0; border-bottom: 2px solid var(--accent); padding-bottom: 10px; text-align: center; letter-spacing: 1px; }
        
        .config-group { background: rgba(255,255,255,0.08); padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        .config-group h4 { margin: 0 0 10px 0; font-size: 10px; text-transform: uppercase; color: var(--accent); }
        .row-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 12px; }
        .row-item input { width: 70px; padding: 5px; border-radius: 4px; border: none; outline: none; }
        
        /* Main Space */
        .main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .card { background: white; border-radius: 8px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Registry Table */
        #regItems { max-height: 200px; overflow-y: auto; border: 1px solid #ddd; border-radius: 4px; background: #fff; padding: 10px; margin-top: 10px; }
        .reg-row { display: grid; grid-template-columns: 1.5fr 1.2fr 0.8fr 0.8fr 0.5fr 30px; gap: 5px; margin-bottom: 5px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .reg-row input { padding: 4px; font-size: 11px; border: 1px solid #ccc; border-radius: 3px; }

        /* Timetable Grid */
        .timetable-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; table-layout: fixed; border: 2px solid #333; margin-top: 15px; }
        th, td { border: 1px solid #333; padding: 4px; text-align: center; font-size: 10px; min-height: 50px; }
        th { background: #e8eaf6; font-weight: bold; color: var(--primary); }
        .day-header { background: var(--primary); color: white; padding: 10px; font-weight: bold; text-align: center; border: 2px solid #333; margin-top: 20px; }
        
        .slot-block { background: #e3f2fd; border: 1px solid var(--secondary); border-radius: 3px; padding: 2px; cursor: move; }
        .slot-block b { display: block; font-size: 9px; color: #1a237e; }
        .time-sub { font-size: 8px; color: #c62828; display: block; font-weight: bold; }
        
        .break-cell { background: #eee !important; writing-mode: vertical-rl; font-size: 9px; font-weight: bold; color: #777; width: 25px !important; }
        .special-cell { background: #fff9c4 !important; font-weight: bold; font-size: 9px; }

        .btn { padding: 10px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.2s; width: 100%; margin-top: 5px; }
        .btn-main { background: var(--accent); color: white; margin-top: 15px; font-size: 13px; }
        .btn-alt { background: #546e7a; color: white; }
        .btn-check { background: var(--danger); color: white; }

        #logPanel { font-family: monospace; font-size: 10px; background: #222; color: #0f0; padding: 10px; border-radius: 4px; max-height: 100px; overflow-y: auto; margin-top: 20px; }

        @media print { .no-print { display: none !important; } .day-section { page-break-after: always; } table { border: 1px solid #000; } }
    </style>
</head>
<body>

<div class="sidebar no-print">
    <h2>TT-PRO DIAMOND</h2>
    
    <div class="config-group">
        <h4>Data Persistence</h4>
        <button class="btn btn-alt" onclick="saveProject()">💾 Save Project</button>
        <button class="btn btn-alt" onclick="document.getElementById('loadInput').click()" style="margin-top:5px;">📂 Load Project</button>
        <input type="file" id="loadInput" style="display:none" accept=".ttpro" onchange="loadProject(event)">
    </div>

    <div class="config-group">
        <h4>Timing Setup</h4>
        <div class="row-item"><span>Start Time:</span> <input type="time" id="startTime" value="08:00"></div>
        <div class="row-item"><span>Duration (m):</span> <input type="number" id="pDur" value="40"></div>
        <div class="row-item"><span>Periods:</span> <input type="number" id="pTotal" value="9"></div>
    </div>

    <div class="config-group">
        <h4>Breaks (Tanzania Std)</h4>
        <div class="row-item"><span>Short (After P):</span> <input type="number" id="breakAfter" value="3"></div>
        <div class="row-item"><span>Mins:</span> <input type="number" id="breakLen" value="20"></div>
        <hr style="opacity:0.1">
        <div class="row-item"><span>Lunch (After P):</span> <input type="number" id="lunchAfter" value="6"></div>
        <div class="row-item"><span>Mins:</span> <input type="number" id="lunchLen" value="45"></div>
    </div>

    <div class="config-group">
        <h4>School Info</h4>
        <input type="text" id="schoolName" value="EXCELLENCE SECONDARY SCHOOL" style="width:100%; border-radius:4px; border:none; padding:5px; font-size:11px; margin-bottom:5px;">
        <input type="text" id="calYear" value="2026" style="width:100%; border-radius:4px; border:none; padding:5px; font-size:11px;">
    </div>

    <button class="btn btn-main" onclick="generateTimetable()">🚀 Generate Master</button>
    <button class="btn btn-alt" onclick="window.print()">🖨️ Print to PDF</button>

    <div id="logPanel">System Ready...</div>
</div>

<div class="main">
    <div class="card no-print">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0; font-size:16px;">1. Subject Registry</h3>
            <div style="display:flex; gap:10px;">
                <input type="file" id="csvFile" accept=".csv" style="font-size:11px;">
                <button class="btn btn-alt" id="addManualBtn" style="width:auto; padding:5px 15px;">+ Manual Row</button>
            </div>
        </div>
        <div id="regItems"></div>
    </div>

    <div class="card no-print" id="viewControls" style="display:none; padding:10px;">
        <div style="display:flex; gap:10px; align-items:center;">
            <button class="btn btn-alt" onclick="renderMaster()" style="width:auto;">Master Grid</button>
            <button class="btn btn-alt" onclick="renderLoadReport()" style="width:auto;">Load Report</button>
            <button class="btn btn-check" onclick="runCollisionCheck()" style="width:auto;">⚠️ Collision Check</button>
            <select id="selStream" onchange="renderIndividual('stream')" style="padding:5px; border-radius:4px; border:1px solid #ccc;"><option value="">-- By Stream --</option></select>
            <select id="selTeacher" onchange="renderIndividual('teacher')" style="padding:5px; border-radius:4px; border:1px solid #ccc;"><option value="">-- By Teacher --</option></select>
        </div>
    </div>

    <div id="timetableArea"></div>
</div>

<script>
let DATA = [], SLOTS = [], REGISTRY = [];
const DAYS = ["MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY"];
let draggedIdx = null;

function log(msg) {
    const p = document.getElementById('logPanel');
    p.innerHTML += `> ${msg}<br>`;
    p.scrollTop = p.scrollHeight;
}

// Fixed Row Addition
function addRegistryRow(s="", t="", r="", f="", p=5) {
    const container = document.getElementById('regItems');
    if(!container) return;
    const div = document.createElement('div');
    div.className = 'reg-row';
    div.innerHTML = `
        <input type="text" class="r-sub" value="${s}" placeholder="Subject">
        <input type="text" class="r-tea" value="${t}" placeholder="Teacher">
        <input type="text" class="r-room" value="${r}" placeholder="Room">
        <input type="text" class="r-frm" value="${f}" placeholder="Form">
        <input type="number" class="r-pwk" value="${p}">
        <button onclick="this.parentElement.remove()" style="color:red; background:none; border:none; cursor:pointer; font-weight:bold;">✕</button>
    `;
    container.appendChild(div);
}

// Robust CSV Parser
document.getElementById('csvFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = function(ev) {
        const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim() !== "");
        log(`Processing ${lines.length} lines from CSV...`);
        
        // Skip header if first line looks like a header
        const startIndex = (lines[0].toLowerCase().includes("teacher") || lines[0].includes(",")) ? 1 : 0;
        const counts = {};

        lines.slice(startIndex).forEach(line => {
            const cols = line.split(',').map(c => c.trim());
            if(cols.length >= 2) {
                // Tanzania Template: Col0=Subject, Col1=Teacher, Col2=Room, Col3=Form
                const key = `${cols[0] || '?'}|${cols[1] || 'Staff'}|${cols[2] || ''}|${cols[3] || 'F1'}`;
                counts[key] = (counts[key] || 0) + 1;
            }
        });

        document.getElementById('regItems').innerHTML = "";
        for(let k in counts) {
            const [s,t,rm,f] = k.split('|');
            addRegistryRow(s,t,rm,f,counts[k]);
        }
        log("CSV Import Complete.");
    };
    reader.readAsText(file);
});

document.getElementById('addManualBtn').addEventListener('click', () => addRegistryRow());

function buildTimeSlots() {
    SLOTS = [];
    let cur = new Date("2026-01-01T" + document.getElementById('startTime').value);
    const dur = parseInt(document.getElementById('pDur').value);
    const total = parseInt(document.getElementById('pTotal').value);
    const bA = parseInt(document.getElementById('breakAfter').value);
    const bL = parseInt(document.getElementById('breakLen').value);
    const lA = parseInt(document.getElementById('lunchAfter').value);
    const lL = parseInt(document.getElementById('lunchLen').value);

    for(let i=1; i<=total; i++) {
        let sStr = cur.toTimeString().slice(0,5);
        cur.setMinutes(cur.getMinutes() + dur);
        let eStr = cur.toTimeString().slice(0,5);
        SLOTS.push({ id: 'P'+i, time: `${sStr}-${eStr}`, isB: false });

        if(i === bA) {
            let start = cur.toTimeString().slice(0,5);
            cur.setMinutes(cur.getMinutes() + bL);
            SLOTS.push({ id: 'BREAK', time: `${start}-${cur.toTimeString().slice(0,5)}`, isB: true });
        }
        if(i === lA) {
            let start = cur.toTimeString().slice(0,5);
            cur.setMinutes(cur.getMinutes() + lL);
            SLOTS.push({ id: 'LUNCH', time: `${start}-${cur.toTimeString().slice(0,5)}`, isB: true });
        }
    }
}

function getSpec(d, pId) {
    const p = parseInt(pId.replace('P',''));
    if(d === "WEDNESDAY" && p >= 8) return "RELIGION";
    if(d === "THURSDAY" && p >= 8) return "DEBATE";
    if(d === "FRIDAY" && p >= 7) return "MOSQUE";
    return null;
}

function generateTimetable() {
    log("Starting Generation Engine...");
    REGISTRY = [];
    document.querySelectorAll('.reg-row').forEach(r => {
        const s = r.querySelector('.r-sub').value.toUpperCase().trim();
        const t = r.querySelector('.r-tea').value.trim();
        const rm = r.querySelector('.r-room').value.trim();
        const f = r.querySelector('.r-frm').value.toUpperCase().trim();
        const p = parseInt(r.querySelector('.r-pwk').value);
        if(s && t && f) REGISTRY.push({sub:s, tea:t, room:rm, frm:f, pwk:p});
    });

    if(REGISTRY.length === 0) { alert("Registry is empty!"); return; }

    buildTimeSlots();
    DATA = [];

    // Priority 1: Double periods (Consecutive)
    REGISTRY.sort((a,b) => b.pwk - a.pwk).forEach(item => {
        let left = item.pwk;
        let shuffledDays = [...DAYS].sort(() => Math.random() - 0.5);
        
        let doubles = Math.min(Math.floor(left/2), 5);
        let singles = left - (doubles * 2);
        let plan = [];
        for(let i=0; i<doubles; i++) plan.push('double');
        for(let i=0; i<singles; i++) plan.push('single');

        plan.forEach(type => {
            let placed = false;
            for(let d of shuffledDays) {
                // Constraint: Subject appears once per day
                if(DATA.find(x => x.d === d && x.sub === item.sub && x.frm === item.frm)) continue;

                if(type === 'double') {
                    for(let i=0; i < SLOTS.length - 1; i++) {
                        let t1 = SLOTS[i], t2 = SLOTS[i+1];
                        if(t1.isB || t2.isB || getSpec(d, t1.id) || getSpec(d, t2.id)) continue;
                        if(!DATA.find(x => x.d===d && x.p===t1.id && (x.tea===item.tea || x.frm===item.frm)) &&
                           !DATA.find(x => x.d===d && x.p===t2.id && (x.tea===item.tea || x.frm===item.frm))) {
                            DATA.push({...item, d, p: t1.id}, {...item, d, p: t2.id});
                            placed = true; break;
                        }
                    }
                } else {
                    for(let s of SLOTS) {
                        if(s.isB || getSpec(d, s.id)) continue;
                        if(!DATA.find(x => x.d===d && x.p===s.id && (x.tea===item.tea || x.frm===item.frm))) {
                            DATA.push({...item, d, p: s.id});
                            placed = true; break;
                        }
                    }
                }
                if(placed) break;
            }
        });
    });

    log(`Generated ${DATA.length} allocations.`);
    document.getElementById('viewControls').style.display = 'block';
    updateFilters();
    renderMaster();
}

function updateFilters() {
    const frms = [...new Set(DATA.map(x => x.frm))].sort();
    const teas = [...new Set(DATA.map(x => x.tea))].sort();
    document.getElementById('selStream').innerHTML = '<option value="">-- By Stream --</option>' + frms.map(f => `<option>${f}</option>`).join('');
    document.getElementById('selTeacher').innerHTML = '<option value="">-- By Teacher --</option>' + teas.map(t => `<option>${t}</option>`).join('');
}

function renderMaster() {
    const frms = [...new Set(DATA.map(x => x.frm))].sort();
    let html = `<h1 style="text-align:center;">${document.getElementById('schoolName').value}</h1>`;
    DAYS.forEach(day => {
        html += `<div class="day-section"><div class="day-header">${day}</div><table><tr><th width="60">FORM</th>`;
        SLOTS.forEach(s => html += `<th>${s.id}<span class="time-sub">${s.time}</span></th>`);
        html += `</tr>`;
        frms.forEach(f => {
            html += `<tr><td><b>${f}</b></td>`;
            SLOTS.forEach(s => {
                const sp = getSpec(day, s.id);
                if(s.isB) html += `<td class="break-cell">${s.id}</td>`;
                else if(sp) html += `<td class="special-cell">${sp}</td>`;
                else {
                    const idx = DATA.findIndex(x => x.d === day && x.p === s.id && x.frm === f);
                    const m = DATA[idx];
                    html += `<td ondragover="event.preventDefault()" ondrop="drop(event, '${day}', '${s.id}', '${f}')">
                        ${m ? `<div class="slot-block" draggable="true" ondragstart="drag(${idx})"><b>${m.sub}</b><small>${m.tea}</small></div>` : ''}
                    </td>`;
                }
            });
            html += `</tr>`;
        });
        html += `</table></div>`;
    });
    document.getElementById('timetableArea').innerHTML = html;
}

function drag(idx) { draggedIdx = idx; }
function drop(e, d, p, f) {
    e.preventDefault();
    const item = DATA[draggedIdx];
    // Simple swap or move
    const targetIdx = DATA.findIndex(x => x.d === d && x.p === p && x.frm === f);
    if(targetIdx !== -1) { DATA[targetIdx].d = item.d; DATA[targetIdx].p = item.p; }
    item.d = d; item.p = p;
    renderMaster();
}

function runCollisionCheck() {
    let errs = [];
    DAYS.forEach(d => {
        SLOTS.forEach(s => {
            if(s.isB) return;
            const items = DATA.filter(x => x.d === d && x.p === s.id);
            const tMap = {};
            items.forEach(i => {
                if(tMap[i.tea]) errs.push(`<b>Teacher Clash:</b> ${i.tea} is in ${tMap[i.tea]} and ${i.frm} on ${d} at ${s.id}`);
                else tMap[i.tea] = i.frm;
            });
        });
    });
    let out = `<h3>COLLISION REPORT</h3>`;
    if(errs.length === 0) out += `<p style="color:green">✅ Clean! No teacher double-bookings found.</p>`;
    else out += `<ul style="color:red">` + errs.map(e => `<li>${e}</li>`).join('') + `</ul>`;
    document.getElementById('timetableArea').innerHTML = out;
}

function saveProject() {
    const registry = [];
    document.querySelectorAll('.reg-row').forEach(r => registry.push({ s: r.querySelector('.r-sub').value, t: r.querySelector('.r-tea').value, r: r.querySelector('.r-room').value, f: r.querySelector('.r-frm').value, p: r.querySelector('.r-pwk').value }));
    const project = { registry, data: DATA, settings: { school: document.getElementById('schoolName').value, year: document.getElementById('calYear').value, start: document.getElementById('startTime').value, dur: document.getElementById('pDur').value, total: document.getElementById('pTotal').value, bA: document.getElementById('breakAfter').value, bL: document.getElementById('breakLen').value, lA: document.getElementById('lunchAfter').value, lL: document.getElementById('lunchLen').value } };
    const blob = new Blob([JSON.stringify(project)], {type: "application/json"});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Timetable_Project.ttpro`; a.click();
}

function loadProject(ev) {
    const reader = new FileReader();
    reader.onload = (e) => {
        const p = JSON.parse(e.target.result);
        document.getElementById('schoolName').value = p.settings.school;
        document.getElementById('regItems').innerHTML = "";
        p.registry.forEach(i => addRegistryRow(i.s, i.t, i.r, i.f, i.p));
        DATA = p.data;
        buildTimeSlots(); updateFilters(); renderMaster();
        log("Project Loaded Successfully.");
    };
    reader.readAsText(ev.target.files[0]);
}

function renderIndividual(type) {
    const val = document.getElementById(type === 'stream' ? 'selStream' : 'selTeacher').value;
    if(!val) return;
    let html = `<h2>${val} - ${type.toUpperCase()}</h2>`;
    html += `<table><tr><th>DAY</th>` + SLOTS.map(s => `<th>${s.id}<br><small>${s.time}</small></th>`).join('') + `</tr>`;
    DAYS.forEach(d => {
        html += `<tr><td><b>${d}</b></td>`;
        SLOTS.forEach(s => {
            if(s.isB) html += `<td class="break-cell">${s.id}</td>`;
            else {
                const m = DATA.find(x => x.d === d && x.p === s.id && (type==='stream' ? x.frm === val : x.tea === val));
                html += `<td>${m ? `<b>${m.sub}</b><br><small>${type==='stream' ? m.tea : m.frm}</small>` : ''}</td>`;
            }
        });
        html += `</tr>`;
    });
    document.getElementById('timetableArea').innerHTML = html + `</table>`;
}

function renderLoadReport() {
    const teas = [...new Set(REGISTRY.map(x => x.tea))].sort();
    let h = `<h2>TEACHER LOAD REPORT</h2><table style="width:60%; margin:auto;"><tr><th>TEACHER</th><th>LOAD</th><th>TOTAL</th></tr>`;
    teas.forEach(t => {
        const its = REGISTRY.filter(x => x.tea === t);
        const tot = its.reduce((a,b) => a + b.pwk, 0);
        h += `<tr><td>${t}</td><td>${its.map(i => `${i.sub}(${i.frm})`).join(', ')}</td><td>${tot}</td></tr>`;
    });
    document.getElementById('timetableArea').innerHTML = h + `</table>`;
}

// Start with one manual row
addRegistryRow("MATHEMATICS", "SEURI", "L1", "F1A", 5);
</script>
</body>
</html>
