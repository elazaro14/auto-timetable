<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>TT-PRO ULTIMATE 2026</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

:root{
    --primary:#2563eb;
    --dark:#0f172a;
    --bg:#f1f5f9;
    --card:#ffffff;
    --border:#e2e8f0;
}

body{
    margin:0;
    font-family:Inter,system-ui,sans-serif;
    display:flex;
    height:100vh;
    background:var(--bg);
}

.sidebar{
    width:340px;
    background:var(--dark);
    color:white;
    padding:18px;
    overflow:auto;
}

.sidebar h2{
    text-align:center;
    color:#38bdf8;
}

label{
    font-size:11px;
    color:#94a3b8;
    display:block;
    margin-top:10px;
}

input,select{
    width:100%;
    padding:8px;
    border-radius:8px;
    border:1px solid #334155;
    background:#1e293b;
    color:white;
}

button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

.btn-blue{background:#2563eb;color:white}
.btn-green{background:#16a34a;color:white}
.btn-gray{background:#334155;color:white}
.btn-red{background:#dc2626;color:white}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

.topbar{
    background:white;
    padding:10px;
    border-bottom:1px solid var(--border);
    display:flex;
    gap:8px;
}

.content{padding:15px;overflow:auto}

.card{
    background:white;
    border:1px solid var(--border);
    margin-bottom:20px;
    padding:10px;
    border-radius:12px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid var(--border);
    font-size:11px;
    text-align:center;
    padding:4px;
}

th{background:#f8fafc}

.slot{
    background:#dcfce7;
    padding:4px;
    border-radius:6px;
}

.break{background:#e2e8f0;font-weight:bold}
.special{background:#fde68a;font-weight:bold}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<h2>TT-PRO</h2>

<label>School</label>
<input id="schName" value="SECONDARY SCHOOL">

<label>Year</label>
<input id="year" value="2026">

<label>Total Periods</label>
<input type="number" id="total" value="8">

<label>Period Duration</label>
<input type="number" id="dur" value="40">

<label>Start Time</label>
<input type="time" id="start" value="08:00">

<hr>

<h3 style="color:#38bdf8">Special Blocks</h3>

<input id="spName" placeholder="ASSEMBLY">

<select id="spDay">
<option value="ALL">EVERY DAY</option>
<option value="MON">MONDAY</option>
<option value="TUE">TUESDAY</option>
<option value="WED">WEDNESDAY</option>
<option value="THU">THURSDAY</option>
<option value="FRI">FRIDAY</option>
</select>

<input id="spAfter" type="number" placeholder="After Period">
<input id="spDur" type="number" placeholder="Duration (Min)">

<button class="btn-blue" onclick="addSpecial()">+ ADD SPECIAL</button>

<div id="specialList"></div>

<hr>

<button class="btn-green" onclick="generate()">GENERATE</button>
<button class="btn-gray" onclick="window.print()">PRINT</button>
<button class="btn-gray" onclick="exportPDF()">PDF</button>

<label>CSV</label>
<input type="file" onchange="loadCSV(event)">

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<button onclick="view='MASTER';render()">MASTER</button>
<button onclick="view='STREAM';render()">STREAM</button>
<button onclick="view='TEACHER';render()">TEACHER</button>
<button onclick="view='LOADS';render()">LOADS</button>
</div>

<div class="content">
<h3 id="title"></h3>
<div id="app"></div>
</div>

</div>

<script>

/* ================= DATA ================= */

const DAYS=["MON","TUE","WED","THU","FRI"];

let REGISTRY=[];
let DATA=[];
let CLASSES=[];
let TEACHERS=[];
let SPECIALS=[];

let view="MASTER";

/* ================= SPECIAL BLOCK ================= */

function addSpecial(){

    if(!spName.value || !spAfter.value || !spDur.value){
        alert("Fill all fields");
        return;
    }

    SPECIALS.push({
        name:spName.value.toUpperCase(),
        day:spDay.value,
        after:+spAfter.value,
        dur:+spDur.value
    });

    renderSpecialList();

    spName.value="";
    spAfter.value="";
    spDur.value="";
}

function renderSpecialList(){
    specialList.innerHTML=SPECIALS.map((s,i)=>`
        <div style="background:#1e293b;padding:6px;margin-top:5px;border-radius:6px;font-size:11px">
            ${s.name} (${s.day}) after P${s.after}
            <button class="btn-red" onclick="SPECIALS.splice(${i},1);renderSpecialList()">X</button>
        </div>
    `).join('');
}

/* ================= CSV ================= */

function loadCSV(e){
let r=new FileReader();
r.onload=(ev)=>{
REGISTRY=[];
CLASSES=[];
TEACHERS=[];

ev.target.result.split("\n").slice(1).forEach(l=>{
let p=l.split(/[;,]/).map(x=>x.trim().toUpperCase());
if(p.length<4)return;
let[sub,tea,pwk,frm]=p;
REGISTRY.push({sub,tea,pwk:+pwk,frm});
if(!CLASSES.includes(frm))CLASSES.push(frm);
if(!TEACHERS.includes(tea))TEACHERS.push(tea);
});
alert("CSV loaded");
render();
};
r.readAsText(e.target.files[0]);
}

/* ================= SLOT BUILDER (FIXED SPECIAL SHIFT) ================= */

function buildSlots(day){

let slots=[];
let cur=new Date("2026-01-01T"+start.value);

for(let i=1;i<=+total.value;i++){

let s=cur.toTimeString().slice(0,5);
cur.setMinutes(cur.getMinutes()+ +dur.value);

slots.push({id:"P"+i,type:"period",label:"P"+i});

SPECIALS.forEach(sp=>{
if(sp.after===i && (sp.day==="ALL" || sp.day===day)){

slots.push({
type:"special",
label:sp.name
});

cur.setMinutes(cur.getMinutes()+sp.dur);
}
});

}

return slots;
}

/* ================= GENERATOR (DOUBLE PRIORITY SAFE) ================= */

function generate(){

DATA=[];

let pool=[...REGISTRY].sort((a,b)=>b.pwk-a.pwk);

for(let r of pool){

let left=r.pwk;

for(let d of DAYS){

if(left<=0)break;

let slots=[];
for(let i=1;i<=+total.value;i++)slots.push("P"+i);

/* DOUBLE FIRST */
for(let i=0;i<slots.length;i++){

if(left<=0)break;

if(i<slots.length-1 && left>=2){
DATA.push({d,sub:r.sub,tea:r.tea,frm:r.frm,p:slots[i]});
DATA.push({d,sub:r.sub,tea:r.tea,frm:r.frm,p:slots[i+1]});
left-=2;
i++;
}
else{
DATA.push({d,sub:r.sub,tea:r.tea,frm:r.frm,p:slots[i]});
left--;
}
}
}
}

render();
}

/* ================= RENDER ================= */

function render(){

title.innerText=schName.value+" ("+year.value+")";

let html="";

DAYS.forEach(d=>{

html+=`<div class="card"><h3>${d}</h3><table><tr><th>CLASS</th>`;

for(let i=1;i<=+total.value;i++)html+=`<th>P${i}</th>`;

html+="</tr>";

CLASSES.forEach(c=>{

html+=`<tr><td>${c}</td>`;

for(let i=1;i<=+total.value;i++){

let m=DATA.find(x=>x.d==d&&x.p=="P"+i&&x.frm==c);

html+=`<td>${m?`<div class="slot">${m.sub}<br>${m.tea}</div>`:""}</td>`;
}

html+="</tr>";
});

html+="</table></div>";
});

app.innerHTML=html;
}

/* ================= PDF ================= */

function exportPDF(){
html2pdf().from(document.body).save();
}

</script>

</body>
</html>
