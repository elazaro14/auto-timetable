<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TT-PRO ULTIMATE 2026</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

:root{
    --primary:#2563eb;
    --success:#16a34a;
    --dark:#0f172a;
    --dark2:#1e293b;
    --bg:#f8fafc;
    --card:#ffffff;
    --border:#e2e8f0;
    --text:#0f172a;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Inter,system-ui,sans-serif;
    background:var(--bg);
    display:flex;
    height:100vh;
    overflow:hidden;
}

/* SIDEBAR */

.sidebar{
    width:340px;
    background:linear-gradient(180deg,var(--dark),var(--dark2));
    color:white;
    padding:20px;
    overflow-y:auto;
    border-right:1px solid #334155;
}

.sidebar h2{
    margin-top:0;
    text-align:center;
    color:#38bdf8;
    font-size:1.5rem;
}

.section{
    margin-top:20px;
}

.section-title{
    font-size:11px;
    color:#38bdf8;
    text-transform:uppercase;
    margin-bottom:10px;
    font-weight:800;
}

label{
    display:block;
    font-size:11px;
    margin-top:10px;
    margin-bottom:4px;
    color:#94a3b8;
    text-transform:uppercase;
    font-weight:700;
}

input,
select{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #334155;
    background:#1e293b;
    color:white;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:8px;
    cursor:pointer;
    font-weight:700;
    transition:.2s;
}

button:hover{
    transform:translateY(-1px);
}

.btn-primary{
    background:linear-gradient(135deg,#3b82f6,#2563eb);
    color:white;
}

.btn-success{
    background:linear-gradient(135deg,#22c55e,#16a34a);
    color:white;
}

.btn-dark{
    background:#334155;
    color:white;
}

.special-box{
    background:#1e293b;
    padding:12px;
    border-radius:12px;
    border:1px dashed #475569;
}

/* MAIN */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.topbar{
    background:white;
    padding:12px 20px;
    border-bottom:1px solid var(--border);
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
}

.content{
    flex:1;
    overflow:auto;
    padding:20px;
}

/* STATS */

.stats{
    display:flex;
    gap:15px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.stat{
    background:white;
    border:1px solid var(--border);
    border-radius:16px;
    padding:15px;
    min-width:180px;
}

.stat-label{
    font-size:11px;
    color:#64748b;
    text-transform:uppercase;
    font-weight:700;
}

.stat-value{
    font-size:26px;
    font-weight:800;
    margin-top:5px;
}

/* CARD */

.card{
    background:white;
    border:1px solid var(--border);
    border-radius:18px;
    padding:18px;
    margin-bottom:25px;
    page-break-inside:avoid;
}

/* TABLE */

table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

th,
td{
    border:1px solid #cbd5e1;
    padding:5px;
    text-align:center;
    font-size:10px;
}

th{
    background:#f8fafc;
    color:#475569;
    font-weight:800;
}

.slot{
    background:#dcfce7;
    border:1px solid #86efac;
    border-radius:8px;
    padding:5px;
    font-weight:700;
    color:#14532d;
    min-height:42px;
    display:flex;
    justify-content:center;
    flex-direction:column;
}

.break-cell{
    background:#f1f5f9;
    color:#475569;
    font-weight:700;
}

.special-cell{
    background:#fef3c7;
    color:#92400e;
    font-weight:800;
}

/* PRINT */

@media print{

    .sidebar,
    .topbar{
        display:none!important;
    }

    body{
        display:block;
        background:white;
    }

    .content{
        overflow:visible;
        padding:0;
    }

    .card{
        border:none;
        margin-bottom:30px;
    }
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>TT-PRO ULTIMATE</h2>

<div class="section">

<div class="section-title">School Setup</div>

<label>School Name</label>
<input id="schName" value="SECONDARY SCHOOL">

<label>Academic Year</label>
<input id="acadYear" value="2026">

<div style="display:flex;gap:8px">

<div style="flex:1">
<label>Total Periods</label>
<input type="number" id="totalPeriods" value="8">
</div>

<div style="flex:1">
<label>Duration</label>
<input type="number" id="periodDur" value="40">
</div>

</div>

<label>Start Time</label>
<input type="time" id="startTime" value="08:00">

</div>

<div class="section">

<div class="section-title">Breaks</div>

<div style="display:flex;gap:8px">

<div style="flex:1">
<label>Break After</label>
<input type="number" id="breakAfter" value="2">
</div>

<div style="flex:1">
<label>Break Minutes</label>
<input type="number" id="breakDur" value="20">
</div>

</div>

<div style="display:flex;gap:8px">

<div style="flex:1">
<label>Lunch After</label>
<input type="number" id="lunchAfter" value="4">
</div>

<div style="flex:1">
<label>Lunch Minutes</label>
<input type="number" id="lunchDur" value="45">
</div>

</div>

</div>

<div class="section">

<div class="section-title">Special Blocks</div>

<div class="special-box">

<input id="spName" placeholder="ASSEMBLY">

<select id="spDay">
<option value="ALL">EVERY DAY</option>
<option value="MON">MONDAY</option>
<option value="TUE">TUESDAY</option>
<option value="WED">WEDNESDAY</option>
<option value="THU">THURSDAY</option>
<option value="FRI">FRIDAY</option>
</select>

<input type="number" id="spAfter" placeholder="After Period">

<input type="number" id="spDur" placeholder="Duration Minutes">

<button class="btn-primary" onclick="addSpecial()">
+ ADD SPECIAL
</button>

<div id="specialList"></div>

</div>

</div>

<div class="section">

<div class="section-title">Actions</div>

<button class="btn-success" onclick="generate()">
⚡ GENERATE TIMETABLE
</button>

<button class="btn-dark" onclick="window.print()">
🖨️ PRINT
</button>

<button class="btn-dark" onclick="exportPDF()">
📄 EXPORT PDF
</button>

<button class="btn-dark" onclick="saveBackup()">
💾 SAVE BACKUP
</button>

<input type="file" id="backupFile" hidden onchange="loadBackup(event)">

<button class="btn-dark" onclick="backupFile.click()">
📂 LOAD BACKUP
</button>

<input type="file"
id="csvFile"
hidden
accept=".csv,.cvs,.txt"
onchange="loadCSV(event)">

<button class="btn-primary" onclick="csvFile.click()">
📥 IMPORT CSV
</button>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<button onclick="setView('MASTER')">MASTER</button>

<button onclick="setView('STREAM')">STREAMS</button>

<button onclick="setView('TEACHER')">TEACHERS</button>

<button onclick="setView('LOADS')">LOADS</button>

<select id="displayMode" onchange="render()">
<option value="both">SUBJECT + TEACHER</option>
<option value="sub">SUBJECT ONLY</option>
</select>

</div>

<div class="content">

<h1 id="title"></h1>
<h3 id="year"></h3>

<div class="stats">

<div class="stat">
<div class="stat-label">Classes</div>
<div class="stat-value" id="statClasses">0</div>
</div>

<div class="stat">
<div class="stat-label">Teachers</div>
<div class="stat-value" id="statTeachers">0</div>
</div>

<div class="stat">
<div class="stat-label">Allocated Lessons</div>
<div class="stat-value" id="statLessons">0</div>
</div>

</div>

<div id="app"></div>

</div>

</div>

<script>

const DAYS=["MON","TUE","WED","THU","FRI"];

let REGISTRY=[];
let DATA=[];
let CLASSES=[];
let TEACHERS=[];
let SPECIALS=[];

let currentView="MASTER";

/* SPECIALS */

function addSpecial(){

    let name=spName.value.trim().toUpperCase();
    let day=spDay.value;
    let after=+spAfter.value;
    let dur=+spDur.value;

    if(!name || !after || !dur){
        alert("Fill all special block fields");
        return;
    }

    SPECIALS.push({name,day,after,dur});

    renderSpecials();

    spName.value="";
    spAfter.value="";
    spDur.value="";
}

function renderSpecials(){

    specialList.innerHTML=SPECIALS.map((s,i)=>`

    <div style="
        margin-top:8px;
        background:#334155;
        padding:10px;
        border-radius:8px;
        font-size:12px;
    ">

    ${s.name} (${s.day}) AFTER P${s.after}

    <button
    style="
    margin-top:8px;
    background:#dc2626;
    color:white;
    border:none;
    padding:6px;
    border-radius:6px;
    cursor:pointer;
    "
    onclick="removeSpecial(${i})">

    REMOVE

    </button>

    </div>

    `).join('');
}

function removeSpecial(i){
    SPECIALS.splice(i,1);
    renderSpecials();
}

/* SLOT BUILDER */

function buildSlots(day){

    let slots=[];

    let cur=new Date("2026-01-01T"+startTime.value);

    let total=+totalPeriods.value;
    let dur=+periodDur.value;

    for(let i=1;i<=total;i++){

        let st=cur.toTimeString().slice(0,5);

        cur.setMinutes(cur.getMinutes()+dur);

        let et=cur.toTimeString().slice(0,5);

        slots.push({
            id:"P"+i,
            type:"period",
            label:`P${i}<br>${st}-${et}`
        });

        if(i==breakAfter.value){

            slots.push({
                type:"break",
                label:"BREAK"
            });

            cur.setMinutes(cur.getMinutes()+ +breakDur.value);
        }

        if(i==lunchAfter.value){

            slots.push({
                type:"lunch",
                label:"LUNCH"
            });

            cur.setMinutes(cur.getMinutes()+ +lunchDur.value);
        }

        SPECIALS.forEach(sp=>{

            if(
                sp.after==i &&
                (sp.day=="ALL" || sp.day==day)
            ){

                slots.push({
                    type:"special",
                    label:sp.name
                });

                cur.setMinutes(cur.getMinutes()+sp.dur);
            }

        });

    }

    return slots;
}

/* IMPORT CSV */

function loadCSV(e){

    const reader=new FileReader();

    reader.onload=(ev)=>{

        REGISTRY=[];
        CLASSES=[];
        TEACHERS=[];

        let lines=ev.target.result.split('\n');

        lines.slice(1).forEach(line=>{

            let p=line
            .split(/[;,]/)
            .map(x=>x.trim().toUpperCase());

            if(p.length<4) return;

            let [sub,tea,pwk,frm]=p;

            REGISTRY.push({
                sub,
                tea,
                pwk:+pwk,
                frm
            });

            if(!CLASSES.includes(frm))
                CLASSES.push(frm);

            if(!TEACHERS.includes(tea))
                TEACHERS.push(tea);

        });

        alert("CSV Imported Successfully");

        render();
    };

    reader.readAsText(e.target.files[0]);
}

/* GENERATOR */

function shuffle(a){
    return [...a].sort(()=>Math.random()-.5);
}

function canPlace(r,d,p){

    if(DATA.some(x=>
        x.d==d &&
        x.p==p &&
        x.tea==r.tea
    )) return false;

    if(DATA.some(x=>
        x.d==d &&
        x.p==p &&
        x.frm==r.frm
    )) return false;

    return true;
}

function generate(){

    if(REGISTRY.length==0){
        alert("Import CSV First");
        return;
    }

    let success=false;

    for(let attempt=0;attempt<100;attempt++){

        DATA=[];
        success=true;

        let pool=[...REGISTRY]
        .sort((a,b)=>b.pwk-a.pwk);

        for(let r of pool){

            let left=r.pwk;

            for(let d of shuffle(DAYS)){

                if(left<=0) break;

                if(DATA.some(x=>
                    x.d==d &&
                    x.frm==r.frm &&
                    x.sub==r.sub
                )) continue;

                let periods=buildSlots(d)
                .filter(x=>x.type=="period");

                /* DOUBLE PERIOD PRIORITY */

                if(left>=2){

                    for(let i=0;i<periods.length-1;i++){

                        let p1=periods[i].id;
                        let p2=periods[i+1].id;

                        if(
                            canPlace(r,d,p1) &&
                            canPlace(r,d,p2)
                        ){

                            DATA.push({...r,d,p:p1});
                            DATA.push({...r,d,p:p2});

                            left-=2;
                            break;
                        }
                    }
                }

                /* SINGLE */

                if(left>0){

                    let shuffled=shuffle(periods);

                    for(let s of shuffled){

                        if(canPlace(r,d,s.id)){

                            DATA.push({...r,d,p:s.id});

                            left--;
                            break;
                        }
                    }
                }

            }

            if(left>0){
                success=false;
                break;
            }

        }

        if(success) break;
    }

    if(!success){
        alert("Some lessons could not fit");
    }

    render();
}

/* VIEW */

function setView(v){

    currentView=v;

    render();
}

/* RENDER */

function render(){

    title.innerText=schName.value;
    year.innerText="ACADEMIC YEAR: "+acadYear.value;

    statClasses.innerText=CLASSES.length;
    statTeachers.innerText=TEACHERS.length;
    statLessons.innerText=DATA.length;

    if(currentView=="MASTER")
        renderMaster();

    if(currentView=="STREAM")
        renderStreams();

    if(currentView=="TEACHER")
        renderTeachers();

    if(currentView=="LOADS")
        renderLoads();
}

/* MASTER */

function renderMaster(){

    let mode=displayMode.value;

    let html="";

    DAYS.forEach(d=>{

        let slots=buildSlots(d);

        html+=`
        <div class="card">

        <h2>MASTER TIMETABLE - ${d}</h2>

        <table>

        <tr>

        <th>CLASS</th>
        `;

        slots.forEach(s=>{
            html+=`<th>${s.label}</th>`;
        });

        html+=`</tr>`;

        CLASSES.sort().forEach(c=>{

            html+=`<tr><td><b>${c}</b></td>`;

            slots.forEach(s=>{

                if(
                    s.type=="break" ||
                    s.type=="lunch"
                ){

                    html+=`
                    <td class="break-cell">
                    ${s.label}
                    </td>`;
                }

                else if(s.type=="special"){

                    html+=`
                    <td class="special-cell">
                    ${s.label}
                    </td>`;
                }

                else{

                    let m=DATA.find(x=>
                        x.d==d &&
                        x.p==s.id &&
                        x.frm==c
                    );

                    html+=`
                    <td>

                    ${
                        m
                        ?
                        `<div class="slot">

                        ${
                            mode=="both"
                            ?
                            `${m.sub}<br>${m.tea}`
                            :
                            m.sub
                        }

                        </div>`
                        :
                        ""
                    }

                    </td>`;
                }

            });

            html+=`</tr>`;
        });

        html+=`
        </table>
        </div>`;
    });

    app.innerHTML=html;
}

/* STREAMS */

function renderStreams(){

    let mode=displayMode.value;

    let html="";

    CLASSES.sort().forEach(c=>{

        let slots=buildSlots("MON");

        html+=`
        <div class="card">

        <h2>STREAM TIMETABLE - ${c}</h2>

        <table>

        <tr>

        <th>DAY</th>
        `;

        slots.forEach(s=>{
            html+=`<th>${s.label}</th>`;
        });

        html+=`</tr>`;

        DAYS.forEach(d=>{

            let slots2=buildSlots(d);

            html+=`<tr><td><b>${d}</b></td>`;

            slots2.forEach(s=>{

                if(
                    s.type=="break" ||
                    s.type=="lunch"
                ){

                    html+=`
                    <td class="break-cell">
                    ${s.label}
                    </td>`;
                }

                else if(s.type=="special"){

                    html+=`
                    <td class="special-cell">
                    ${s.label}
                    </td>`;
                }

                else{

                    let m=DATA.find(x=>
                        x.d==d &&
                        x.p==s.id &&
                        x.frm==c
                    );

                    html+=`
                    <td>

                    ${
                        m
                        ?
                        `<div class="slot">

                        ${
                            mode=="both"
                            ?
                            `${m.sub}<br>${m.tea}`
                            :
                            m.sub
                        }

                        </div>`
                        :
                        ""
                    }

                    </td>`;
                }

            });

            html+=`</tr>`;
        });

        html+=`
        </table>
        </div>`;
    });

    app.innerHTML=html;
}

/* TEACHERS */

function renderTeachers(){

    let html="";

    TEACHERS.sort().forEach(t=>{

        let slots=buildSlots("MON");

        html+=`
        <div class="card">

        <h2>TEACHER TIMETABLE - ${t}</h2>

        <table>

        <tr>

        <th>DAY</th>
        `;

        slots.forEach(s=>{
            html+=`<th>${s.label}</th>`;
        });

        html+=`</tr>`;

        DAYS.forEach(d=>{

            let slots2=buildSlots(d);

            html+=`<tr><td><b>${d}</b></td>`;

            slots2.forEach(s=>{

                if(
                    s.type=="break" ||
                    s.type=="lunch"
                ){

                    html+=`
                    <td class="break-cell">
                    ${s.label}
                    </td>`;
                }

                else if(s.type=="special"){

                    html+=`
                    <td class="special-cell">
                    ${s.label}
                    </td>`;
                }

                else{

                    let m=DATA.find(x=>
                        x.d==d &&
                        x.p==s.id &&
                        x.tea==t
                    );

                    html+=`
                    <td>

                    ${
                        m
                        ?
                        `<div class="slot">
                        ${m.sub}<br>${m.frm}
                        </div>`
                        :
                        ""
                    }

                    </td>`;
                }

            });

            html+=`</tr>`;
        });

        html+=`
        </table>
        </div>`;
    });

    app.innerHTML=html;
}

/* LOADS */

function renderLoads(){

    let html=`
    <div class="card">

    <h2>TEACHER LOAD SUMMARY</h2>

    <table>

    <tr>
    <th>Teacher</th>
    <th>Total Lessons</th>
    </tr>
    `;

    TEACHERS.sort().forEach(t=>{

        let total=DATA.filter(x=>x.tea==t).length;

        html+=`
        <tr>

        <td>${t}</td>

        <td>${total}</td>

        </tr>`;
    });

    html+=`
    </table>
    </div>`;

    app.innerHTML=html;
}

/* PDF */

function exportPDF(){

    html2pdf()
    .set({

        margin:5,

        filename:
        schName.value.replace(/\s+/g,'_')
        +"_TIMETABLE.pdf",

        html2canvas:{
            scale:2
        },

        jsPDF:{
            orientation:'landscape',
            unit:'mm',
            format:'a4'
        }

    })

    .from(app)
    .save();
}

/* SAVE BACKUP */

function saveBackup(){

    let blob=new Blob([JSON.stringify({

        REGISTRY,
        DATA,
        CLASSES,
        TEACHERS,
        SPECIALS

    })],{
        type:"application/json"
    });

    let a=document.createElement("a");

    a.href=URL.createObjectURL(blob);

    a.download="TT_PRO_BACKUP.json";

    a.click();
}

/* LOAD BACKUP */

function loadBackup(e){

    const reader=new FileReader();

    reader.onload=(ev)=>{

        let p=JSON.parse(ev.target.result);

        REGISTRY=p.REGISTRY || [];
        DATA=p.DATA || [];
        CLASSES=p.CLASSES || [];
        TEACHERS=p.TEACHERS || [];
        SPECIALS=p.SPECIALS || [];

        renderSpecials();
        render();
    };

    reader.readAsText(e.target.files[0]);
}

render();

</script>

</body>
</html>
