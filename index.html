<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TT-Pro Diamond - conflict-Proof Tanzania Suite</title>
    <style>
        :root { --primary: #1a237e; --secondary: #0d47a1; --accent: #00c853; --bg: #f4f7f9; --danger: #d32f2f; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 340px; background: var(--primary); color: white; display: flex; flex-direction: column; padding: 20px; box-shadow: 4px 0 10px rgba(0,0,0,0.3); z-index: 100; overflow-y: auto; }
        .sidebar h2 { font-size: 20px; margin-bottom: 20px; border-bottom: 2px solid var(--accent); padding-bottom: 10px; text-align: center; }
        
        .config-box { background: rgba(255,255,255,0.1); padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.2); }
        .config-box h4 { margin: 0 0 10px 0; font-size: 11px; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; }
        .input-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 12px; }
        .input-row input { width: 80px; padding: 6px; border-radius: 5px; border: none; font-size: 12px; }
        
        /* Main Area */
        .main-content { flex: 1; overflow-y: auto; padding: 25px; position: relative; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; }
        
        .view-bar { display: flex; gap: 12px; align-items: center; background: #fff; padding: 12px 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ddd; flex-wrap: wrap; }
        .view-bar select, .view-bar button { padding: 8px 12px; border-radius: 6px; border: 1px solid #ccc; cursor: pointer; font-size: 13px; font-weight: 600; }

        /* Timetable UI */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; table-layout: fixed; border: 2px solid #000; }
        th, td { border: 1px solid #000; padding: 4px; text-align: center; font-size: 10px; height: 50px; position: relative; }
        th { background: #f1f3f4; font-weight: 800; color: var(--primary); }
        
        .period-block { background: #e3f2fd; border: 1px solid var(--secondary); border-radius: 4px; padding: 4px; cursor: move; }
        .period-block b { display: block; font-size: 10px; color: var(--primary); }
        
        .time-label { display: block; font-size: 8px; color: #d32f2f; font-weight: bold; margin-top: 2px; }
        .day-title { background: var(--primary); color: white; padding: 8px; font-weight: bold; margin-top: 20px; text-align: center; border: 2px solid #000; border-bottom: none; }
        .break-cell { background: #eeeeee !important; font-weight: bold; writing-mode: vertical-rl; width: 30px !important; font-size: 9px; }
        .special-activity { background: #fff9c4 !important; font-weight: bold; font-size: 9px; }

        .btn { padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; margin-top: 8px; text-transform: uppercase; }
        .btn-gen { background: var(--accent); color: white; }
        .btn-save { background: #455a64; color: white; }
        .btn-load { background: #607d8b; color: white; }
        .btn-check { background: var(--danger); color: white; border: none; }

        .conflict-badge { color: white; background: var(--danger); padding: 2px 4px; border-radius: 3px; font-weight: bold; font-size: 8px; margin-top: 2px; display: inline-block; }

        @media print { .no-print { display: none !important; } .day-section { page-break-after: always; } body { background: white; } }
    </style>
</head>
<body>

<div class="sidebar no-print">
    <h2>TT-PRO DIAMOND</h2>
    
    <div class="config-box">
        <h4>Storage & Files</h4>
        <button class="btn btn-save" onclick="saveProject()">💾 Save Project (.ttpro)</button>
        <button class="btn btn-load" onclick="document.getElementById('loadInput').click()">📂 Load Project</button>
        <input type="file" id="loadInput" style="display:none" accept=".ttpro" onchange="loadProject(event)">
    </div>

    <div class="config-box">
        <h4>Daily Timing</h4>
        <div class="input-row"><span>Start Time:</span> <input type="time" id="startTime" value="08:00"></div>
        <div class="input-row"><span>Period (min):</span> <input type="number" id="pDur" value="40"></div>
        <div class="input-row"><span>Total Periods:</span> <input type="number" id="pTotal" value="9"></div>
    </div>

    <div class="config-box">
        <h4>Break Intervals</h4>
        <div class="input-row"><span>Short Break After P:</span> <input type="number" id="breakAfter" value="3"></div>
        <div class="input-row"><span>Break Duration (m):</span> <input type="number" id="breakLen" value="20"></div>
        <hr style="opacity:0.2">
        <div class="input-row"><span>Lunch After P:</span> <input type="number" id="lunchAfter" value="6"></div>
        <div class="input-row"><span>Lunch Duration (m):</span> <input type="number" id="lunchLen" value="45"></div>
    </div>

    <div class="config-box">
        <h4>School Branding</h4>
        <input type="text" id="schoolName" value="EXCELLENCE SECONDARY SCHOOL" style="width:100%; font-size:11px; margin-bottom:5px; border-radius:4px; border:none; padding:5px;">
        <input type="text" id="calYear" value="2026" style="width:100%; font-size:11px; border-radius:4px; border:none; padding:5px;">
    </div>

    <button class="btn btn-gen" onclick="generate()">🚀 Generate Timetable</button>
    <button class="btn" style="background:#fff; color:#333; border:1px solid #ccc;" onclick="window.print()">🖨️ Print to PDF</button>
</div>

<div class="main-content">
    <div class="card no-print">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="margin:0; color:var(--primary);">Registry (CSV Import)</h3>
            <div style="display:flex; gap:10px; align-items:center;">
                <input type="file" id="csvFile" accept=".csv" onchange="handleCSV(event)" style="font-size:11px;">
                <button class="btn" style="background:var(--secondary); color:white; width:auto; padding:6px 15px; margin:0;" onclick="addRow()">+ Manual Row</button>
            </div>
        </div>
        <div id="regItems" style="max-height: 200px; overflow-y: auto; border: 1px solid #eee; padding: 10px; border-radius: 8px;"></div>
    </div>

    <div class="view-bar no-print" id="viewBar" style="display:none;">
        <button onclick="renderMaster()">Master View</button>
        <button onclick="drawTeacherLoad()">Load Report</button>
        <button class="btn-check" onclick="checkConflicts()">⚠️ Check Conflicts</button>
        <div style="flex-grow: 1;"></div>
        <select id="selStream" onchange="renderIndividual('stream')"><option value="">-- By Stream --</option></select>
        <select id="selTeacher" onchange="renderIndividual('teacher')"><option value="">-- By Teacher --</option></select>
    </div>

    <div id="timetableArea"></div>
</div>

<script>
let DATA = [], SLOTS = [], REGISTRY = [];
const DAYS = ["MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY"];
let draggedIdx = null;

function addRow(s="", t="", r="", f="", p=5) {
    const div = document.createElement('div');
    div.className = 'registry-row';
    div.style = "display:grid; grid-template-columns: 2fr 1.5fr 1fr 1fr 0.8fr 40px; gap:8px; margin-bottom:5px;";
    div.innerHTML = `
        <input type="text" class="r-sub" value="${s}" placeholder="Subject">
        <input type="text" class="r-tea" value="${t}" placeholder="Teacher">
        <input type="text" class="r-room" value="${r}" placeholder="Room">
        <input type="text" class="r-frm" value="${f}" placeholder="Form">
        <input type="number" class="r-pwk" value="${p}">
        <button onclick="this.parentElement.remove()" style="color:red; background:none; border:none; cursor:pointer;">✕</button>
    `;
    document.getElementById('regItems').appendChild(div);
}

function handleCSV(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const text = ev.target.result;
        const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
        const counts = {};
        const startIndex = lines[0].toLowerCase().includes("teacher") ? 1 : 0;
        lines.slice(startIndex).forEach(line => {
            const c = line.split(',').map(i => i.trim());
            if(c.length >= 2) {
                const key = `${c[0]}|${c[1]}|${c[2] || ''}|${c[3] || 'F1'}`;
                counts[key] = (counts[key] || 0) + 1;
            }
        });
        document.getElementById('regItems').innerHTML = "";
        for(let key in counts) {
            const [s,t,rm,f] = key.split('|');
            addRow(s, t, rm, f, counts[key]);
        }
    };
    reader.readAsText(e.target.files[0]);
}

function buildSlots() {
    SLOTS = [];
    let cur = new Date("2026-01-01T" + document.getElementById('startTime').value);
    const dur = parseInt(document.getElementById('pDur').value);
    const total = parseInt(document.getElementById('pTotal').value);
    
    const bAft = parseInt(document.getElementById('breakAfter').value);
    const bLen = parseInt(document.getElementById('breakLen').value);
    const lAft = parseInt(document.getElementById('lunchAfter').value);
    const lLen = parseInt(document.getElementById('lunchLen').value);

    for(let i=1; i<=total; i++) {
        let sStr = cur.toTimeString().slice(0,5);
        cur.setMinutes(cur.getMinutes() + dur);
        let eStr = cur.toTimeString().slice(0,5);
        SLOTS.push({ id: 'P'+i, time: `${sStr}-${eStr}`, isB: false });

        if(i === bAft) {
            let bs = cur.toTimeString().slice(0,5);
            cur.setMinutes(cur.getMinutes() + bLen);
            SLOTS.push({ id: 'BREAK', time: `${bs}-${cur.toTimeString().slice(0,5)}`, isB: true });
        }
        if(i === lAft) {
            let ls = cur.toTimeString().slice(0,5);
            cur.setMinutes(cur.getMinutes() + lLen);
            SLOTS.push({ id: 'LUNCH', time: `${ls}-${cur.toTimeString().slice(0,5)}`, isB: true });
        }
    }
}

function getSpecial(d, pId) {
    const p = parseInt(pId.replace('P',''));
    if(d === "WEDNESDAY" && p >= 8) return "RELIGION";
    if(d === "THURSDAY" && p >= 8) return "DEBATE";
    if(d === "FRIDAY" && p >= 7) return "MOSQUE";
    return null;
}

function generate() {
    REGISTRY = [];
    document.querySelectorAll('.registry-row').forEach(r => {
        const sub = r.querySelector('.r-sub').value.toUpperCase();
        const tea = r.querySelector('.r-tea').value;
        const rm = r.querySelector('.r-room').value;
        const f = r.querySelector('.r-frm').value.toUpperCase();
        const p = parseInt(r.querySelector('.r-pwk').value);
        if(sub && tea && f) REGISTRY.push({sub, tea, room: rm, frm: f, pwk: p});
    });

    buildSlots();
    DATA = [];

    // Prioritize Double Periods first as per user priority
    REGISTRY.sort((a,b) => b.pwk - a.pwk).forEach(item => {
        let left = item.pwk;
        let shuffledDays = [...DAYS].sort(() => Math.random() - 0.5);
        let plan = [];
        let doubles = Math.min(Math.floor(left/2), 5);
        let singles = left - (doubles*2);
        for(let i=0; i<doubles; i++) plan.push('double');
        for(let i=0; i<singles; i++) plan.push('single');

        plan.forEach(type => {
            let placed = false;
            for(let d of shuffledDays) {
                if (DATA.find(x => x.d === d && x.sub === item.sub && x.frm === item.frm)) continue;
                if(type === 'double') {
                    for(let i=0; i < SLOTS.length-1; i++) {
                        let t1 = SLOTS[i], t2 = SLOTS[i+1];
                        if(t1.isB || t2.isB || getSpecial(d, t1.id) || getSpecial(d, t2.id)) continue;
                        if(!DATA.find(x => x.d===d && x.p===t1.id && (x.tea===item.tea || x.frm===item.frm)) &&
                           !DATA.find(x => x.d===d && x.p===t2.id && (x.tea===item.tea || x.frm===item.frm))) {
                            DATA.push({...item, d, p: t1.id}, {...item, d, p: t2.id});
                            placed = true; break;
                        }
                    }
                } else {
                    for(let t of SLOTS) {
                        if(t.isB || getSpecial(d, t.id)) continue;
                        if(!DATA.find(x => x.d===d && x.p===t.id && (x.tea===item.tea || x.frm===item.frm))) {
                            DATA.push({...item, d, p: t.id});
                            placed = true; break;
                        }
                    }
                }
                if(placed) break;
            }
        });
    });
    updateFilters();
    renderMaster();
}

function onDragStart(e, idx) { draggedIdx = idx; e.dataTransfer.setData('text', idx); }
function onDragOver(e) { e.preventDefault(); }
function onDrop(e, day, pId, stream) {
    e.preventDefault();
    if(draggedIdx === null || getSpecial(day, pId)) return;
    const item = DATA[draggedIdx];
    
    // Check for target index (is there already something there?)
    const targetIdx = DATA.findIndex(x => x.d === day && x.p === pId && x.frm === stream);
    
    // If swapping or moving, check if we are creating a teacher collision in the NEW spot
    // (Actual collision detection happens on button click, but we block obvious teacher doubles here)
    const tConflict = DATA.find(x => x.d === day && x.p === pId && x.tea === item.tea && x.frm !== stream);
    if(tConflict) { if(!confirm(`Warning: Teacher ${item.tea} is already in ${tConflict.frm}. Move anyway?`)) return; }

    if(targetIdx !== -1) { 
        DATA[targetIdx].d = item.d; 
        DATA[targetIdx].p = item.p; 
    }
    item.d = day; 
    item.p = pId;
    renderMaster();
}

function updateFilters() {
    document.getElementById('viewBar').style.display = 'flex';
    const frms = [...new Set(DATA.map(x => x.frm))].sort();
    const teas = [...new Set(DATA.map(x => x.tea))].sort();
    document.getElementById('selStream').innerHTML = '<option value="">-- By Stream --</option>' + frms.map(f => `<option>${f}</option>`).join('');
    document.getElementById('selTeacher').innerHTML = '<option value="">-- By Teacher --</option>' + teas.map(t => `<option>${t}</option>`).join('');
}

// NEW FEATURE: COALITION/COLLISION CHECK
function checkConflicts() {
    let conflicts = [];
    // Check Teacher Conflicts
    DAYS.forEach(d => {
        SLOTS.forEach(s => {
            if(s.isB) return;
            const periodItems = DATA.filter(x => x.d === d && x.p === s.id);
            const teacherMap = {};
            const roomMap = {};
            
            periodItems.forEach(item => {
                // Teacher Check
                if(teacherMap[item.tea]) {
                    conflicts.push(`<b>Teacher Collision:</b> ${item.tea} is scheduled in both <b>${teacherMap[item.tea]}</b> and <b>${item.frm}</b> on ${d} (${s.id})`);
                } else { teacherMap[item.tea] = item.frm; }
                
                // Room Check (if room provided)
                if(item.room && item.room.trim() !== "") {
                    if(roomMap[item.room]) {
                        conflicts.push(`<b>Room Collision:</b> Room ${item.room} is used by both <b>${roomMap[item.room]}</b> and <b>${item.frm}</b> on ${d} (${s.id})`);
                    } else { roomMap[item.room] = item.frm; }
                }
            });
        });
    });

    let h = `<h2>COLLISION CHECK REPORT</h2>`;
    if(conflicts.length === 0) {
        h += `<div style="background:#e8f5e9; color:#2e7d32; padding:20px; border-radius:8px; border:1px solid #2e7d32; text-align:center;"><b>PERFECT!</b> No teacher or room collisions detected in the current timetable.</div>`;
    } else {
        h += `<div style="background:#ffebee; color:#c62828; padding:20px; border-radius:8px; border:1px solid #c62828;">`;
        h += `<p>Found <b>${conflicts.length}</b> scheduling conflicts:</p><ul>`;
        conflicts.forEach(c => h += `<li style="margin-bottom:8px;">${c}</li>`);
        h += `</ul><p><i>Use drag-and-drop to resolve these conflicts.</i></p></div>`;
    }
    document.getElementById('timetableArea').innerHTML = h;
}

function renderMaster() {
    const frms = [...new Set(DATA.map(x => x.frm))].sort();
    let h = `<h1 style="text-align:center;">${document.getElementById('schoolName').value}</h1><p style="text-align:center;">MASTER TIMETABLE ${document.getElementById('calYear').value}</p>`;
    DAYS.forEach(day => {
        h += `<div class="day-section"><div class="day-title">${day}</div><table><tr><th width="70">FORM</th>`;
        SLOTS.forEach(s => h += `<th>${s.id}<span class="time-label">${s.time}</span></th>`);
        h += `</tr>`;
        frms.forEach(f => {
            h += `<tr><td><b>${f}</b></td>`;
            SLOTS.forEach(s => {
                const spec = getSpecial(day, s.id);
                if(s.isB) h += `<td class="break-cell">${s.id}</td>`;
                else if(spec) h += `<td class="special-activity">${spec}</td>`;
                else {
                    const idx = DATA.findIndex(x => x.d === day && x.p === s.id && x.frm === f);
                    const m = DATA[idx];
                    h += `<td ondragover="onDragOver(event)" ondrop="onDrop(event, '${day}', '${s.id}', '${f}')">
                        ${m ? `<div class="period-block" draggable="true" ondragstart="onDragStart(event, ${idx})">
                            <b>${m.sub}</b><small>${m.tea}</small>
                            ${m.room ? `<br><small style="color:#1976d2">${m.room}</small>` : ''}
                        </div>` : ''}
                    </td>`;
                }
            });
            h += `</tr>`;
        });
        h += `</table></div>`;
    });
    document.getElementById('timetableArea').innerHTML = h;
}

function saveProject() {
    const registry = [];
    document.querySelectorAll('.registry-row').forEach(r => registry.push({ s: r.querySelector('.r-sub').value, t: r.querySelector('.r-tea').value, r: r.querySelector('.r-room').value, f: r.querySelector('.r-frm').value, p: r.querySelector('.r-pwk').value }));
    const project = { registry, data: DATA, settings: { school: document.getElementById('schoolName').value, year: document.getElementById('calYear').value, start: document.getElementById('startTime').value, dur: document.getElementById('pDur').value, total: document.getElementById('pTotal').value, bA: document.getElementById('breakAfter').value, bL: document.getElementById('breakLen').value, lA: document.getElementById('lunchAfter').value, lL: document.getElementById('lunchLen').value } };
    const blob = new Blob([JSON.stringify(project)], {type: "application/json"});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `TTPRO_Save.ttpro`; a.click();
}

function loadProject(ev) {
    const reader = new FileReader();
    reader.onload = (e) => {
        const p = JSON.parse(e.target.result);
        const s = p.settings;
        document.getElementById('schoolName').value = s.school; document.getElementById('calYear').value = s.year;
        document.getElementById('startTime').value = s.start; document.getElementById('pDur').value = s.dur;
        document.getElementById('pTotal').value = s.total; document.getElementById('breakAfter').value = s.bA;
        document.getElementById('breakLen').value = s.bL; document.getElementById('lunchAfter').value = s.lA;
        document.getElementById('lunchLen').value = s.lL;
        document.getElementById('regItems').innerHTML = "";
        p.registry.forEach(i => addRow(i.s, i.t, i.r, i.f, i.p)
