<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TT-PRO Enterprise - Fixed Distribution</title>
<style>
:root {
  --primary:#0f172a; --secondary:#1e293b; --accent:#22c55e;
  --bg:#f1f5f9; --danger:#ef4444; --info: #3b82f6;
}
body { margin:0; font-family:'Inter', sans-serif; display:flex; height: 100vh; background:var(--bg); }
.sidebar { width:260px; background:var(--secondary); color:white; padding:20px; display: flex; flex-direction: column; }
.sidebar h2 { color: var(--accent); text-align: center; border-bottom: 1px solid #334155; padding-bottom: 10px; }
.sidebar button { width:100%; margin:5px 0; padding:12px; background:#334155; color:white; border:none; border-radius:8px; cursor:pointer; text-align: left; font-size: 13px; }
.sidebar button:hover { background: #475569; }
.main { flex:1; padding:20px; overflow-y: auto; }
.card { background:white; padding:20px; border-radius:12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
table { width:100%; border-collapse:collapse; table-layout: fixed; border: 2px solid #000; }
th, td { border: 1px solid #000; padding:4px; text-align:center; font-size: 10px; height: 45px; }
th { background: #f8fafc; }
.slot { padding:4px; border-radius:4px; font-weight: 600; font-size: 9px; background: #dcfce7; border: 1px solid var(--accent); cursor: grab; }
.break-cell { background: #e2e8f0; font-weight: bold; width: 25px; writing-mode: vertical-rl; text-orientation: mixed; }
.special-cell { background: #fef3c7; color: #92400e; font-weight: bold; font-size: 9px; }
@media print { .sidebar, .no-print { display: none !important; } }
</style>
</head>
<body>

<div class="sidebar no-print">
    <h2>TT-PRO FIXED</h2>
    <button onclick="document.getElementById('csvIn').click()">📥 1. Import CSV</button>
    <input type="file" id="csvIn" style="display:none" accept=".csv" onchange="handleCSV(event)">
    <button onclick="generate()" style="background:var(--accent); color:#000; font-weight:bold;">⚡ 2. Generate Timetable</button>
    <hr style="width:100%; opacity:0.1">
    <button onclick="saveProject()">💾 Export Backup</button>
    <button onclick="window.print()">🖨️ Print View</button>
</div>

<div class="main">
    <div id="app">
        <div class="card">
            <h3>Distribution Fix Applied</h3>
            <p>The system now strictly follows: <b>Max 1 Session per Subject per Day.</b></p>
        </div>
    </div>
</div>

<script>
let DATA = [];
let REGISTRY = [];
let CLASSES = [];
let TEACHERS = [];
let SLOTS = [];

const DAYS = ["MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY"];

function buildTimeSlots() {
    SLOTS = [];
    let cur = new Date("2026-01-01T08:00");
    for(let i=1; i<=9; i++) {
        SLOTS.push({ id: 'P'+i, type: 'period' });
        if(i === 4) SLOTS.push({ id: 'BREAK', type: 'break' });
    }
}

function handleCSV(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim() !== "");
        const rawMap = {};
        lines.slice(1).forEach(line => {
            const cols = line.split(',').map(c => c.trim().toUpperCase());
            if (cols.length >= 4) {
                const [sub, tea, rm, frm] = [cols[0], cols[1], cols[2], cols[3]];
                const key = `${sub}|${tea}|${frm}`;
                rawMap[key] = (rawMap[key] || 0) + 1;
            }
        });
        REGISTRY = []; CLASSES = []; TEACHERS = [];
        for (let key in rawMap) {
            const [sub, tea, frm] = key.split('|');
            REGISTRY.push({ sub, tea, frm, pwk: rawMap[key] });
            if(!CLASSES.includes(frm)) CLASSES.push(frm);
            if(!TEACHERS.includes(tea)) TEACHERS.push(tea);
        }
        alert("CSV Loaded! Ready to Generate.");
    };
    reader.readAsText(e.target.files[0]);
}

function generate() {
    DATA = [];
    buildTimeSlots();
    
    // Sort so heavy subjects (more periods) get first pick of the days
    let sortedReg = [...REGISTRY].sort((a,b) => b.pwk - a.pwk);

    sortedReg.forEach(r => {
        let periodsLeft = r.pwk;

        // Try to place as many DOUBLE periods first (on different days)
        for (let dIdx = 0; dIdx < DAYS.length; dIdx++) {
            if (periodsLeft < 2) break;
            let day = DAYS[dIdx];

            for (let i = 0; i < SLOTS.length - 1; i++) {
                let s1 = SLOTS[i], s2 = SLOTS[i+1];
                if (s1.type === 'period' && s2.type === 'period' && !isSpecial(day, s1.id) && !isSpecial(day, s2.id)) {
                    if (!isBusy(day, s1.id, r) && !isBusy(day, s2.id, r)) {
                        DATA.push({...r, d: day, p: s1.id}, {...r, d: day, p: s2.id});
                        periodsLeft -= 2;
                        break; // Move to the NEXT DAY for this subject immediately
                    }
                }
            }
        }

        // Place remaining periods as SINGLE periods on days not yet used
        for (let dIdx = 0; dIdx < DAYS.length; dIdx++) {
            if (periodsLeft <= 0) break;
            let day = DAYS[dIdx];

            // CRITICAL CHECK: Has this subject already been placed on this day?
            if (DATA.some(x => x.d === day && x.sub === r.sub && x.frm === r.frm)) continue;

            for (let i = 0; i < SLOTS.length; i++) {
                let s = SLOTS[i];
                if (s.type === 'period' && !isSpecial(day, s.id) && !isBusy(day, s.id, r)) {
                    DATA.push({...r, d: day, p: s.id});
                    periodsLeft--;
                    break; // Move to the NEXT DAY
                }
            }
        }
    });
    renderMaster();
}

function isBusy(d,p,r){ return DATA.some(x=>x.d===d && x.p===p && (x.tea===r.tea || x.frm===r.frm)); }

function isSpecial(day, p) {
    if(day === 'WEDNESDAY' && (p === 'P8' || p === 'P9')) return true; // Religion
    if(day === 'THURSDAY' && (p === 'P8' || p === 'P9')) return true;  // Debate
    if(day === 'FRIDAY' && (p === 'P7' || p === 'P8' || p === 'P9')) return true; // Mosque
    return false;
}

function renderMaster() {
    let h = `<h2>MASTER GENERAL VIEW</h2>`;
    DAYS.forEach(day => {
        h += `<div class="card"><h3>${day}</h3><table><tr><th>Stream</th>`;
        SLOTS.forEach(s => h += `<th>${s.id}</th>`);
        h += `</tr>`;
        CLASSES.sort().forEach(f => {
            h += `<tr><td style="font-weight:bold">${f}</td>`;
            SLOTS.forEach(s => {
                if(s.type === 'break') h += `<td class="break-cell">BRK</td>`;
                else if(isSpecial(day, s.id)) h += `<td class="special-cell">SPEC</td>`;
                else {
                    let m = DATA.find(x => x.d===day && x.p===s.id && x.frm===f);
                    h += `<td>${m ? `<div class="slot">${m.sub}<br><small>${m.tea}</small></div>` : ''}</td>`;
                }
            });
            h += `</tr>`;
        });
        h += `</table></div>`;
    });
    document.getElementById("app").innerHTML = h;
}

function saveProject() {
    const blob = new Blob([JSON.stringify({REGISTRY, DATA, CLASSES, TEACHERS})], {type: "application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "Timetable_Fixed.json";
    a.click();
}
</script>
</body>
</html>
