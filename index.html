<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TT-PRO Enterprise - Smart Reallocation</title>
<style>
:root {
  --primary:#0f172a; --secondary:#1e293b; --accent:#22c55e;
  --bg:#f8fafc; --border:#e2e8f0; --text:#334155;
}
body { margin:0; font-family:'Inter', sans-serif; display:flex; height: 100vh; background:var(--bg); overflow:hidden; }

/* SIDEBAR */
.sidebar { width:320px; background:var(--primary); color:white; padding:20px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
.sidebar h2 { color: var(--accent); text-align: center; border-bottom: 1px solid #334155; padding-bottom: 10px; }
.setting-card { background: #1e293b; padding: 12px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 5px; }
.setting-card label { display: block; font-size: 10px; color: #94a3b8; margin-bottom: 4px; font-weight: 700; }
.setting-card input { width: 100%; padding: 8px; border-radius: 4px; border: none; background: #0f172a; color: white; box-sizing: border-box; }

.btn { width: 100%; padding: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; margin-top: 5px; }
.btn-gen { background: var(--accent); color: #064e3b; }
.btn-sec { background: #475569; color: white; }

/* MAIN */
.main { flex:1; display: flex; flex-direction: column; overflow: hidden; }
.top-bar { background: white; padding: 12px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; }
.content { flex:1; padding: 20px; overflow-y: auto; }
.table-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 25px; }
table { width: 100%; border-collapse: collapse; border: 2px solid #000; }
th, td { border: 1px solid #000; padding: 4px; text-align: center; font-size: 9px; height: 40px; }
.slot { padding: 3px; border-radius: 4px; font-weight: 700; background: #dcfce7; border: 1px solid #22c55e; }
.break-cell { background: #cbd5e1; font-weight: bold; width: 30px; writing-mode: vertical-rl; text-orientation: mixed; }
</style>
</head>
<body>

<div class="sidebar">
    <h2>TT-PRO SHUFFLE</h2>
    <div class="setting-card">
        <label>School Name</label>
        <input type="text" id="schName" value="TANZANIA SECONDARY">
    </div>
    <div class="setting-card">
        <label>Workday Settings</label>
        <div style="display:flex; gap:5px;">
            <div style="flex:1"><label>Break After</label><input type="number" id="breakAfter" value="2"></div>
            <div style="flex:1"><label>Lunch After</label><input type="number" id="lunchAfter" value="4"></div>
        </div>
    </div>
    <button class="btn btn-gen" onclick="generate()">⚡ REALLOCATE & GENERATE</button>
    <button class="btn btn-sec" onclick="document.getElementById('csvIn').click()">📥 IMPORT CSV</button>
    <input type="file" id="csvIn" style="display:none" accept=".csv" onchange="handleCSV(event)">
    <button class="btn btn-sec" onclick="saveProject()">💾 BACKUP PROJECT</button>
    <button class="btn btn-sec" onclick="document.getElementById('loadProj').click()">📂 LOAD SAVED</button>
    <input type="file" id="loadProj" style="display:none" accept=".json" onchange="loadProject(event)">
</div>

<div class="main">
    <div class="top-bar">
        <button onclick="setView('GENERAL')">Master View</button>
        <button onclick="setView('STREAM')">By Stream</button>
        <select id="viewFilter" onchange="renderActiveView()" style="display:none;"></select>
    </div>
    <div class="content">
        <div id="app"></div>
    </div>
</div>

<script>
let DATA = [], REGISTRY = [], CLASSES = [], TEACHERS = [], SLOTS = [], currentView = 'GENERAL';
const DAYS = ["MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY"];

// Helper to randomize arrays so "Generate" creates a new version every time
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function handleCSV(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim() !== "");
        const rawMap = {};
        lines.slice(1).forEach(line => {
            const cols = line.split(',').map(c => c.trim().toUpperCase());
            if (cols.length >= 4) {
                const [sub, tea, frm] = [cols[0], cols[1], cols[cols.length-1]];
                const key = `${sub}|${tea}|${frm}`;
                rawMap[key] = (rawMap[key] || 0) + 1;
            }
        });
        REGISTRY = []; CLASSES = []; TEACHERS = [];
        for (let key in rawMap) {
            const [sub, tea, frm] = key.split('|');
            REGISTRY.push({ sub, tea, frm, pwk: rawMap[key] });
            if(!CLASSES.includes(frm)) CLASSES.push(frm);
            if(!TEACHERS.includes(tea)) TEACHERS.push(tea);
        }
        alert("CSV Imported!");
    };
    reader.readAsText(e.target.files[0]);
}

function buildSlots() {
    SLOTS = [];
    let bAft = parseInt(document.getElementById('breakAfter').value);
    let lAft = parseInt(document.getElementById('lunchAfter').value);
    for(let i=1; i<=9; i++) {
        SLOTS.push({ id: 'P'+i, type: 'period' });
        if(i === bAft) SLOTS.push({ id: 'BREAK', type: 'break' });
        if(i === lAft) SLOTS.push({ id: 'LUNCH', type: 'lunch' });
    }
}

function generate() {
    DATA = []; buildSlots();
    // Shuffle the Registry so the subjects pick slots in a different order each time
    let subjects = shuffle([...REGISTRY]);

    subjects.forEach(r => {
        let left = r.pwk;
        let shuffledDays = shuffle([...DAYS]);

        // Priority Doubles
        for(let day of shuffledDays) {
            if(left < 2) break;
            for(let i=0; i<SLOTS.length-1; i++) {
                let s1 = SLOTS[i], s2 = SLOTS[i+1];
                if(s1.type==='period' && s2.type==='period' && !isSpecial(day, s1.id) && !isSpecial(day, s2.id)) {
                    if(!isBusy(day, s1.id, r) && !isBusy(day, s2.id, r)) {
                        DATA.push({...r, d: day, p: s1.id}, {...r, d: day, p: s2.id});
                        left -= 2; break;
                    }
                }
            }
        }

        // Singles
        for(let day of shuffledDays) {
            if(left <= 0) break;
            // Strict: Max 1 session per day
            if(DATA.some(x => x.d===day && x.sub===r.sub && x.frm===r.frm)) continue;

            let shuffledPeriods = shuffle([...SLOTS].filter(s => s.type === 'period'));
            for(let s of shuffledPeriods) {
                if(!isSpecial(day, s.id) && !isBusy(day, s.id, r)) {
                    DATA.push({...r, d: day, p: s.id});
                    left--; break;
                }
            }
        }
    });
    renderActiveView();
}

function isBusy(d,p,r){ return DATA.some(x=>x.d===d && x.p===p && (x.tea===r.tea || x.frm===r.frm)); }
function isSpecial(day, p) {
    if(day === 'WEDNESDAY' && (p === 'P8' || p === 'P9')) return true;
    if(day === 'THURSDAY' && (p === 'P8' || p === 'P9')) return true;
    if(day === 'FRIDAY' && (p === 'P7' || p === 'P8' || p === 'P9')) return true;
    return false;
}

function renderMaster() {
    let h = "";
    DAYS.forEach(day => {
        h += `<div class="table-card"><h3>${day}</h3><table><tr><th>Stream</th>`;
        SLOTS.forEach(s => h += `<th>${s.id}</th>`);
        h += `</tr>`;
        CLASSES.sort().forEach(f => {
            h += `<tr><td style="font-weight:bold">${f}</td>`;
            SLOTS.forEach(s => {
                if(s.type==='break'||s.type==='lunch') h += `<td class="break-cell">${s.id}</td>`;
                else if(isSpecial(day, s.id)) h += `<td style="background:#fef3c7;font-size:7px">SPEC</td>`;
                else {
                    let m = DATA.find(x => x.d===day && x.p===s.id && x.frm===f);
                    h += `<td>${m?`<div class="slot">${m.sub}<br>${m.tea}</div>`:''}</td>`;
                }
            });
            h += `</tr>`;
        });
        h += `</table></div>`;
    });
    document.getElementById('app').innerHTML = h;
}

function saveProject() {
    const blob = new Blob([JSON.stringify({DATA, REGISTRY, CLASSES, TEACHERS})], {type: "application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `TT_Backup.json`;
    a.click();
}

function loadProject(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const p = JSON.parse(ev.target.result);
        DATA = p.DATA; REGISTRY = p.REGISTRY; CLASSES = p.CLASSES; TEACHERS = p.TEACHERS;
        renderActiveView();
    };
    reader.readAsText(e.target.files[0]);
}

function setView(v) { 
    currentView = v; 
    let fil = document.getElementById('viewFilter'); 
    fil.style.display = v==='STREAM'?'inline-block':'none';
    if(v==='STREAM') {
        fil.innerHTML = '';
        CLASSES.sort().forEach(c => fil.innerHTML += `<option value="${c}">${c}</option>`);
    }
    renderActiveView(); 
}

function renderActiveView() { if(currentView==='GENERAL') renderMaster(); else renderStream(); }

function renderStream() {
    const f = document.getElementById('viewFilter').value;
    let h = `<div class="table-card"><h3>Stream: ${f}</h3><table><tr><th>Day</th>`;
    SLOTS.forEach(s => h += `<th>${s.id}</th>`);
    h += `</tr>`;
    DAYS.forEach(d => {
        h += `<tr><td><b>${d}</b></td>`;
        SLOTS.forEach(s => {
            if(s.type==='break'||s.type==='lunch') h += `<td class="break-cell">${s.id}</td>`;
            else {
                let m = DATA.find(x => x.d===d && x.p===s.id && x.frm===f);
                h += `<td>${m?`<div class="slot">${m.sub}<br>${m.tea}</div>`:''}</td>`;
            }
        });
        h += `</tr>`;
    });
    document.getElementById('app').innerHTML = h + `</table></div>`;
}
</script>
</body>
</html>
