<!-- =========================================================
     UPDATED SPECIAL BLOCK SECTION (DROP-IN REPLACEMENT)
     REPLACE YOUR CURRENT SPECIAL BLOCK HTML + FUNCTIONS
========================================================= -->

<!-- ================= SPECIAL BLOCK HTML ================= -->

<div class="section-title">Special Blocks</div>

<div class="special-box">

<input id="spName" placeholder="ASSEMBLY">

<select id="spDay">

<option value="ALL">EVERY DAY</option>
<option value="MON">MONDAY</option>
<option value="TUE">TUESDAY</option>
<option value="WED">WEDNESDAY</option>
<option value="THU">THURSDAY</option>
<option value="FRI">FRIDAY</option>

</select>

<!-- UPDATED -->
<input
id="spAfter"
placeholder="After Periods e.g 6,7,8">

<input
id="spDur"
type="number"
placeholder="Duration (Min)">

<button
class="btn-blue"
onclick="addSpecial()">

+ ADD SPECIAL BLOCK

</button>

<div
id="specialList"
style="margin-top:10px">
</div>

</div>

<script>

/* =========================================================
   UPDATED SPECIAL BLOCK SYSTEM
========================================================= */

function addSpecial(){

    const name=spName.value
    .trim()
    .toUpperCase();

    const day=spDay.value;

    const afterRaw=spAfter.value.trim();

    const dur=parseInt(spDur.value);

    if(
        !name
        ||
        !afterRaw
        ||
        !dur
    ){

        alert("Fill all fields");

        return;
    }

    /* =========================================
       MULTIPLE PERIOD SUPPORT
       EXAMPLE:
       6,7,8
    ========================================= */

    const afterList=afterRaw

    .split(',')

    .map(x=>parseInt(x.trim()))

    .filter(x=>!isNaN(x));

    if(afterList.length===0){

        alert("Invalid period list");

        return;
    }

    SPECIALS.push({

        name,
        day,
        afterList,
        dur

    });

    renderSpecials();

    spName.value="";
    spAfter.value="";
    spDur.value="";
}

/* =========================================================
   RENDER SPECIALS
========================================================= */

function renderSpecials(){

    specialList.innerHTML=

    SPECIALS.map((s,i)=>`

    <div style="
        background:#334155;
        padding:10px;
        border-radius:10px;
        margin-top:8px;
        color:white;
        font-size:12px;
    ">

        <b>${s.name}</b><br>

        Day:
        ${s.day}<br>

        After Period(s):
        ${s.afterList.join(', ')}<br>

        Duration:
        ${s.dur} Min

        <button
        class="btn-red"
        style="
            padding:5px;
            margin-top:8px;
        "
        onclick="removeSpecial(${i})">

        REMOVE

        </button>

    </div>

    `).join('');
}

/* =========================================================
   REMOVE SPECIAL
========================================================= */

function removeSpecial(i){

    SPECIALS.splice(i,1);

    renderSpecials();
}

/* =========================================================
   UPDATED SLOT BUILDER
   KEEP ALL OTHER SETTINGS UNCHANGED
========================================================= */

function buildSlots(day){

    let slots=[];

    let cur=new Date(
        "2026-01-01T"+startTime.value
    );

    const total=+totalPeriods.value;

    const dur=+periodDur.value;

    for(let i=1;i<=total;i++){

        let s=cur.toTimeString()
        .slice(0,5);

        cur.setMinutes(
            cur.getMinutes()+dur
        );

        let e=cur.toTimeString()
        .slice(0,5);

        /* =====================================
           PERIOD
        ===================================== */

        slots.push({

            id:"P"+i,

            type:"period",

            label:`P${i}<br>${s}-${e}`

        });

        /* =====================================
           BREAK
        ===================================== */

        if(i==breakAfter.value){

            slots.push({

                type:"break",

                label:"BREAK"

            });

            cur.setMinutes(

                cur.getMinutes()

                +

                +breakDur.value

            );
        }

        /* =====================================
           LUNCH
        ===================================== */

        if(i==lunchAfter.value){

            slots.push({

                type:"lunch",

                label:"LUNCH"

            });

            cur.setMinutes(

                cur.getMinutes()

                +

                +lunchDur.value

            );
        }

        /* =================================================
           UPDATED SPECIAL BLOCKS
           SUPPORTS:
           6,7,8

           INSERTS SPECIAL BLOCK
           AFTER THOSE PERIODS
        ================================================= */

        SPECIALS.forEach(sp=>{

            if(

                sp.afterList.includes(i)

                &&

                (
                    sp.day=="ALL"
                    ||

                    sp.day==day
                )

            ){

                slots.push({

                    type:"special",

                    label:sp.name

                });

                cur.setMinutes(

                    cur.getMinutes()

                    +

                    sp.dur

                );
            }

        });

    }

    return slots;
}

</script>
