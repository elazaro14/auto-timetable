<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TT-PRO Enterprise</title>

<style>
:root {
  --primary:#0f172a; --accent:#22c55e;
  --bg:#f8fafc; --border:#e2e8f0;
}
body { margin:0; font-family:system-ui; display:flex; height:100vh; background:var(--bg); }

/* SIDEBAR */
.sidebar { width:320px; background:var(--primary); color:white; padding:15px; overflow:auto; }
.sidebar h2 { color:var(--accent); text-align:center; }

.btn { width:100%; padding:10px; margin-top:5px; border:none; cursor:pointer; }
.btn-gen { background:var(--accent); }
.btn-sec { background:#475569; color:white; }

/* MAIN */
.main { flex:1; display:flex; flex-direction:column; }
.top-bar { background:white; padding:10px; border-bottom:1px solid var(--border); }
.content { padding:15px; overflow:auto; }

.table-card { background:white; padding:10px; margin-bottom:20px; border-radius:10px; }
table { width:100%; border-collapse:collapse; }
th,td { border:1px solid black; text-align:center; font-size:10px; height:40px; }

.break-cell { background:#ddd; }
.slot { background:#dcfce7; font-weight:bold; }

#dashboard { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:15px; }

/* LOGIN */
#loginScreen {
 position:fixed; inset:0; background:#0f172a;
 display:flex; align-items:center; justify-content:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
<div style="background:white;padding:20px;border-radius:10px;width:250px;">
<h3>Admin Login</h3>
<input type="password" id="pass" placeholder="Password" style="width:100%;padding:8px;">
<button onclick="login()" class="btn btn-gen">Login</button>
</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>TT-PRO</h2>

<input type="text" id="schName" value="SCHOOL" style="width:100%;padding:8px;">

<button class="btn btn-gen" onclick="generate()">Generate</button>
<button class="btn btn-sec" onclick="viewTeacherLoads()">Teacher Loads</button>
<button class="btn btn-sec" onclick="exportCSV()">Export CSV</button>

<input type="file" onchange="handleCSV(event)">
</div>

<!-- MAIN -->
<div class="main">
<div class="top-bar">
<button onclick="setView('GENERAL')">Master</button>
<button onclick="setView('STREAM')">Stream</button>
<button onclick="setView('TEACHER')">Teacher</button>
<select id="viewFilter" onchange="renderActiveView()" style="display:none;"></select>
</div>

<div class="content">
<h2 id="title"></h2>
<div id="dashboard"></div>
<div id="app"></div>
</div>
</div>

<script>
let DATA=[], REGISTRY=[], CLASSES=[], TEACHERS=[], SLOTS=[];
let currentView='GENERAL';
const DAYS=["MON","TUE","WED","THU","FRI"];

/* LOGIN */
function login(){
 if(document.getElementById('pass').value==="admin123"){
  document.getElementById('loginScreen').style.display="none";
 } else alert("Wrong password");
}

/* CSV */
function handleCSV(e){
 const r=new FileReader();
 r.onload=ev=>{
  const lines=ev.target.result.split("\n");
  REGISTRY=[]; CLASSES=[]; TEACHERS=[];
  lines.slice(1).forEach(l=>{
   let [sub,tea,frm,pwk]=l.split(",");
   if(!sub) return;
   REGISTRY.push({sub,tea,frm,pwk:+pwk});
   if(!CLASSES.includes(frm)) CLASSES.push(frm);
   if(!TEACHERS.includes(tea)) TEACHERS.push(tea);
  });
 };
 r.readAsText(e.target.files[0]);
}

/* SLOTS */
function buildSlots(){
 SLOTS=[];
 for(let i=1;i<=8;i++) SLOTS.push({id:'P'+i,type:'period'});
}

/* LOGIC */
function teacherLoad(t){ return DATA.filter(x=>x.tea===t).length; }

function isBusy(d,p,r){
 return DATA.some(x=>x.d===d && x.p===p && (x.tea===r.tea||x.frm===r.frm))
 || teacherLoad(r.tea)>=30;
}

function generate(){
 DATA=[]; buildSlots();
 document.getElementById('title').innerText=document.getElementById('schName').value;

 REGISTRY.forEach(r=>{
  let left=r.pwk;
  DAYS.forEach(d=>{
   for(let s of SLOTS){
    if(left>0 && !isBusy(d,s.id,r)){
     DATA.push({...r,d,p:s.id});
     left--;
    }
   }
  });
 });

 renderActiveView();
}

/* DASHBOARD */
function renderDashboard(){
 let overload=TEACHERS.filter(t=>teacherLoad(t)>30).length;
 document.getElementById('dashboard').innerHTML=`
 <div class="table-card">Classes<br>${CLASSES.length}</div>
 <div class="table-card">Teachers<br>${TEACHERS.length}</div>
 <div class="table-card">Lessons<br>${DATA.length}</div>
 <div class="table-card">Overload<br>${overload}</div>`;
}

/* VIEW */
function setView(v){
 currentView=v;
 let f=document.getElementById('viewFilter');
 f.style.display=v==='GENERAL'?'none':'inline';
 let list=v==='STREAM'?CLASSES:TEACHERS;
 f.innerHTML=list.map(x=>`<option>${x}</option>`).join('');
 renderActiveView();
}

function renderActiveView(){
 renderDashboard();
 if(currentView==='GENERAL') renderMaster();
 else renderFiltered();
}

function renderMaster(){
 let h="";
 DAYS.forEach(d=>{
  h+=`<div class="table-card"><b>${d}</b><table><tr><th>Class</th>`;
  SLOTS.forEach(s=>h+=`<th>${s.id}</th>`);
  h+="</tr>";

  CLASSES.forEach(c=>{
   h+=`<tr><td>${c}</td>`;
   SLOTS.forEach(s=>{
    let m=DATA.find(x=>x.d===d&&x.p===s.id&&x.frm===c);
    h+=`<td draggable="true" ondragstart="drag(event)" ondrop="drop(event)" ondragover="allowDrop(event)" 
    data-day="${d}" data-period="${s.id}" data-class="${c}">
    ${m?`<div class="slot">${m.sub}<br>${m.tea}</div>`:''}</td>`;
   });
   h+="</tr>";
  });

  h+="</table></div>";
 });
 document.getElementById('app').innerHTML=h;
}

function renderFiltered(){
 let val=document.getElementById('viewFilter').value;
 let key=currentView==='STREAM'?'frm':'tea';

 let h=`<div class="table-card"><b>${val}</b><table><tr><th>Day</th>`;
 SLOTS.forEach(s=>h+=`<th>${s.id}</th>`);
 h+="</tr>";

 DAYS.forEach(d=>{
  h+=`<tr><td>${d}</td>`;
  SLOTS.forEach(s=>{
   let m=DATA.find(x=>x.d===d&&x.p===s.id&&x[key]===val);
   h+=`<td>${m?m.sub:''}</td>`;
  });
  h+="</tr>";
 });

 document.getElementById('app').innerHTML=h+"</table></div>";
}

/* DRAG */
let dragged;
function drag(e){ dragged=e.target.closest("td"); }
function allowDrop(e){ e.preventDefault(); }
function drop(e){
 e.preventDefault();
 let t=e.target.closest("td");
 let a=DATA.find(x=>x.d===dragged.dataset.day && x.p===dragged.dataset.period && x.frm===dragged.dataset.class);
 if(a){ a.d=t.dataset.day; a.p=t.dataset.period; }
 renderActiveView();
}

/* LOAD VIEW */
function viewTeacherLoads(){
 let h="<div class='table-card'><table><tr><th>Teacher</th><th>Load</th></tr>";
 TEACHERS.forEach(t=>{
  h+=`<tr><td>${t}</td><td>${teacherLoad(t)}</td></tr>`;
 });
 document.getElementById('app').innerHTML=h+"</table></div>";
}

/* EXPORT */
function exportCSV(){
 let rows=["Day,Class,Period,Subject,Teacher"];
 DATA.forEach(d=>rows.push(`${d.d},${d.frm},${d.p},${d.sub},${d.tea}`));
 let blob=new Blob([rows.join("\n")]);
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="timetable.csv";
 a.click();
}
</script>

</body>
</html>
