<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TT-PRO Modular System 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary:#0f172a; --secondary:#1e293b; --accent:#22c55e;
            --bg:#f8fafc; --border:#e2e8f0; --text:#334155;
        }
        body { margin:0; font-family:'Inter', sans-serif; display:flex; height:100vh; background:var(--bg); overflow:hidden; }
        
        /* Sidebar Module */
        .sidebar { width:340px; background:var(--primary); color:white; padding:20px; overflow-y:auto; border-right:1px solid #334155; }
        .sidebar h2 { color:var(--accent); text-align:center; font-size:1.2rem; border-bottom:1px solid #334155; padding-bottom:10px; }
        
        .module-box { background:rgba(255,255,255,0.05); padding:12px; border-radius:8px; margin-bottom:15px; border:1px solid #334155; }
        .module-box label { display:block; font-size:10px; color:#94a3b8; text-transform:uppercase; margin-bottom:4px; font-weight:bold; }
        .module-box input, .module-box select { width:100%; padding:8px; background:#0f172a; border:1px solid #334155; color:white; border-radius:4px; font-size:13px; margin-bottom:5px; box-sizing:border-box; }
        
        .nav-header { font-size:11px; color:#38bdf8; font-weight:800; margin:10px 0; text-transform:uppercase; border-left:3px solid var(--accent); padding-left:8px; }
        
        /* Content Module */
        .main-stage { flex:1; display:flex; flex-direction:column; overflow:hidden; }
        .top-nav { background:white; padding:10px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
        .tabs button { padding:8px 15px; border:1px solid var(--border); background:white; cursor:pointer; font-size:12px; border-radius:4px; margin-right:5px; }
        .tabs button.active { background:var(--primary); color:white; }
        
        .canvas { flex:1; padding:20px; overflow-y:auto; }
        .table-wrap { background:white; border:1px solid var(--border); border-radius:8px; padding:15px; margin-bottom:20px; page-break-after:always; }
        
        table { width:100%; border-collapse:collapse; border:2px solid #000; table-layout:fixed; }
        th, td { border:1px solid #000; padding:4px; text-align:center; font-size:9px; height:42px; }
        th { background:#f1f5f9; }
        
        .slot-item { background:#dcfce7; border:1px solid var(--accent); border-radius:4px; padding:2px; font-weight:bold; font-size:8px; line-height:1.2; }
        .break-bar { background:#cbd5e1; font-weight:bold; writing-mode:vertical-rl; font-size:9px; border:2px solid #000 !important; }
        
        .btn { width:100%; padding:12px; border:none; border-radius:6px; cursor:pointer; font-weight:bold; margin-top:5px; }
        .btn-prime { background:var(--accent); color:#064e3b; }
        .btn-dim { background:#475569; color:white; }
        
        @page { size: A4 landscape; margin: 5mm; }
        @media print { .sidebar, .top-nav { display:none !important; } .canvas { padding:0; overflow:visible; } }
    </style>
</head>
<body>

<div class="sidebar no-print">
    <h2>TT-PRO MODULAR</h2>
    
    <div class="nav-header">Identity</div>
    <div class="module-box">
        <label>School Name</label>
        <input type="text" id="schName" value="TANZANIA SECONDARY SCHOOL" oninput="UI.refreshHeader()">
        <label>Year</label>
        <input type="text" id="acadYear" value="2026" oninput="UI.refreshHeader()">
        <input type="file" id="logoIn" accept="image/*" onchange="Data.handleLogo(event)">
    </div>

    <div class="nav-header">Constraints (P8, P9)</div>
    <div class="module-box">
        <div style="display:flex; gap:5px">
            <select id="relDay"><option>WEDNESDAY</option><option>FRIDAY</option></select>
            <input type="text" id="relP" value="8,9" placeholder="Religion P#">
        </div>
        <div style="display:flex; gap:5px">
            <select id="debDay"><option>THURSDAY</option><option>MONDAY</option></select>
            <input type="text" id="debP" value="8,9" placeholder="Debate P#">
        </div>
    </div>

    <div class="nav-header">Intervals</div>
    <div class="module-box">
        <div style="display:flex; gap:5px">
            <select id="totalP"><option value="9">9 Periods</option><option value="10">10 Periods</option></select>
            <input type="number" id="pDur" value="40" title="Duration">
        </div>
        <div style="display:flex; gap:5px; margin-top:5px">
            <label>Break After</label><input type="number" id="brkAf" value="2">
            <label>Lunch After</label><input type="number" id="lchAf" value="4">
        </div>
    </div>

    <button class="btn btn-prime" onclick="Scheduler.generate()">⚡ GENERATE SYSTEM</button>
    <button class="btn btn-dim" onclick="document.getElementById('csvIn').click()">📥 UPLOAD CSV</button>
    <input type="file" id="csvIn" style="display:none" onchange="Data.handleCSV(event)">
    <button class="btn btn-dim" onclick="UI.exportPDF()">📄 EXPORT PDF</button>
</div>

<div class="main-stage">
    <div class="top-nav">
        <div class="tabs">
            <button id="tab-MASTER" class="active" onclick="UI.setView('MASTER')">Master View</button>
            <button id="tab-STREAM" onclick="UI.setView('STREAM')">Stream View</button>
            <button id="tab-TEACHER" onclick="UI.setView('TEACHER')">Teacher View</button>
            <button id="tab-LOADS" onclick="UI.setView('LOADS')">Load Analysis</button>
        </div>
        <select id="viewFilter" onchange="UI.render()" style="display:none; padding:5px;"></select>
    </div>
    
    <div class="canvas" id="printArea">
        <div id="reportHeader" style="display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:20px;">
            <img id="logoPrev" style="height:70px; display:none;">
            <div style="text-align:center">
                <h1 id="outName" style="margin:0">TANZANIA SECONDARY SCHOOL</h1>
                <h3 id="outYear" style="margin:5px 0; color:#64748b">ACADEMIC YEAR 2026</h3>
            </div>
        </div>
        <div id="app"></div>
    </div>
</div>

<script>
/** 1. DATA MODULE: Handles Inputs & Processing **/
const Data = {
    registry: [], classes: [], teachers: [], slots: [], timetable: [],
    logo: "", days: ["MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY"],

    handleCSV(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const rows = ev.target.result.split('\n').filter(r => r.trim());
            this.registry = []; this.classes = []; this.teachers = [];
            rows.slice(1).forEach(line => {
                const [sub, tea, pwk, frm] = line.split(',').map(s => s.trim().toUpperCase());
                if(sub && frm) {
                    this.registry.push({ sub, tea, pwk: parseInt(pwk), frm });
                    if(!this.classes.includes(frm)) this.classes.push(frm);
                    if(!this.teachers.includes(tea)) this.teachers.push(tea);
                }
            });
            alert(`Loaded ${this.registry.length} subjects. Ready to Generate.`);
        };
        reader.readAsText(e.target.files[0]);
    },

    handleLogo(e) {
        const reader = new FileReader();
        reader.onload = () => { 
            this.logo = reader.result; 
            document.getElementById('logoPrev').src = this.logo;
            document.getElementById('logoPrev').style.display = 'block';
        };
        reader.readAsDataURL(e.target.files[0]);
    }
};

/** 2. SCHEDULER MODULE: Core Logic & P9 Allocation **/
const Scheduler = {
    buildSlots() {
        Data.slots = [];
        let time = new Date("2026-01-01T08:00");
        const total = parseInt(document.getElementById('totalP').value);
        const dur = parseInt(document.getElementById('pDur').value);
        const bAf = parseInt(document.getElementById('brkAf').value);
        const lAf = parseInt(document.getElementById('lchAf').value);

        for(let i=1; i<=total; i++) {
            let start = time.toTimeString().slice(0,5);
            time.setMinutes(time.getMinutes() + dur);
            let end = time.toTimeString().slice(0,5);
            
            Data.slots.push({ id: 'P'+i, label: `P${i}<br><small>${start}-${end}</small>`, type: 'period' });

            if(i === bAf) { time.setMinutes(time.getMinutes()+20); Data.slots.push({ id: 'BREAK', type: 'break' }); }
            if(i === lAf) { time.setMinutes(time.getMinutes()+45); Data.slots.push({ id: 'LUNCH', type: 'lunch' }); }
        }
    },

    isSpecial(day, pId) {
        const pNum = pId.replace('P','');
        if(day === document.getElementById('relDay').value && document.getElementById('relP').value.split(',').includes(pNum)) return "RELIGION";
        if(day === document.getElementById('debDay').value && document.getElementById('debP').value.split(',').includes(pNum)) return "DEBATE";
        return null;
    },

    generate() {
        if(!Data.registry.length) return alert("Upload CSV First");
        this.buildSlots();
        Data.timetable = [];
        const regCopy = JSON.parse(JSON.stringify(Data.registry));

        Data.classes.forEach(frm => {
            const subjects = regCopy.filter(r => r.frm === frm).sort((a,b) => b.pwk - a.pwk);
            subjects.forEach(s => {
                let left = s.pwk;
                // Double Periods Priority
                Data.days.forEach(d => {
                    if(left < 2) return;
                    for(let i=0; i<Data.slots.length-1; i++) {
                        let p1 = Data.slots[i], p2 = Data.slots[i+1];
                        if(p1.type==='period' && p2.type==='period' && !this.isSpecial(d,p1.id) && !this.isSpecial(d,p2.id)) {
                            if(!Data.timetable.some(x=>x.d===d && (x.p===p1.id || x.p===p2.id) && (x.tea===s.tea || x.frm===s.frm))) {
                                Data.timetable.push({...s, d, p:p1.id}, {...s, d, p:p2.id});
                                left -= 2; break;
                            }
                        }
                    }
                });
                // Single/P9 Allocation
                Data.days.forEach(d => {
                    if(left <= 0) return;
                    Data.slots.filter(sl => sl.type === 'period').forEach(sl => {
                        if(left > 0 && !this.isSpecial(d,sl.id) && !Data.timetable.some(x=>x.d===d && x.p===sl.id && (x.tea===s.tea || x.frm===s.frm))) {
                            Data.timetable.push({...s, d, p:sl.id});
                            left--;
                        }
                    });
                });
            });
        });
        UI.render();
    }
};

/** 3. UI MODULE: Rendering & Exports **/
const UI = {
    currentView: 'MASTER',

    refreshHeader() {
        document.getElementById('outName').innerText = document.getElementById('schName').value;
        document.getElementById('outYear').innerText = "ACADEMIC YEAR " + document.getElementById('acadYear').value;
    },

    setView(v) {
        this.currentView = v;
        document.querySelectorAll('.tabs button').forEach(b => b.classList.toggle('active', b.id === 'tab-'+v));
        const fil = document.getElementById('viewFilter');
        fil.style.display = (v==='STREAM' || v==='TEACHER') ? 'block' : 'none';
        
        if(v==='STREAM') { fil.innerHTML = Data.classes.map(c => `<option value="${c}">${c}</option>`).join(''); }
        if(v==='TEACHER') { fil.innerHTML = Data.teachers.sort().map(t => `<option value="${t}">${t}</option>`).join(''); }
        this.render();
    },

    render() {
        const app = document.getElementById('app');
        if(this.currentView === 'MASTER') this.drawMaster(app);
        else if(this.currentView === 'LOADS') this.drawLoads(app);
        else this.drawSingle(app);
    },

    drawMaster(el) {
        let html = "";
        Data.days.forEach(day => {
            html += `<div class="table-wrap"><h3>${day}</h3><table><tr><th style="width:50px">Class</th>`;
            Data.slots.forEach(s => html += `<th>${s.label || s.id}</th>`);
            html += `</tr>`;
            Data.classes.sort().forEach(frm => {
                html += `<tr><td><b>${frm}</b></td>`;
                Data.slots.forEach(s => {
                    const spec = Scheduler.isSpecial(day, s.id);
                    if(s.type !== 'period') html += `<td class="break-bar">${s.id}</td>`;
                    else if(spec) html += `<td style="background:#fef3c7; font-weight:bold">${spec}</td>`;
                    else {
                        const m = Data.timetable.find(x => x.d===day && x.p===s.id && x.frm===frm);
                        html += `<td>${m ? `<div class="slot-item">${m.sub}<br>${m.tea}</div>` : ''}</td>`;
                    }
                });
                html += `</tr>`;
            });
            html += `</table></div>`;
        });
        el.innerHTML = html;
    },

    drawSingle(el) {
        const val = document.getElementById('viewFilter').value;
        const key = this.currentView === 'STREAM' ? 'frm' : 'tea';
        let html = `<div class="table-wrap"><h3>Schedule for ${val}</h3><table><tr><th>Day</th>`;
        Data.slots.forEach(s => html += `<th>${s.label || s.id}</th>`);
        html += `</tr>`;
        Data.days.forEach(d => {
            html += `<tr><td><b>${d}</b></td>`;
            Data.slots.forEach(s => {
                const spec = Scheduler.isSpecial(d, s.id);
                if(s.type !== 'period') html += `<td class="break-bar">${s.id}</td>`;
                else if(spec) html += `<td style="background:#fef3c7">${spec}</td>`;
                else {
                    const m = Data.timetable.find(x => x.d===d && x.p===s.id && x[key]===val);
                    html += `<td>${m ? `<div class="slot-item">${key==='tea'? m.frm : m.sub}</div>` : ''}</td>`;
                }
            });
            html += `</tr>`;
        });
        el.innerHTML = html + "</table></div>";
    },

    drawLoads(el) {
        let html = `<div class="table-wrap"><h3>Teacher Workload Analysis</h3><table><tr><th>Teacher</th><th>Total Periods</th><th>Subjects & Classes</th></tr>`;
        Data.teachers.sort().forEach(t => {
            const matches = Data.timetable.filter(x => x.tea === t);
            const detail = [...new Set(matches.map(m => `${m.sub}(${m.frm})`))].join(', ');
            html += `<tr><td>${t}</td><td><b>${matches.length}</b></td><td>${detail}</td></tr>`;
        });
        el.innerHTML = html + "</table></div>";
    },

    exportPDF() {
        const opt = { margin:5, filename:'Timetable_2026.pdf', jsPDF:{ orientation:'landscape' } };
        html2pdf().set(opt).from(document.getElementById('printArea')).save();
    }
};
</script>
</body>
</html>
