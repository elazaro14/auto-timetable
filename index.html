<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TT-PRO Admin - Tanzania Edition</title>
<style>
:root {
  --primary:#0f172a; --secondary:#1e293b; --accent:#22c55e;
  --bg:#f1f5f9; --danger:#ef4444; --info: #0ea5e9;
}

body { margin:0; font-family:'Segoe UI', Tahoma, sans-serif; display:flex; height: 100vh; overflow:hidden; }

.sidebar { width:240px; background:var(--secondary); color:white; padding:15px; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
.sidebar h3 { text-align: center; border-bottom: 1px solid #334155; padding-bottom: 10px; color: var(--accent); letter-spacing: 1px; }
.sidebar button {
  width:100%; margin:5px 0; padding:12px;
  background:#334155; color:white; border:none; border-radius:6px;
  cursor:pointer; text-align: left; transition: 0.3s; font-size: 13px;
}
.sidebar button:hover { background: #475569; padding-left: 18px; }

.main { flex:1; padding:20px; background:var(--bg); overflow-y: auto; }

#expiryBanner { 
    display: none; background: #fef08a; color: #854d0e; 
    padding: 12px; margin-bottom: 15px; border-radius: 8px; 
    text-align: center; font-weight: bold; border: 1px solid #facc15; 
}

.card { background:white; padding:20px; border-radius:10px; margin-bottom:15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
table { width:100%; border-collapse:collapse; margin-top: 10px; background: white; }
th, td { border:1px solid #e2e8f0; padding:10px; text-align:center; font-size: 13px; }
th { background: #f8fafc; color: var(--primary); }

.slot { padding:6px; border-radius:4px; cursor:grab; font-weight: 500; font-size: 11px; line-height: 1.2; }
.overload { color: var(--danger); font-weight: bold; background: #fee2e2; }

@media print { .sidebar, .no-print, #expiryBanner { display: none !important; } .main { padding: 0; } .card { box-shadow: none; border: 1px solid #000; } }
</style>
</head>

<body>

<div class="sidebar no-print">
<h3>TT-PRO ADMIN</h3>
<button onclick="renderDashboard()">📊 Dashboard</button>
<button onclick="renderRegistry()">🗂 Data Registry</button>
<button onclick="generate()">⚙️ Generate Timetable</button>
<button onclick="renderWorkload()">⚖️ Teacher Loads</button>

<hr style="width:100%; opacity:0.1; margin: 20px 0;">

<div style="margin-top: auto;">
    <p style="font-size: 11px; color: #94a3b8; margin-bottom: 8px;">Official Template (.csv):</p>
    <input type="file" id="csvIn" style="display:none" accept=".csv" onchange="handleCSV(event)">
    <button onclick="document.getElementById('csvIn').click()" style="background:var(--info)">📥 Upload CSV</button>
    <button onclick="saveData()" style="background:var(--primary); margin-top: 5px;">💾 Backup JSON</button>
    <button onclick="window.print()" style="background:#4b5563; margin-top: 5px;">🖨️ Print to PDF</button>
</div>
</div>

<div class="main">
    <div id="expiryBanner"></div>
    <div id="app"></div>
</div>

<script>
const EXPIRY_DATE = "2026-12-31";
const CONTACT = "0763418732";

let DATA=[];
let REGISTRY=[];
let TEACHERS=[];
let CLASSES=[];

const DAYS=["MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY"];
const PERIODS=["P1","P2","P3","P4","P5","P6","P7","P8","P9"];

let dragIndex=null;

/* SECURITY ENGINE */
(function() {
    const today = new Date();
    const expiry = new Date(EXPIRY_DATE);
    const diffDays = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));
    window.onload = () => {
        if (diffDays <= 0) {
            document.body.innerHTML = `<div style="height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;background:var(--primary);color:white;"><h1>SUBSCRIPTION EXPIRED</h1><p>Please contact support: ${CONTACT}</p></div>`;
        } else if (diffDays <= 7) {
            const b = document.getElementById('expiryBanner');
            b.style.display = 'block';
            b.innerHTML = `⚠️ SYSTEM WARNING: ${diffDays} days remaining until license expiry. Contact ${CONTACT}.`;
        }
        renderDashboard();
    };
})();

/* TANZANIA TEMPLATE CSV HANDLER */
function handleCSV(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim() !== "");
        const rawMap = {};
        
        // Skip header row
        lines.slice(1).forEach(line => {
            const cols = line.split(',').map(c => c.trim().toUpperCase());
            if (cols.length >= 4) {
                const sub = cols[0]; // First column is Subject
                const tea = cols[1]; // Second is Teacher
                const rm = cols[2] || "N/A";  // Third is Room
                const frm = cols[3]; // Fourth is Form
                
                const key = `${sub}|${tea}|${frm}|${rm}`;
                rawMap[key] = (rawMap[key] || 0) + 1;
            }
        });

        REGISTRY = [];
        for (let key in rawMap) {
            const [sub, tea, frm, rm] = key.split('|');
            REGISTRY.push({ sub, tea, frm, rm, pwk: rawMap[key] });
            if(!TEACHERS.includes(tea)) TEACHERS.push(tea);
            if(!CLASSES.includes(frm)) CLASSES.push(frm);
        }
        alert(`Imported ${REGISTRY.length} distinct allocations from CSV.`);
        renderRegistry();
    };
    reader.readAsText(e.target.files[0]);
}

function renderDashboard(){
    document.getElementById("app").innerHTML=`
    <div class="card">
        <h2>System Dashboard</h2>
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top:20px;">
            <div style="background:#f8fafc; border-left: 5px solid var(--info); padding: 20px; border-radius: 8px;">
                <span style="font-size: 12px; color: #64748b;">TOTAL TEACHERS</span>
                <div style="font-size: 24px; font-weight: bold;">${TEACHERS.length}</div>
            </div>
            <div style="background:#f8fafc; border-left: 5px solid var(--accent); padding: 20px; border-radius: 8px;">
                <span style="font-size: 12px; color: #64748b;">TOTAL CLASSES</span>
                <div style="font-size: 24px; font-weight: bold;">${CLASSES.length}</div>
            </div>
            <div style="background:#f8fafc; border-left: 5px solid var(--primary); padding: 20px; border-radius: 8px;">
                <span style="font-size: 12px; color: #64748b;">REGISTRY ITEMS</span>
                <div style="font-size: 24px; font-weight: bold;">${REGISTRY.length}</div>
            </div>
        </div>
    </div>`;
}

function renderRegistry(){
    let h=`<div class="card"><h2>Data Registry (Extracted from CSV)</h2><table>
    <tr><th>Subject</th><th>Teacher</th><th>Class</th><th>Room</th><th>Periods/Wk</th></tr>`;
    REGISTRY.forEach(r => {
        h+=`<tr><td>${r.sub}</td><td>${r.tea}</td><td>${r.frm}</td><td>${r.rm}</td><td>${r.pwk}</td></tr>`;
    });
    document.getElementById("app").innerHTML=h+"</table></div>";
}

/* GENERATE ENGINE: DOUBLE PERIOD PRIORITY */
function generate(){
    DATA=[];
    // Sort by periods per week to place heavy subjects first
    let sortedReg = [...REGISTRY].sort((a,b) => b.pwk - a.pwk);

    sortedReg.forEach(r => {
        let left = r.pwk;
        
        // PHASE 1: Attempt one Double Period per day until satisfied
        DAYS.forEach(day => {
            if(left < 2) return;
            for(let i=0; i < PERIODS.length - 1; i++) {
                let p1 = PERIODS[i], p2 = PERIODS[i+1];
                if(!isBusy(day, p1, r) && !isBusy(day, p2, r)) {
                    DATA.push({...r, d: day, p: p1}, {...r, d: day, p: p2});
                    left -= 2;
                    break; // Move to next day (Priority: Only one double per subject per day)
                }
            }
        });

        // PHASE 2: Fill remaining periods as Singles
        DAYS.forEach(day => {
            if(left <= 0) return;
            PERIODS.forEach(p => {
                if(left > 0 && !isBusy(day, p, r)) {
                    DATA.push({...r, d: day, p});
                    left--;
                }
            });
        });
    });
    renderTable();
}

function isBusy(d,p,r){
    return DATA.some(x=>x.d===d && x.p===p && (x.tea===r.tea || x.frm===r.frm));
}

function renderTable(){
    let h=`<h2 class="no-print">Generated School Timetable</h2>`;
    CLASSES.sort().forEach(f => {
        h += `<div class="card page-break"><h3>FORM: ${f}</h3><table><tr><th>Day</th>`;
        PERIODS.forEach(p => h += `<th>${p}</th>`);
        h += `</tr>`;
        DAYS.forEach(d => {
            h += `<tr><td><b>${d}</b></td>`;
            PERIODS.forEach(p => {
                let m = DATA.find(x => x.d===d && x.p===p && x.frm===f);
                h += `<td ondrop="drop(event,'${d}','${p}','${f}')" ondragover="event.preventDefault()">`;
                if(m) h += `<div class="slot" draggable="true" ondragstart="drag(${DATA.indexOf(m)})" style="background:#ecfdf5; border: 1px solid var(--accent); color:#065f46"><b>${m.sub}</b><br>${m.tea}</div>`;
                h += `</td>`;
            });
            h += `</tr>`;
        });
        h += `</table></div>`;
    });
    document.getElementById("app").innerHTML = h;
}

function renderWorkload() {
    let loads = {};
    DATA.forEach(x => loads[x.tea] = (loads[x.tea] || 0) + 1);
    let h = `<div class="card"><h2>Teacher Workload Analysis</h2><table><tr><th>Teacher Name</th><th>Total Weekly Periods</th><th>Status</th></tr>`;
    Object.keys(loads).sort().forEach(t => {
        const count = loads[t];
        const status = count > 30 ? '<span style="color:red">HIGH</span>' : '<span style="color:green">NORMAL</span>';
        h += `<tr class="${count > 30 ? 'overload' : ''}"><td>${t}</td><td>${count} / 45</td><td>${status}</td></tr>`;
    });
    document.getElementById("app").innerHTML = h + `</table></div>`;
}

/* INTERACTIVE DRAG & DROP */
function drag(i){ dragIndex=i; }
function drop(e,d,p,f){
    let item = DATA[dragIndex];
    if (DATA.some(x => x.d===d && x.p===p && (x.tea===item.tea || x.frm===f))) {
        alert("Placement Error: Teacher or Class is already busy at this time.");
        return;
    }
    item.d=d; item.p=p; item.frm=f;
    renderTable();
}

function saveData(){
    const blob = new Blob([JSON.stringify({REGISTRY, DATA, TEACHERS, CLASSES})], {type: "application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `Timetable_Backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
}
</script>
</body>
</html>
