<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TT-PRO Admin System</title>
<style>
:root {
  --primary:#0f172a;
  --secondary:#1e293b;
  --accent:#22c55e;
  --bg:#f1f5f9;
  --danger:#ef4444;
}

body { margin:0; font-family:'Segoe UI', Tahoma, sans-serif; display:flex; height: 100vh; }

.sidebar { width:220px; background:var(--secondary); color:white; padding:15px; display: flex; flex-direction: column; }
.sidebar h3 { text-align: center; border-bottom: 1px solid #334155; padding-bottom: 10px; color: var(--accent); }
.sidebar button {
  width:100%; margin:5px 0; padding:10px;
  background:#334155; color:white; border:none; border-radius:6px;
  cursor:pointer; text-align: left; transition: 0.3s;
}
.sidebar button:hover { background: #475569; }

.main { flex:1; padding:20px; background:var(--bg); overflow-y: auto; }

#expiryBanner { 
    display: none; background: #fef08a; color: #854d0e; 
    padding: 10px; margin-bottom: 15px; border-radius: 8px; 
    text-align: center; font-weight: bold; border: 1px solid #facc15; 
}

.card { background:white; padding:20px; border-radius:10px; margin-bottom:15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
table { width:100%; border-collapse:collapse; margin-top: 10px; }
th, td { border:1px solid #e2e8f0; padding:10px; text-align:center; font-size: 13px; }
th { background: #f8fafc; }

.slot { padding:8px; border-radius:6px; cursor:grab; font-weight: 500; font-size: 11px; }
.overload { color: var(--danger); font-weight: bold; }
.btn-add { background: var(--accent); color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 10px; }

@media print { .sidebar, .btn-add, .no-print { display: none !important; } .main { padding: 0; } }
</style>
</head>

<body>

<div class="sidebar">
<h3>TT-PRO ADMIN</h3>
<button onclick="renderDashboard()">📊 Dashboard</button>
<button onclick="renderRegistry()">🗂 Registry</button>
<button onclick="generate()">⚙️ Generate Timetable</button>
<button onclick="renderWorkload()">⚖️ Check Workload</button>

<hr style="width:100%; opacity:0.1">

<div style="margin-top: auto;">
    <p style="font-size: 11px; color: #94a3b8; margin-bottom: 5px;">Import Allocation:</p>
    <input type="file" id="csvIn" style="display:none" accept=".csv" onchange="handleCSV(event)">
    <button onclick="document.getElementById('csvIn').click()" style="background:#0ea5e9">📥 Upload CSV</button>
    <button onclick="saveData()" style="background:var(--primary)">💾 Save JSON</button>
</div>
</div>

<div class="main">
    <div id="expiryBanner"></div>
    <div id="app"></div>
</div>

<script>
const EXPIRY_DATE = "2026-12-31";
const CONTACT = "0763418732";

let DATA=[];
let REGISTRY=[];
let TEACHERS=[];
let CLASSES=[];

const DAYS=["MON","TUE","WED","THU","FRI"];
const PERIODS=["P1","P2","P3","P4","P5","P6","P7","P8"];

let dragIndex=null;

/* EXPIRY CHECK */
(function() {
    const today = new Date();
    const expiry = new Date(EXPIRY_DATE);
    const diffDays = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));
    window.onload = () => {
        if (diffDays <= 0) {
            document.body.innerHTML = `<div style="height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;background:var(--primary);color:white;"><h1>EXPIRED</h1><p>Contact: ${CONTACT}</p></div>`;
        } else if (diffDays <= 5) {
            const b = document.getElementById('expiryBanner');
            b.style.display = 'block';
            b.innerHTML = `⚠️ Subscription ends in ${diffDays} days.`;
        }
        renderDashboard();
    };
})();

/* CSV HANDLER */
function handleCSV(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const lines = ev.target.result.split(/\r?\n/).filter(line => line.trim() !== "");
        REGISTRY = [];
        TEACHERS = [];
        CLASSES = [];

        // Skip header if necessary, then parse
        const startIdx = lines[0].toLowerCase().includes("subject") ? 1 : 0;
        
        lines.slice(startIdx).forEach(line => {
            const cols = line.split(',').map(c => c.trim().toUpperCase());
            if (cols.length >= 4) {
                const [sub, tea, frm, pwk] = cols;
                REGISTRY.push({ sub, tea, frm, pwk: parseInt(pwk) || 0 });
                if(!TEACHERS.includes(tea)) TEACHERS.push(tea);
                if(!CLASSES.includes(frm)) CLASSES.push(frm);
            }
        });
        alert(`Successfully imported ${REGISTRY.length} registry entries.`);
        renderRegistry();
    };
    reader.readAsText(e.target.files[0]);
}

function renderDashboard(){
    document.getElementById("app").innerHTML=`
    <div class="card">
        <h2>Dashboard</h2>
        <p>Total Teachers: ${TEACHERS.length}</p>
        <p>Total Classes: ${CLASSES.length}</p>
        <p>Registry Items: ${REGISTRY.length}</p>
    </div>`;
}

function renderRegistry(){
    let h=`<div class="card"><h2>Allocation Registry</h2><table><tr><th>Sub</th><th>Teacher</th><th>Class</th><th>P/Wk</th></tr>`;
    REGISTRY.forEach(r => {
        h+=`<tr><td>${r.sub}</td><td>${r.tea}</td><td>${r.frm}</td><td>${r.pwk}</td></tr>`;
    });
    document.getElementById("app").innerHTML=h+"</table></div>";
}

/* GENERATE WITH DOUBLE PERIOD RULE */
function generate(){
    DATA=[];
    let sortedReg = [...REGISTRY].sort((a,b) => b.pwk - a.pwk);

    sortedReg.forEach(r => {
        let left = r.pwk;
        DAYS.forEach(d => {
            if(left <= 0) return;
            for(let i=0; i < PERIODS.length; i++) {
                if(left <= 0) break;
                let p1 = PERIODS[i], p2 = PERIODS[i+1];

                // Check for double period space once per day
                if(left >= 2 && p2 && !isBusy(d, p1, r) && !isBusy(d, p2, r)) {
                    DATA.push({...r, d, p: p1}, {...r, d, p: p2});
                    left -= 2; i++; continue; 
                }
                if(!isBusy(d, p1, r)) {
                    DATA.push({...r, d, p: p1});
                    left--;
                }
            }
        });
    });
    renderTable();
}

function isBusy(d,p,r){
    return DATA.some(x=>x.d===d && x.p===p && (x.tea===r.tea || x.frm===r.frm));
}

function renderTable(){
    let h=`<h2>Timetables</h2>`;
    CLASSES.sort().forEach(f => {
        h += `<div class="card"><h3>${f}</h3><table><tr><th>Day</th>`;
        PERIODS.forEach(p => h += `<th>${p}</th>`);
        h += `</tr>`;
        DAYS.forEach(d => {
            h += `<tr><td><b>${d}</b></td>`;
            PERIODS.forEach(p => {
                let m = DATA.find(x => x.d===d && x.p===p && x.frm===f);
                h += `<td>${m ? `<div class="slot" style="background:#dcfce7">${m.sub}<br><small>${m.tea}</small></div>` : ''}</td>`;
            });
            h += `</tr>`;
        });
        h += `</table></div>`;
    });
    document.getElementById("app").innerHTML = h;
}

function renderWorkload() {
    let loads = {};
    DATA.forEach(x => loads[x.tea] = (loads[x.tea] || 0) + 1);
    let h = `<div class="card"><h2>Workload</h2><table><tr><th>Teacher</th><th>Periods</th></tr>`;
    Object.keys(loads).sort().forEach(t => {
        h += `<tr><td>${t}</td><td>${loads[t]}</td></tr>`;
    });
    document.getElementById("app").innerHTML = h + `</table></div>`;
}

function saveData(){
    const blob = new Blob([JSON.stringify({REGISTRY, DATA})], {type: "application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "SchoolBackup.json";
    a.click();
}
</script>
</body>
</html>
