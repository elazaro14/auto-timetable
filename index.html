<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TT-Pro Enterprise - Official Tanzania Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #1a237e; --secondary: #0d47a1; --accent: #00c853; --bg: #f4f7f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 300px; background: var(--primary); color: white; display: flex; flex-direction: column; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.2); z-index: 100; overflow-y: auto; }
        .sidebar h2 { font-size: 20px; margin-bottom: 20px; border-bottom: 2px solid var(--accent); padding-bottom: 10px; text-align: center; }
        
        /* Controls */
        .config-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.2); }
        .config-box h4 { margin: 0 0 10px 0; font-size: 12px; text-transform: uppercase; color: var(--accent); }
        .input-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .input-row input[type="number"], .input-row input[type="time"] { width: 80px; padding: 4px; border-radius: 4px; border: none; }
        
        /* Main View */
        .main-content { flex: 1; overflow-y: auto; padding: 25px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; }
        
        /* Registry */
        .registry-header { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr 0.8fr 40px; gap: 10px; font-weight: bold; font-size: 11px; padding: 10px; background: #e3f2fd; border-radius: 6px; color: var(--primary); }
        .registry-row { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr 0.8fr 40px; gap: 10px; margin-top: 8px; }
        .registry-row input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box; }

        /* Timetable UI */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; table-layout: fixed; border: 2px solid #000; }
        th, td { border: 1px solid #000; padding: 5px; text-align: center; font-size: 10px; height: 45px; }
        th { background: #f8f9fa; font-weight: 900; }
        .time-label { display: block; font-size: 8px; color: #d32f2f; margin-top: 2px; }
        .break-cell { background: #eeeeee !important; font-weight: bold; writing-mode: vertical-rl; text-orientation: mixed; width: 30px !important; }

        .btn { padding: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 5px; }
        .btn-gen { background: var(--accent); color: white; font-size: 14px; }
        .btn-add { background: var(--secondary); color: white; width: auto; padding: 8px 20px; }

        @media print { .no-print { display: none !important; } body { background: white; } .day-section { page-break-after: always; } }
    </style>
</head>
<body>

<div class="sidebar no-print">
    <h2>TT-PRO SYSTEM</h2>
    
    <div class="config-box">
        <h4>General Setup</h4>
        <div class="input-row"><span>Start Time:</span> <input type="time" id="startTime" value="08:00"></div>
        <div class="input-row"><span>Period (min):</span> <input type="number" id="pDur" value="40"></div>
        <div class="input-row"><span>Total Per.:</span> <input type="number" id="pTotal" value="9"></div>
    </div>

    <div class="config-box">
        <h4>Break Session</h4>
        <div class="input-row"><span>Enable Break?</span> <input type="checkbox" id="breakOn" checked></div>
        <div class="input-row"><span>After Period:</span> <input type="number" id="breakAfter" value="3"></div>
        <div class="input-row"><span>Length (min):</span> <input type="number" id="breakLen" value="20"></div>
    </div>

    <div class="config-box">
        <h4>Lunch Session</h4>
        <div class="input-row"><span>Enable Lunch?</span> <input type="checkbox" id="lunchOn" checked></div>
        <div class="input-row"><span>After Period:</span> <input type="number" id="lunchAfter" value="6"></div>
        <div class="input-row"><span>Length (min):</span> <input type="number" id="lunchLen" value="45"></div>
    </div>

    <button class="btn btn-gen" onclick="generate()">GENERATE TIMETABLE</button>
    <button class="btn" onclick="window.print()" style="background:#fff; color:#333; margin-top:10px;">PRINT TO PDF</button>
</div>

<div class="main-content">
    <div class="card no-print">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="margin:0">Subject Registry</h3>
            <div>
                <label style="font-size:12px; font-weight:bold;">Import CSV: </label>
                <input type="file" id="csvFile" accept=".csv" onchange="handleCSV(event)">
                <button class="btn btn-add" onclick="addRow()">+ Manual Row</button>
            </div>
        </div>
        <div class="registry-header">
            <div>SUBJECT</div><div>TEACHER</div><div>ROOM</div><div>FORM</div><div>P/WK</div><div></div>
        </div>
        <div id="regItems"></div>
    </div>

    <div id="timetableArea"></div>
</div>

<script>
let DATA = [], SLOTS = [];
const DAYS = ["MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY"];

function addRow(s="", t="", r="", f="", p=5) {
    const div = document.createElement('div');
    div.className = 'registry-row';
    div.innerHTML = `
        <input type="text" class="r-sub" value="${s}" placeholder="Sub">
        <input type="text" class="r-tea" value="${t}" placeholder="Tea">
        <input type="text" class="r-room" value="${r}" placeholder="Room">
        <input type="text" class="r-frm" value="${f}" placeholder="Form">
        <input type="number" class="r-pwk" value="${p}">
        <button onclick="this.parentElement.remove()" style="color:red; background:none; border:none; cursor:pointer;">✕</button>
    `;
    document.getElementById('regItems').appendChild(div);
}

function handleCSV(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const text = ev.target.result;
        const rows = text.split('\n').slice(1); // Skip header
        const counts = {};
        
        rows.forEach(line => {
            if(!line.trim()) return;
            const parts = line.split(',').map(p => p.trim());
            // Format: Subject, Teacher, Room, Form
            const key = `${parts[0]}|${parts[1]}|${parts[2]}|${parts[3]}`;
            counts[key] = (counts[key] || 0) + 1;
        });

        document.getElementById('regItems').innerHTML = "";
        for(let key in counts) {
            const [s,t,r,f] = key.split('|');
            addRow(s, t, r, f, counts[key]);
        }
    };
    reader.readAsText(e.target.files[0]);
}

function buildSlots() {
    SLOTS = [];
    let cur = new Date("2026-01-01T" + document.getElementById('startTime').value);
    const dur = parseInt(document.getElementById('pDur').value);
    const total = parseInt(document.getElementById('pTotal').value);
    
    const bOn = document.getElementById('breakOn').checked;
    const bAft = parseInt(document.getElementById('breakAfter').value);
    const bLen = parseInt(document.getElementById('breakLen').value);

    const lOn = document.getElementById('lunchOn').checked;
    const lAft = parseInt(document.getElementById('lunchAfter').value);
    const lLen = parseInt(document.getElementById('lunchLen').value);

    for(let i=1; i<=total; i++) {
        let sTime = cur.toTimeString().slice(0,5);
        cur.setMinutes(cur.getMinutes() + dur);
        let eTime = cur.toTimeString().slice(0,5);
        SLOTS.push({ id: 'P'+i, time: `${sTime}-${eTime}`, isB: false });

        if(bOn && i === bAft) {
            let bs = cur.toTimeString().slice(0,5);
            cur.setMinutes(cur.getMinutes() + bLen);
            SLOTS.push({ id: 'BREAK', time: `${bs}-${cur.toTimeString().slice(0,5)}`, isB: true });
        }
        if(lOn && i === lAft) {
            let ls = cur.toTimeString().slice(0,5);
            cur.setMinutes(cur.getMinutes() + lLen);
            SLOTS.push({ id: 'LUNCH', time: `${ls}-${cur.toTimeString().slice(0,5)}`, isB: true });
        }
    }
}

function generate() {
    const rows = document.querySelectorAll('.registry-row');
    let registry = [];
    rows.forEach(r => {
        const sub = r.querySelector('.r-sub').value.toUpperCase();
        const tea = r.querySelector('.r-tea').value;
        const room = r.querySelector('.r-room').value;
        const frm = r.querySelector('.r-frm').value.toUpperCase();
        const pwk = parseInt(r.querySelector('.r-pwk').value);
        if(sub && tea && frm) registry.push({sub, tea, room, frm, pwk});
    });

    buildSlots();
    DATA = [];

    registry.forEach(item => {
        let left = item.pwk;
        let shuffledDays = [...DAYS].sort(() => Math.random() - 0.5);
        
        // Priority Double Periods
        let doubles = Math.min(Math.floor(left/2), 5);
        let singles = Math.min(left - (doubles*2), 5 - doubles);
        let plan = [];
        for(let i=0; i<doubles; i++) plan.push('double');
        for(let i=0; i<singles; i++) plan.push('single');

        plan.forEach(type => {
            let placed = false;
            for(let d of shuffledDays) {
                // Rule: Once a day per subject
                if (DATA.find(x => x.d === d && x.sub === item.sub && x.frm === item.frm)) continue;

                if(type === 'double') {
                    for(let i=0; i < SLOTS.length-1; i++) {
                        let t1 = SLOTS[i], t2 = SLOTS[i+1];
                        if(t1.isB || t2.isB) continue;
                        if(!DATA.find(x => x.d===d && x.p===t1.id && (x.tea===item.tea || x.frm===item.frm)) &&
                           !DATA.find(x => x.d===d && x.p===t2.id && (x.tea===item.tea || x.frm===item.frm))) {
                            DATA.push({...item, d, p: t1.id}, {...item, d, p: t2.id});
                            placed = true; break;
                        }
                    }
                } else {
                    for(let t of SLOTS) {
                        if(t.isB) continue;
                        if(!DATA.find(x => x.d===d && x.p===t.id && (x.tea===item.tea || x.frm===item.frm))) {
                            DATA.push({...item, d, p: t.id});
                            placed = true; break;
                        }
                    }
                }
                if(placed) break;
            }
        });
    });

    render();
}

function render() {
    const frms = [...new Set(DATA.map(x => x.frm))].sort();
    let h = `<h2 style="text-align:center">OFFICIAL MASTER TIMETABLE 2026</h2>`;

    DAYS.forEach(day => {
        h += `<div class="day-section"><div class="day-title" style="background:#1a237e; color:white; padding:5px; text-align:center; font-weight:bold; border:2px solid #000; border-bottom:none; margin-top:20px;">${day}</div><table><tr><th width="70">FORM</th>`;
        SLOTS.forEach(s => h += `<th>${s.id}<span class="time-label">${s.time}</span></th>`);
        h += `</tr>`;
        
        frms.forEach(f => {
            h += `<tr><td><b>${f}</b></td>`;
            SLOTS.forEach(s => {
                if(s.isB) h += `<td class="break-cell">${s.id}</td>`;
                else {
                    const m = DATA.find(x => x.d === day && x.p === s.id && x.frm === f);
                    h += `<td>${m ? `<b>${m.sub}</b><br><small>${m.tea}</small>` : ''}</td>`;
                }
            });
            h += `</tr>`;
        });
        h += `</table></div>`;
    });
    document.getElementById('timetableArea').innerHTML = h;
}

// Initial entry
addRow("MATHEMATICS", "SEURI", "", "F1A", 5);
</script>
</body>
</html>
