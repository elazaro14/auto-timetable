<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TT-PRO Enterprise - Stable Build</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root {
  --primary:#0f172a; --secondary:#1e293b; --accent:#22c55e;
  --sidebar-gradient: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
  --bg:#f8fafc; --border:#e2e8f0; --text:#334155; --danger:#ef4444; --warning:#f59e0b; --pdf:#e11d48;
}
body { margin:0; font-family:'Inter', system-ui, sans-serif; display:flex; height: 100vh; background:var(--bg); overflow:hidden; }
#lockScreen { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.98); color:white; z-index:9999; flex-direction:column; align-items:center; justify-content:center; text-align:center; }

.sidebar { width:340px; background: var(--sidebar-gradient); color:white; padding:20px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; z-index:10; border-right: 1px solid #334155; }
.sidebar h2 { color: var(--accent); font-size: 1.1rem; text-align: center; border-bottom: 1px solid #334155; padding-bottom: 15px; margin:0; }

.setting-card { background: rgba(30, 41, 59, 0.5); padding: 12px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 5px; }
.setting-card label { display: block; font-size: 10px; text-transform: uppercase; color: #94a3b8; margin-bottom: 4px; font-weight: 700; }
.setting-card input, .setting-card select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 13px; box-sizing: border-box; margin-bottom: 5px; }

.btn { width: 100%; padding: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; font-size: 12px; transition: 0.2s; display: flex; align-items: center; gap: 8px; justify-content: center; margin-top: 5px; }
.btn-gen { background: var(--accent); color: #064e3b; }
.btn-pdf { background: var(--pdf); color: white; }
.btn-sec { background: #475569; color: white; }

.main { flex:1; display: flex; flex-direction: column; overflow: hidden; }
.top-bar { background: white; padding: 10px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.tab-group { display: flex; gap: 5px; }
.tab-group button { padding: 8px 15px; border: 1px solid var(--border); background: white; cursor: pointer; font-size: 12px; border-radius: 4px; font-weight: 600; }
.tab-group button.active { background: var(--primary); color: white; }

.content { flex:1; padding: 20px; overflow-y: auto; }
#printableArea { background: white; padding: 10px; }
.table-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); page-break-after: always; }

table { width: 100%; border-collapse: collapse; border: 2px solid #000; table-layout: fixed; }
th, td { border: 1px solid #000; padding: 4px; text-align: center; font-size: 9px; height: 45px; }
th { background: #f1f5f9; }
.slot { padding: 2px; border-radius: 4px; font-weight: 700; background: #dcfce7; border: 1px solid #22c55e; line-height: 1.1; }
.break-cell { background: #cbd5e1; font-weight: bold; width: 30px; writing-mode: vertical-rl; text-orientation: mixed; font-size: 9px; }
.time-hdr { display: block; font-size: 7px; color: #64748b; font-weight: 500; border-top: 1px solid #cbd5e1; }

@media print { .no-print { display: none !important; } body { overflow: visible; } .main, .content { overflow: visible; display: block; } }
</style>
</head>
<body>

<div id="lockScreen"><h1>LICENSE EXPIRED</h1></div>

<div class="sidebar no-print">
    <h2>TT-PRO COMMAND</h2>
    <div class="setting-card">
        <label>School Name</label>
        <input type="text" id="schName" value="TANZANIA SECONDARY SCHOOL">
        <label>Academic Year</label>
        <input type="text" id="acadYear" value="2026">
    </div>
    
    <div class="setting-card">
        <label>Constraints</label>
        <div style="font-size: 10px; color: var(--accent);">Morning (Until 10:40): Double Only</div>
    </div>

    <div class="setting-card">
        <label>Special Blocks</label>
        <input type="text" id="relPeriods" value="8,9" placeholder="Religion P#">
        <input type="text" id="debPeriods" value="8,9" placeholder="Debate P#">
    </div>

    <div class="setting-card">
        <label>Timings</label>
        <input type="time" id="startTime" value="08:00">
        <label>Period Duration</label>
        <input type="number" id="dur" value="40">
        <label>Total Periods</label>
        <select id="totalPeriods"><option value="9" selected>9 Periods</option><option value="10">10 Periods</option></select>
    </div>

    <button class="btn btn-gen" onclick="generate()">⚡ GENERATE & RE-SHUFFLE</button>
    <button class="btn btn-pdf" onclick="exportPDF()">📄 PRINT / SAVE PDF</button>
    <button class="btn btn-sec" onclick="document.getElementById('csvIn').click()">📥 IMPORT CSV</button>
    <input type="file" id="csvIn" style="display:none" accept=".csv" onchange="handleCSV(event)">
</div>

<div class="main">
    <div class="top-bar no-print">
        <div class="tab-group">
            <button id="tab-GENERAL" class="active" onclick="setView('GENERAL')">Master</button>
            <button id="tab-STREAM" onclick="setView('STREAM')">Stream</button>
            <button id="tab-TEACHER" onclick="setView('TEACHER')">Teacher</button>
        </div>
        <select id="viewFilter" onchange="renderActiveView()" style="display:none; padding:5px;"></select>
    </div>

    <div class="content">
        <div id="printableArea">
            <div id="header" style="text-align:center;">
                <h1 id="headerTitle" style="margin:0;">TANZANIA SECONDARY SCHOOL</h1>
                <h4 id="headerYear" style="margin:5px; color:#64748b;">ACADEMIC YEAR 2026</h4>
            </div>
            <div id="app"></div>
        </div>
    </div>
</div>

<script>
let DATA = [], REGISTRY = [], CLASSES = [], TEACHERS = [], SLOTS = [], currentView = 'GENERAL';
const DAYS = ["MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY"];

function buildSlots() {
    SLOTS = [];
    let cur = new Date("2026-01-01T" + document.getElementById('startTime').value);
    let dur = parseInt(document.getElementById('dur').value);
    let totalP = parseInt(document.getElementById('totalPeriods').value);

    for(let i=1; i<=totalP; i++) {
        let sTime = cur.toTimeString().slice(0,5);
        cur.setMinutes(cur.getMinutes() + dur);
        SLOTS.push({ id: 'P'+i, time: `${sTime}-${cur.toTimeString().slice(0,5)}`, type: 'period', index: i });
        if(i === 2) cur.setMinutes(cur.getMinutes() + 20); // Break
        if(i === 4) cur.setMinutes(cur.getMinutes() + 45); // Lunch
    }
}

function generate() {
    if(REGISTRY.length === 0) return alert("Please import a CSV first!");
    DATA = []; buildSlots();
    let tempRegistry = JSON.parse(JSON.stringify(REGISTRY));

    // Phase 1: Morning (Strict Double Only)
    CLASSES.forEach(f => {
        DAYS.forEach(d => {
            let morning = SLOTS.filter(s => s.type==='period' && s.time.split('-')[0] < "10:40");
            for(let i=0; i<morning.length; i+=2) {
                let s1 = morning[i], s2 = morning[i+1];
                if(!s2) break;
                let sub = tempRegistry.find(r => r.frm===f && r.pwk>=2 && !DATA.some(x => x.d===d && x.p===s1.id && x.tea===r.tea));
                if(sub) { DATA.push({...sub, d, p:s1.id},{...sub, d, p:s2.id}); sub.pwk-=2; }
            }
        });
    });

    // Phase 2: Rest of day
    tempRegistry.sort((a,b)=>b.pwk-a.pwk).forEach(r => {
        DAYS.sort(()=>Math.random()-0.5).forEach(d => {
            if(r.pwk<=0 || DATA.some(x=>x.d===d && x.frm===r.frm && x.sub===r.sub)) return;
            let afternoon = SLOTS.filter(s => s.type==='period' && s.time.split('-')[0] >= "10:40");
            let s = afternoon.find(s => !DATA.some(x=>x.d===d && x.p===s.id && (x.tea===r.tea || x.frm===r.frm)));
            if(s) { DATA.push({...r, d, p:s.id}); r.pwk--; }
        });
    });

    renderActiveView();
}

function handleCSV(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const lines = ev.target.result.toUpperCase().split('\n').filter(l => l.trim() !== "");
        REGISTRY = []; CLASSES = []; TEACHERS = [];
        lines.slice(1).forEach(line => {
            const [sub, tea, pwk, frm] = line.split(',').map(c => c.trim());
            if(sub && tea) {
                REGISTRY.push({ sub, tea, pwk: parseInt(pwk), frm });
                if(!CLASSES.includes(frm)) CLASSES.push(frm);
                if(!TEACHERS.includes(tea)) TEACHERS.push(tea);
            }
        });
        alert("Data Loaded. Click Generate.");
    };
    reader.readAsText(e.target.files[0]);
}

function setView(v) {
    currentView = v;
    document.querySelectorAll('.tab-group button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-'+v).classList.add('active');
    let fil = document.getElementById('viewFilter');
    fil.style.display = (v==='GENERAL') ? 'none' : 'inline-block';
    if(v==='STREAM') { fil.innerHTML = ''; CLASSES.sort().forEach(c => fil.innerHTML += `<option value="${c}">${c}</option>`); } 
    else if(v==='TEACHER') { fil.innerHTML = ''; TEACHERS.sort().forEach(t => fil.innerHTML += `<option value="${t}">${t}</option>`); }
    renderActiveView();
}

function renderActiveView() {
    document.getElementById('headerTitle').innerText = document.getElementById('schName').value;
    const app = document.getElementById('app'); buildSlots();
    let h = "";

    if(currentView==='GENERAL') {
        DAYS.forEach(day => {
            h += `<div class="table-card"><h3>${day}</h3><table><tr><th>Class</th>`;
            SLOTS.forEach(s => h += `<th>${s.id}<span class="time-hdr">${s.time}</span></th>`);
            h += `</tr>`;
            CLASSES.sort().forEach(f => {
                h += `<tr><td><b>${f}</b></td>`;
                SLOTS.forEach(s => {
                    let m = DATA.find(x => x.d===day && x.p===s.id && x.frm===f);
                    h += `<td>${m ? `<div class="slot">${m.sub}<br>${m.tea}</div>` : ''}</td>`;
                });
                h += `</tr>`;
            });
            h += `</table></div>`;
        });
    } else {
        const key = currentView==='STREAM' ? 'frm' : 'tea';
        const val = document.getElementById('viewFilter').value;
        h = `<div class="table-card"><h3>Timetable: ${val}</h3><table><tr><th>Day</th>`;
        SLOTS.forEach(s => h += `<th>${s.id}<span class="time-hdr">${s.time}</span></th>`);
        h += `</tr>`;
        DAYS.forEach(d => {
            h += `<tr><td><b>${d}</b></td>`;
            SLOTS.forEach(s => {
                let m = DATA.find(x => x.d===d && x.p===s.id && x[key]===val);
                h += `<td>${m ? `<div class="slot">${key==='tea'?m.frm:m.sub}</div>` : ''}</td>`;
            });
            h += `</tr>`;
        });
        h += `</table></div>`;
    }
    app.innerHTML = h;
}

function exportPDF() {
    const element = document.getElementById('printableArea');
    const opt = { margin: 10, filename: 'Timetable.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' } };
    html2pdf().set(opt).from(element).save();
}
</script>
</body>
</html>
