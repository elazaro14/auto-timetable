<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TT-PRO Admin - Tanzania Edition</title>
<style>
:root {
  --primary:#0f172a; --secondary:#1e293b; --accent:#22c55e;
  --bg:#f1f5f9; --danger:#ef4444; --info: #0ea5e9;
}

body { margin:0; font-family:'Segoe UI', Tahoma, sans-serif; display:flex; height: 100vh; overflow:hidden; }

.sidebar { width:260px; background:var(--secondary); color:white; padding:15px; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-y: auto; }
.sidebar h3 { text-align: center; border-bottom: 1px solid #334155; padding-bottom: 10px; color: var(--accent); }

.config-group { background: #1e293b; border: 1px solid #334155; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
.config-group label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
.config-group input, .config-group select { width: 100%; padding: 6px; border-radius: 4px; border: none; margin-bottom: 8px; box-sizing: border-box; }

.sidebar button {
  width:100%; margin:5px 0; padding:10px;
  background:#334155; color:white; border:none; border-radius:6px;
  cursor:pointer; text-align: left; transition: 0.3s; font-size: 13px;
}
.sidebar button:hover { background: #475569; }

.main { flex:1; padding:20px; background:var(--bg); overflow-y: auto; position: relative; }
.card { background:white; padding:20px; border-radius:10px; margin-bottom:15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
table { width:100%; border-collapse:collapse; background: white; border: 2px solid #000; }
th, td { border: 1px solid #000; padding:4px; text-align:center; font-size: 10px; height: 45px; }
th { background: #f1f5f9; color: var(--primary); font-weight: bold; }

.break-cell { background: #cbd5e1; font-weight: bold; writing-mode: vertical-rl; text-orientation: mixed; width: 25px; }
.special-cell { background: #fef3c7; color: #92400e; font-weight: bold; font-size: 9px; }
.slot { padding:4px; border-radius:4px; font-weight: 600; font-size: 10px; cursor: grab; background: #dcfce7; border: 1px solid var(--accent); min-height: 30px; }

@media print { .sidebar, .no-print { display: none !important; } .main { padding: 0; } .card { box-shadow: none; margin: 0; border: none; } .page-break { page-break-after: always; } }
</style>
</head>

<body>

<div class="sidebar no-print">
    <h3>TT-PRO ADMIN</h3>
    
    <div class="config-group">
        <label>Start Time</label>
        <input type="time" id="startTime" value="08:00">
        <label>Religion Day</label>
        <select id="relDay"><option value="FRIDAY">FRIDAY</option><option value="THURSDAY">THURSDAY</option></select>
    </div>

    <button onclick="renderDashboard()">📊 Dashboard</button>
    <button onclick="renderRegistry()">🗂 Registry</button>
    <button onclick="generate()">⚙️ Generate Timetable</button>
    <button onclick="renderWorkload()">⚖️ Workloads</button>

    <div style="margin-top: auto;">
        <input type="file" id="csvIn" style="display:none" accept=".csv" onchange="handleCSV(event)">
        <button onclick="document.getElementById('csvIn').click()" style="background:var(--info)">📥 Upload CSV</button>
        <button onclick="saveProject()" style="background:var(--accent); color:white;">💾 Save Project</button>
        <input type="file" id="loadProj" style="display:none" accept=".json" onchange="loadProject(event)">
        <button onclick="document.getElementById('loadProj').click()" style="background:#4b5563;">📂 Load Saved File</button>
    </div>
</div>

<div class="main">
    <div id="app"></div>
</div>

<script>
let DATA=[];
let REGISTRY=[];
let TEACHERS=[];
let CLASSES=[];
let SLOTS=[];
let dragIdx = null;

const DAYS=["MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY"];

function buildTimeSlots() {
    SLOTS = [];
    let cur = new Date("2026-01-01T" + document.getElementById('startTime').value);
    for(let i=1; i<=9; i++) {
        let sStr = cur.toTimeString().slice(0,5);
        cur.setMinutes(cur.getMinutes() + 40);
        SLOTS.push({ id: 'P'+i, time: `${sStr}-${cur.toTimeString().slice(0,5)}`, type: 'period' });
        if(i === 4) {
            let bS = cur.toTimeString().slice(0,5);
            cur.setMinutes(cur.getMinutes() + 30);
            SLOTS.push({ id: 'BREAK', time: `${bS}-${cur.toTimeString().slice(0,5)}`, type: 'break' });
        }
    }
}

function handleCSV(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim() !== "");
        const rawMap = {};
        lines.slice(1).forEach(line => {
            const cols = line.split(',').map(c => c.trim().toUpperCase());
            if (cols.length >= 4) {
                const [sub, tea, rm, frm] = [cols[0], cols[1], cols[2], cols[3]];
                const key = `${sub}|${tea}|${frm}|${rm}`;
                rawMap[key] = (rawMap[key] || 0) + 1;
            }
        });
        REGISTRY = []; TEACHERS = []; CLASSES = [];
        for (let key in rawMap) {
            const [sub, tea, frm, rm] = key.split('|');
            REGISTRY.push({ sub, tea, frm, rm, pwk: rawMap[key] });
            if(!TEACHERS.includes(tea)) TEACHERS.push(tea);
            if(!CLASSES.includes(frm)) CLASSES.push(frm);
        }
        renderDashboard();
    };
    reader.readAsText(e.target.files[0]);
}

function generate(){
    // REFRESH: Clear previous data and rebuild
    DATA = [];
    buildTimeSlots();
    
    let sortedReg = [...REGISTRY].sort((a,b) => b.pwk - a.pwk);

    sortedReg.forEach(r => {
        let left = r.pwk;
        DAYS.forEach(day => {
            if(left <= 0) return;

            // Only one entry per day (Double OR Single)
            let placedToday = false;

            // Try Double (2 consecutive periods)
            if(left >= 2) {
                for(let i=0; i < SLOTS.length - 1; i++) {
                    let s1 = SLOTS[i], s2 = SLOTS[i+1];
                    if(s1.type==='period' && s2.type==='period' && !isBusy(day, s1.id, r) && !isBusy(day, s2.id, r) && !isSpecial(day, s1.id) && !isSpecial(day, s2.id)) {
                        DATA.push({...r, d: day, p: s1.id}, {...r, d: day, p: s2.id});
                        left -= 2; placedToday = true; break;
                    }
                }
            }

            // Try Single (only if double wasn't placed)
            if(!placedToday && left >= 1) {
                for(let i=0; i < SLOTS.length; i++) {
                    let s = SLOTS[i];
                    if(s.type==='period' && !isBusy(day, s.id, r) && !isSpecial(day, s.id)) {
                        DATA.push({...r, d: day, p: s.id});
                        left--; break;
                    }
                }
            }
        });
    });
    renderTable();
}

function isBusy(d,p,r){ return DATA.some(x=>x.d===d && x.p===p && (x.tea===r.tea || x.frm===r.frm)); }

function isSpecial(day, p) {
    const relDay = document.getElementById('relDay').value;
    const pNum = parseInt(p.replace('P',''));
    if(day === relDay && (p === 'P1' || p === 'P2')) return true; // Religion
    if(day === 'FRIDAY' && p === 'P6') return true; // Debate
    if(day === 'FRIDAY' && pNum > 6) return true; // Mosque
    return false;
}

function renderTable(){
    let h=`<h2 class="no-print">School Timetables</h2>`;
    CLASSES.sort().forEach(f => {
        h += `<div class="card page-break"><h3>FORM: ${f}</h3><table><tr><th>Day</th>`;
        SLOTS.forEach(s => h += `<th>${s.id}<br><small>${s.time}</small></th>`);
        h += `</tr>`;
        DAYS.forEach(d => {
            h += `<tr><td><b>${d}</b></td>`;
            SLOTS.forEach(s => {
                if(s.type === 'break') h += `<td class="break-cell">BREAK</td>`;
                else if(d === document.getElementById('relDay').value && (s.id === 'P1' || s.id === 'P2')) h += `<td class="special-cell">RELIGION</td>`;
                else if(d === 'FRIDAY' && s.id === 'P6') h += `<td class="special-cell">DEBATE</td>`;
                else if(d === 'FRIDAY' && parseInt(s.id.replace('P','')) > 6) h += `<td class="special-cell">MOSQUE</td>`;
                else {
                    let idx = DATA.findIndex(x => x.d===d && x.p===s.id && x.frm===f);
                    let m = DATA[idx];
                    h += `<td ondragover="event.preventDefault()" ondrop="drop(event,'${d}','${s.id}','${f}')">`;
                    if(m) h += `<div class="slot" draggable="true" ondragstart="drag(${idx})"><b>${m.sub}</b><br>${m.tea}</div>`;
                    h += `</td>`;
                }
            });
            h += `</tr>`;
        });
        h += `</table></div>`;
    });
    document.getElementById("app").innerHTML = h;
}

function drag(i) { dragIdx = i; }
function drop(e, d, p, f) {
    if(isSpecial(d, p)) return;
    let item = DATA[dragIdx];
    if(DATA.some(x => x.d===d && x.p===p && (x.tea===item.tea || x.frm===f))) return;
    item.d = d; item.p = p; item.frm = f;
    renderTable();
}

function saveProject() {
    const blob = new Blob([JSON.stringify({REGISTRY, DATA, CLASSES, TEACHERS})], {type: "application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "School_Timetable_Project.json";
    a.click();
}

function loadProject(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const p = JSON.parse(ev.target.result);
        REGISTRY = p.REGISTRY || [];
        DATA = p.DATA || [];
        CLASSES = p.CLASSES || [];
        TEACHERS = p.TEACHERS || [];
        buildTimeSlots();
        renderTable();
    };
    reader.readAsText(e.target.files[0]);
}

function renderDashboard() { document.getElementById("app").innerHTML = `<div class="card"><h2>Dashboard</h2><p>Teachers: ${TEACHERS.length}</p><p>Classes: ${CLASSES.length}</p></div>`; }
function renderRegistry() { 
    let h=`<div class="card"><h2>Registry</h2><table><tr><th>Subject</th><th>Teacher</th><th>Class</th><th>P/W</th></tr>`;
    REGISTRY.forEach(r => h+=`<tr><td>${r.sub}</td><td>${r.tea}</td><td>${r.frm}</td><td>${r.pwk}</td></tr>`);
    document.getElementById("app").innerHTML = h+"</table></div>"; 
}
function renderWorkload() {
    let loads = {}; DATA.forEach(x => loads[x.tea] = (loads[x.tea] || 0) + 1);
    let h = `<div class="card"><h2>Workload</h2><table><tr><th>Teacher</th><th>Periods</th></tr>`;
    Object.keys(loads).sort().forEach(t => h += `<tr><td>${t}</td><td>${loads[t]}</td></tr>`);
    document.getElementById("app").innerHTML = h + `</table></div>`;
}
</script>
</body>
</html>
