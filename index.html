<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TT-PRO Enterprise - Full Integrated</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root {
  --primary:#0f172a; --secondary:#1e293b; --accent:#22c55e;
  --sidebar-gradient: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
  --bg:#f8fafc; --border:#e2e8f0; --text:#334155; --danger:#ef4444; --warning:#f59e0b; --whatsapp:#25d366; --pdf:#e11d48;
}
body { margin:0; font-family:'Inter', system-ui, sans-serif; display:flex; height: 100vh; background:var(--bg); overflow:hidden; }

#expiryBanner { display:none; background: var(--warning); color: #000; text-align: center; padding: 8px; font-weight: bold; font-size: 13px; z-index: 100; }
#lockScreen { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.98); color:white; z-index:9999; flex-direction:column; align-items:center; justify-content:center; text-align:center; }

.sidebar { 
    width:340px; background: var(--sidebar-gradient); color:white; padding:20px; 
    display: flex; flex-direction: column; gap: 10px; overflow-y: auto;
    box-shadow: 4px 0 15px rgba(0,0,0,0.3); z-index:10;
    border-right: 1px solid #334155;
}
.sidebar h2 { color: var(--accent); font-size: 1.1rem; text-align: center; border-bottom: 1px solid #334155; padding-bottom: 15px; margin:0; letter-spacing: 1px; }

.setting-card { background: rgba(30, 41, 59, 0.5); padding: 12px; border-radius: 8px; border: 1px solid #334155; }
.setting-card label { display: block; font-size: 10px; text-transform: uppercase; color: #94a3b8; margin-bottom: 4px; font-weight: 700; }
.setting-card input, .setting-card select { 
    width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 13px; box-sizing: border-box; margin-bottom: 5px;
}

.nav-label { font-size: 11px; color: #38bdf8; font-weight: 800; margin-top: 10px; border-left: 3px solid var(--accent); padding-left: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

.btn { width: 100%; padding: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; font-size: 12px; transition: 0.2s; display: flex; align-items: center; gap: 8px; justify-content: center; }
.btn-gen { background: var(--accent); color: #064e3b; box-shadow: 0 4px 0 #15803d; }
.btn-sec { background: #475569; color: white; }

.main { flex:1; display: flex; flex-direction: column; overflow: hidden; }
.top-bar { background: white; padding: 10px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.tab-group { display: flex; gap: 5px; }
.tab-group button { padding: 8px 15px; border: 1px solid var(--border); background: white; cursor: pointer; font-size: 12px; border-radius: 4px; font-weight: 600; }
.tab-group button.active { background: var(--primary); color: white; border-color: var(--primary); }

.content { flex:1; padding: 20px; overflow-y: auto; }
.table-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 25px; page-break-after: always; }

table { width: 100%; border-collapse: collapse; border: 2px solid #000; table-layout: fixed; }
th, td { border: 1px solid #000; padding: 4px; text-align: center; font-size: 9px; height: 45px; }
th { background: #f1f5f9; }

.slot { padding: 2px; border-radius: 4px; font-weight: 700; background: #dcfce7; border: 1px solid #22c55e; font-size: 8px; line-height: 1.1; }
.break-cell { background: #cbd5e1; font-weight: bold; writing-mode: vertical-rl; text-orientation: mixed; font-size: 9px; border: 2px solid #000 !important; }

#header { display: flex; align-items: center; justify-content: center; gap: 20px; }
#logoImg { height: 80px; width: auto; display: none; }

@page { size: A4 landscape; margin: 5mm; }
@media print { 
    .sidebar, .top-bar, #expiryBanner { display: none !important; } 
    body, .main, .content { overflow: visible; height: auto; display: block; }
    .table-card { border: none; box-shadow: none; padding: 0; margin: 0; }
}
</style>
</head>
<body>

<div id="lockScreen"><h1>LICENSE EXPIRED</h1></div>

<div class="sidebar no-print">
    <h2>TT-PRO COMMAND</h2>
    
    <div class="setting-card">
        <label>School Name</label>
        <input type="text" id="schName" value="TANZANIA SECONDARY SCHOOL" oninput="renderActiveView()">
        <label>Academic Year</label>
        <input type="text" id="acadYear" value="2026" oninput="renderActiveView()">
        <label>School Logo</label>
        <input type="file" id="logoUpload" accept="image/*" onchange="handleLogo(event)">
    </div>

    <div class="nav-label">Special Blocks</div>
    <div class="setting-card">
        <div style="display:flex; gap:5px; margin-bottom:5px;">
            <div style="flex:1"><label>Rel. Day</label><select id="relDay"><option>WEDNESDAY</option><option>MONDAY</option><option>TUESDAY</option><option>THURSDAY</option><option>FRIDAY</option></select></div>
            <div style="flex:1"><label>P# (8,9)</label><input type="text" id="relPeriods" value="8,9"></div>
        </div>
        <div style="display:flex; gap:5px; margin-bottom:5px;">
            <div style="flex:1"><label>Deb. Day</label><select id="debDay"><option>THURSDAY</option><option>MONDAY</option><option>TUESDAY</option><option>WEDNESDAY</option><option>FRIDAY</option></select></div>
            <div style="flex:1"><label>P# (8,9)</label><input type="text" id="debPeriods" value="8,9"></div>
        </div>
        <div style="display:flex; gap:5px;">
            <div style="flex:1"><label>Mos. Day</label><select id="mosDay"><option>FRIDAY</option><option>MONDAY</option><option>TUESDAY</option><option>WEDNESDAY</option><option>THURSDAY</option></select></div>
            <div style="flex:1"><label>P# (7,8,9)</label><input type="text" id="mosPeriods" value="7,8,9"></div>
        </div>
    </div>

    <div class="nav-label">Time & Intervals</div>
    <div class="setting-card">
        <div style="display:flex; gap:5px; margin-bottom:5px;">
            <div style="flex:1"><label>Total P.</label><select id="totalPeriods"><option value="8">8</option><option value="9" selected>9</option><option value="10">10</option></select></div>
            <div style="flex:1"><label>Dur (min)</label><input type="number" id="dur" value="40"></div>
            <div style="flex:1"><label>Start</label><input type="time" id="startTime" value="08:00"></div>
        </div>
        <div style="display:flex; gap:5px; margin-bottom:5px; border-top:1px solid #334155; padding-top:5px;">
            <div style="flex:1"><label>Break?</label><select id="breakOpt"><option value="yes">Yes</option><option value="no">No</option></select></div>
            <div style="flex:1"><label>After P#</label><input type="number" id="breakAfter" value="2"></div>
            <div style="flex:1"><label>Min</label><input type="number" id="breakDur" value="20"></div>
        </div>
        <div style="display:flex; gap:5px;">
            <div style="flex:1"><label>Lunch?</label><select id="lunchOpt"><option value="yes">Yes</option><option value="no">No</option></select></div>
            <div style="flex:1"><label>After P#</label><input type="number" id="lunchAfter" value="4"></div>
            <div style="flex:1"><label>Min</label><input type="number" id="lunchDur" value="45"></div>
        </div>
    </div>

    <button class="btn btn-gen" onclick="generate()">⚡ GENERATE</button>
    <button class="btn btn-sec" onclick="exportPDF()">📄 SAVE PDF</button>
    <button class="btn btn-sec" onclick="document.getElementById('csvIn').click()">📥 IMPORT CSV</button>
    <input type="file" id="csvIn" style="display:none" accept=".csv" onchange="handleCSV(event)">
    <button class="btn btn-sec" onclick="saveProject()">💾 BACKUP</button>
</div>

<div class="main">
    <div class="top-bar">
        <div class="tab-group">
            <button id="tab-GENERAL" class="active" onclick="setView('GENERAL')">Master</button>
            <button id="tab-STREAM" onclick="setView('STREAM')">Stream</button>
            <button id="tab-TEACHER" onclick="setView('TEACHER')">Teacher</button>
            <button id="tab-LOADS" onclick="setView('LOADS')">Loads</button>
        </div>
        <div style="display:flex; gap:10px;">
            <select id="displayMode" onchange="renderActiveView()"><option value="both">Sub + Tea</option><option value="sub">Sub Only</option></select>
            <select id="viewFilter" onchange="renderActiveView()" style="display:none"></select>
        </div>
    </div>
    <div class="content">
        <div id="printableArea">
            <div id="header">
                <img id="logoImg" src="">
                <div style="text-align:center">
                    <h1 id="headerTitle" style="margin:0;">TANZANIA SECONDARY SCHOOL</h1>
                    <h4 id="headerYear" style="margin:5px 0; color:#64748b;">ACADEMIC YEAR: 2026</h4>
                </div>
            </div>
            <div id="app"></div>
        </div>
    </div>
</div>

<script>
let DATA = [], REGISTRY = [], CLASSES = [], TEACHERS = [], SLOTS = [], currentView = 'GENERAL', logoBase64 = "";
const DAYS = ["MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY"];

function buildSlots() {
    SLOTS = [];
    let cur = new Date("2026-01-01T" + document.getElementById('startTime').value);
    let dur = parseInt(document.getElementById('dur').value);
    let totalP = parseInt(document.getElementById('totalPeriods').value);
    
    const bOpt = document.getElementById('breakOpt').value === 'yes';
    const bAfter = parseInt(document.getElementById('breakAfter').value);
    const lOpt = document.getElementById('lunchOpt').value === 'yes';
    const lAfter = parseInt(document.getElementById('lunchAfter').value);

    for(let i=1; i<=totalP; i++) {
        let sTime = cur.toTimeString().slice(0,5);
        cur.setMinutes(cur.getMinutes() + dur);
        let eTime = cur.toTimeString().slice(0,5);
        
        SLOTS.push({ id: 'P'+i, label: `P${i}<br><small>${sTime}-${eTime}</small>`, type: 'period' });

        if(bOpt && i === bAfter) {
            cur.setMinutes(cur.getMinutes() + parseInt(document.getElementById('breakDur').value));
            SLOTS.push({ id: 'BREAK', label: 'BREAK', type: 'break' });
        }
        if(lOpt && i === lAfter) {
            cur.setMinutes(cur.getMinutes() + parseInt(document.getElementById('lunchDur').value));
            SLOTS.push({ id: 'LUNCH', label: 'LUNCH', type: 'lunch' });
        }
    }
}

function isSpecial(day, pId) {
    const pNum = pId.replace('P','');
    if(day === document.getElementById('relDay').value && document.getElementById('relPeriods').value.split(',').includes(pNum)) return {bool: true, name: "RELIGION"};
    if(day === document.getElementById('debDay').value && document.getElementById('debPeriods').value.split(',').includes(pNum)) return {bool: true, name: "DEBATE"};
    if(day === document.getElementById('mosDay').value && document.getElementById('mosPeriods').value.split(',').includes(pNum)) return {bool: true, name: "MOSQUE"};
    return {bool: false};
}

function generate() {
    if(REGISTRY.length === 0) { alert("Please upload a CSV first!"); return; }
    DATA = []; buildSlots();
    let localRegistry = JSON.parse(JSON.stringify(REGISTRY));
    let shuffledClasses = [...CLASSES].sort(() => Math.random() - 0.5);
    
    shuffledClasses.forEach(frm => {
        let classSubjects = localRegistry.filter(r => r.frm === frm).sort((a,b) => b.pwk - a.pwk);
        
        classSubjects.forEach(sub => {
            let left = sub.pwk;
            let dayOrder = [...DAYS].sort(() => Math.random() - 0.5);

            for(let d of dayOrder) {
                if(left < 2) break;
                for(let i=0; i<SLOTS.length-1; i++) {
                    let s1 = SLOTS[i], s2 = SLOTS[i+1];
                    if(s1.type==='period' && s2.type==='period' && !isSpecial(d,s1.id).bool && !isSpecial(d,s2.id).bool) {
                        if(!DATA.some(x=>x.d===d && (x.p===s1.id || x.p===s2.id) && (x.tea===sub.tea || x.frm===sub.frm))) {
                            DATA.push({...sub, d, p: s1.id}, {...sub, d, p: s2.id});
                            left -= 2; break; 
                        }
                    }
                }
            }
            for(let d of dayOrder) {
                if(left <= 0) break;
                let periods = SLOTS.filter(s=>s.type==='period').sort(() => Math.random() - 0.5);
                for(let s of periods) {
                    if(left > 0 && !isSpecial(d,s.id).bool && !DATA.some(x=>x.d===d && x.p===s.id && (x.tea===sub.tea || x.frm===sub.frm))) {
                        DATA.push({...sub, d, p: s.id});
                        left--; break;
                    }
                }
            }
        });
    });
    renderActiveView();
}

function renderMaster() {
    let mode = document.getElementById('displayMode').value;
    buildSlots();
    let h = "";
    DAYS.forEach(day => {
        h += `<div class="table-card"><h3>${day}</h3><table><tr><th style="width:50px">Class</th>`;
        SLOTS.forEach(s => h += `<th>${s.label}</th>`);
        h += `</tr>`;
        CLASSES.sort().forEach(f => {
            h += `<tr><td><b>${f}</b></td>`;
            SLOTS.forEach(s => {
                let spec = isSpecial(day, s.id);
                if(s.type !== 'period') h += `<td class="break-cell">${s.id}</td>`;
                else if(spec.bool) h += `<td style="background:#fef3c7; font-weight:bold">${spec.name}</td>`;
                else {
                    let m = DATA.find(x => x.d===day && x.p===s.id && x.frm===f);
                    h += `<td>${m ? `<div class="slot">${mode==='both'?m.sub+'<br>'+m.tea:m.sub}</div>` : ''}</td>`;
                }
            });
            h += `</tr>`;
        });
        h += `</table></div>`;
    });
    document.getElementById('app').innerHTML = h;
}

function renderSingle(key) {
    const val = document.getElementById('viewFilter').value;
    buildSlots();
    let h = `<div class="table-card"><h3>${val} Schedule</h3><table><tr><th>Day</th>`;
    SLOTS.forEach(s => h += `<th>${s.label}</th>`);
    h += `</tr>`;
    DAYS.forEach(d => {
        h += `<tr><td><b>${d}</b></td>`;
        SLOTS.forEach(s => {
            let spec = isSpecial(d, s.id);
            if(s.type!=='period') h += `<td class="break-cell">${s.id}</td>`;
            else if(spec.bool) h += `<td style="background:#fef3c7; font-weight:bold">${spec.name}</td>`;
            else {
                let m = DATA.find(x => x.d===d && x.p===s.id && x[key]===val);
                h += `<td>${m ? `<div class="slot">${key==='tea'?m.frm:m.sub}</div>` : ''}</td>`;
            }
        });
        h += `</tr>`;
    });
    document.getElementById('app').innerHTML = h + `</table></div>`;
}

function renderLoads() {
    let h = `<div class="table-card"><h3>TEACHER WORKLOAD</h3><table><tr><th>Teacher Name</th><th>Total Periods / Week</th></tr>`;
    TEACHERS.sort().forEach(t => {
        let count = DATA.filter(x => x.tea === t).length;
        h += `<tr><td>${t}</td><td><b>${count}</b></td></tr>`;
    });
    document.getElementById('app').innerHTML = h + `</table></div>`;
}

function handleLogo(e) {
    const reader = new FileReader();
    reader.onload = () => { 
        logoBase64 = reader.result; 
        document.getElementById('logoImg').src = logoBase64; 
        document.getElementById('logoImg').style.display = 'block'; 
    };
    reader.readAsDataURL(e.target.files[0]);
}

function handleCSV(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const lines = ev.target.result.split('\n').filter(l => l.trim() !== "");
        REGISTRY = []; CLASSES = []; TEACHERS = [];
        lines.slice(1).forEach(line => {
            const parts = line.split(',').map(c => c.trim().toUpperCase());
            if(parts.length < 4) return;
            const [sub, tea, pwk, frm] = parts;
            REGISTRY.push({ sub, tea, pwk: parseInt(pwk), frm });
            if(!CLASSES.includes(frm)) CLASSES.push(frm);
            if(!TEACHERS.includes(tea)) TEACHERS.push(tea);
        });
        alert(`Successfully loaded ${REGISTRY.length} subject entries! Click GENERATE to view.`);
        // Refresh filter dropdowns immediately
        if(currentView === 'STREAM' || currentView === 'TEACHER') setView(currentView);
    };
    reader.readAsText(e.target.files[0]);
}

function setView(v) {
    currentView = v;
    document.querySelectorAll('.tab-group button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-'+v).classList.add('active');
    let fil = document.getElementById('viewFilter');
    fil.style.display = (v==='STREAM'||v==='TEACHER') ? 'inline-block' : 'none';
    if(v==='STREAM') { fil.innerHTML = ''; CLASSES.sort().forEach(c => fil.innerHTML += `<option value="${c}">${c}</option>`); } 
    else if(v==='TEACHER') { fil.innerHTML = ''; TEACHERS.sort().forEach(t => fil.innerHTML += `<option value="${t}">${t}</option>`); }
    renderActiveView();
}

function renderActiveView() {
    document.getElementById('headerTitle').innerText = document.getElementById('schName').value;
    document.getElementById('headerYear').innerText = "ACADEMIC YEAR: " + document.getElementById('acadYear').value;
    if(currentView==='GENERAL') renderMaster();
    else if(currentView==='LOADS') renderLoads();
    else renderSingle(currentView === 'STREAM' ? 'frm' : 'tea');
}

function exportPDF() {
    const opt = { margin: 5, filename: 'Timetable.pdf', jsPDF: { orientation: 'landscape' } };
    html2pdf().set(opt).from(document.getElementById('printableArea')).save();
}

function saveProject() {
    const blob = new Blob([JSON.stringify({DATA, REGISTRY, CLASSES, TEACHERS, schName:document.getElementById('schName').value, acadYear:document.getElementById('acadYear').value, logo:logoBase64})], {type:"application/json"});
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "TT_Backup.json"; a.click();
}
</script>
</body>
</html>
