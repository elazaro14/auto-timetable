<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TT-PRO Admin - Tanzania Edition</title>
<style>
:root {
  --primary:#0f172a; --secondary:#1e293b; --accent:#22c55e;
  --bg:#f1f5f9; --danger:#ef4444; --info: #0ea5e9;
}

body { margin:0; font-family:'Segoe UI', sans-serif; display:flex; height: 100vh; overflow:hidden; }

/* SIDEBAR */
.sidebar { width:260px; background:var(--secondary); color:white; padding:15px; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-y: auto; }
.sidebar h3 { text-align: center; color: var(--accent); border-bottom: 1px solid #334155; padding-bottom:10px; margin-top:0; }

.config-group { background: #1e293b; border: 1px solid #334155; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
.config-group label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
.config-group select, .config-group input { width: 100%; padding: 6px; border-radius: 4px; border: none; margin-bottom: 5px; box-sizing: border-box; }

.sidebar button {
  width:100%; margin:4px 0; padding:10px;
  background:#334155; color:white; border:none; border-radius:6px;
  cursor:pointer; text-align: left; transition: 0.3s; font-size: 13px;
}
.sidebar button:hover { background: #475569; }

/* MAIN CONTENT */
.main { flex:1; padding:20px; background:var(--bg); overflow-y: auto; }
.view-controls { display: flex; gap: 10px; margin-bottom: 15px; background: white; padding: 10px; border-radius: 8px; align-items: center; }

.card { background:white; padding:20px; border-radius:10px; margin-bottom:20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
table { width:100%; border-collapse:collapse; background: white; border: 2px solid #000; table-layout: fixed; }
th, td { border: 1px solid #000; padding:4px; text-align:center; font-size: 10px; height: 40px; overflow: hidden; }
th { background: #f1f5f9; font-weight: bold; }

.break-cell { background: #cbd5e1; font-weight: bold; width: 25px; writing-mode: vertical-rl; text-orientation: mixed; }
.special-cell { background: #fef3c7; color: #92400e; font-weight: bold; font-size: 8px; }
.slot { padding:2px; border-radius:3px; font-weight: 600; font-size: 9px; background: #dcfce7; border: 1px solid var(--accent); }

@media print { 
    .sidebar, .no-print, .view-controls { display: none !important; } 
    .main { padding: 0; } 
    .card { box-shadow: none; page-break-after: always; border: none; }
    h2 { font-size: 18px; text-align: center; }
}
</style>
</head>

<body>

<div class="sidebar no-print">
    <h3>TT-PRO ADMIN</h3>
    
    <div class="config-group">
        <label>Start Time</label>
        <input type="time" id="startTime" value="08:00">
    </div>

    <button onclick="renderDashboard()">📊 Dashboard</button>
    <button onclick="renderRegistry()">🗂 Registry</button>
    <button onclick="generate()">⚙️ Generate Timetable</button>

    <hr style="opacity:0.1; margin:10px 0;">
    
    <button onclick="saveProject()" style="background:var(--accent)">💾 Save Project</button>
    <button onclick="document.getElementById('loadProj').click()" style="background:#4b5563;">📂 Load Saved</button>
    <input type="file" id="loadProj" style="display:none" accept=".json" onchange="loadProject(event)">
    <button onclick="document.getElementById('csvIn').click()" style="background:var(--info)">📥 Upload CSV</button>
    <input type="file" id="csvIn" style="display:none" accept=".csv" onchange="handleCSV(event)">
    <button onclick="window.print()" style="background:#1e293b; border:1px solid #334155;">🖨️ Print View</button>
</div>

<div class="main">
    <div class="view-controls no-print">
        <b>View Mode:</b>
        <button onclick="setView('GENERAL')" style="padding:5px 10px">General</button>
        <button onclick="setView('STREAM')" style="padding:5px 10px">By Stream</button>
        <button onclick="setView('TEACHER')" style="padding:5px 10px">By Teacher</button>
        
        <select id="viewFilter" onchange="renderActiveView()" style="padding:5px; margin-left:10px; display:none;"></select>
    </div>
    
    <div id="app"></div>
</div>

<script>
let DATA=[];
let REGISTRY=[];
let TEACHERS=[];
let CLASSES=[];
let SLOTS=[];
let currentView = 'GENERAL';

const DAYS=["MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY"];

function buildTimeSlots() {
    SLOTS = [];
    let cur = new Date("2026-01-01T" + document.getElementById('startTime').value);
    for(let i=1; i<=9; i++) {
        let sStr = cur.toTimeString().slice(0,5);
        cur.setMinutes(cur.getMinutes() + 40);
        SLOTS.push({ id: 'P'+i, time: `${sStr}-${cur.toTimeString().slice(0,5)}`, type: 'period' });
        if(i === 4) {
            let bS = cur.toTimeString().slice(0,5);
            cur.setMinutes(cur.getMinutes() + 30);
            SLOTS.push({ id: 'BREAK', time: `${bS}-${cur.toTimeString().slice(0,5)}`, type: 'break' });
        }
    }
}

function handleCSV(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim() !== "");
        const rawMap = {};
        lines.slice(1).forEach(line => {
            const cols = line.split(',').map(c => c.trim().toUpperCase());
            if (cols.length >= 4) {
                const [sub, tea, rm, frm] = [cols[0], cols[1], cols[2], cols[3]];
                const key = `${sub}|${tea}|${frm}|${rm}`;
                rawMap[key] = (rawMap[key] || 0) + 1;
            }
        });
        REGISTRY = []; TEACHERS = []; CLASSES = [];
        for (let key in rawMap) {
            const [sub, tea, frm, rm] = key.split('|');
            REGISTRY.push({ sub, tea, frm, rm, pwk: rawMap[key] });
            if(!TEACHERS.includes(tea)) TEACHERS.push(tea);
            if(!CLASSES.includes(frm)) CLASSES.push(frm);
        }
        alert("Import Successful!");
    };
    reader.readAsText(e.target.files[0]);
}

function generate(){
    DATA = [];
    buildTimeSlots();
    let sortedReg = [...REGISTRY].sort((a,b) => b.pwk - a.pwk);

    sortedReg.forEach(r => {
        let left = r.pwk;
        DAYS.forEach(day => {
            if(left <= 0) return;
            let placedToday = false;
            // Try Double
            if(left >= 2) {
                for(let i=0; i < SLOTS.length - 1; i++) {
                    let s1 = SLOTS[i], s2 = SLOTS[i+1];
                    if(s1.type==='period' && s2.type==='period' && !isBusy(day, s1.id, r) && !isBusy(day, s2.id, r) && !isSpecial(day, s1.id) && !isSpecial(day, s2.id)) {
                        DATA.push({...r, d: day, p: s1.id}, {...r, d: day, p: s2.id});
                        left -= 2; placedToday = true; break;
                    }
                }
            }
            // Try Single
            if(!placedToday && left >= 1) {
                for(let i=0; i < SLOTS.length; i++) {
                    let s = SLOTS[i];
                    if(s.type==='period' && !isBusy(day, s.id, r) && !isSpecial(day, s.id)) {
                        DATA.push({...r, d: day, p: s.id});
                        left--; break;
                    }
                }
            }
        });
    });
    renderActiveView();
}

function isBusy(d,p,r){ return DATA.some(x=>x.d===d && x.p===p && (x.tea===r.tea || x.frm===r.frm)); }
function isSpecial(day, p) {
    if(day === 'WEDNESDAY' && (p === 'P8' || p === 'P9')) return true;
    if(day === 'THURSDAY' && (p === 'P8' || p === 'P9')) return true;
    if(day === 'FRIDAY' && (p === 'P7' || p === 'P8' || p === 'P9')) return true;
    return false;
}

/* VIEW MANAGEMENT */
function setView(mode) {
    currentView = mode;
    const filter = document.getElementById('viewFilter');
    filter.style.display = mode === 'GENERAL' ? 'none' : 'block';
    filter.innerHTML = '';
    
    let list = mode === 'STREAM' ? CLASSES.sort() : TEACHERS.sort();
    list.forEach(item => filter.innerHTML += `<option value="${item}">${item}</option>`);
    
    renderActiveView();
}

function renderActiveView() {
    if(currentView === 'GENERAL') renderGeneral();
    else if(currentView === 'STREAM') renderFiltered('frm');
    else renderFiltered('tea');
}

function renderGeneral() {
    let h = `<div class="card"><h2>GENERAL SCHOOL TIMETABLE</h2>`;
    CLASSES.sort().forEach(f => {
        h += `<h3>${f}</h3><table><tr><th>Day</th>`;
        SLOTS.forEach(s => h += `<th>${s.id}</th>`);
        h += `</tr>`;
        DAYS.forEach(d => {
            h += `<tr><td><b>${d.slice(0,3)}</b></td>`;
            SLOTS.forEach(s => {
                if(s.type === 'break') h += `<td class="break-cell">BRK</td>`;
                else if(isSpecial(d, s.id)) h += `<td class="special-cell">BLOCKED</td>`;
                else {
                    let m = DATA.find(x => x.d===d && x.p===s.id && x.frm===f);
                    h += `<td>${m ? `<div class="slot">${m.sub}</div>` : ''}</td>`;
                }
            });
            h += `</tr>`;
        });
        h += `</table><br>`;
    });
    document.getElementById("app").innerHTML = h + `</div>`;
}

function renderFiltered(key) {
    const val = document.getElementById('viewFilter').value;
    let h = `<div class="card"><h2>${currentView}: ${val}</h2><table><tr><th>Day</th>`;
    SLOTS.forEach(s => h += `<th>${s.id}<br><small>${s.time}</small></th>`);
    h += `</tr>`;
    DAYS.forEach(d => {
        h += `<tr><td><b>${d}</b></td>`;
        SLOTS.forEach(s => {
            if(s.type === 'break') h += `<td class="break-cell">BREAK</td>`;
            else if(isSpecial(d, s.id)) {
                let txt = d === 'WEDNESDAY' ? 'RELIGION' : (d==='THURSDAY' ? 'DEBATE' : 'MOSQUE');
                h += `<td class="special-cell">${txt}</td>`;
            }
            else {
                let m = DATA.find(x => x.d===d && x.p===s.id && x[key]===val);
                h += `<td>${m ? `<div class="slot"><b>${m.sub}</b><br>${key==='tea'?m.frm:m.tea}</div>` : ''}</td>`;
            }
        });
        h += `</tr>`;
    });
    document.getElementById("app").innerHTML = h + `</table></div>`;
}

function saveProject() {
    const blob = new Blob([JSON.stringify({REGISTRY, DATA, CLASSES, TEACHERS})], {type: "application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "Final_Timetable.json";
    a.click();
}

function loadProject(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const p = JSON.parse(ev.target.result);
        REGISTRY = p.REGISTRY || []; DATA = p.DATA || []; CLASSES = p.CLASSES || []; TEACHERS = p.TEACHERS || [];
        buildTimeSlots();
        renderActiveView();
    };
    reader.readAsText(e.target.files[0]);
}

function renderDashboard() { setView('GENERAL'); }
function renderRegistry() {
    let h = `<div class="card"><h2>Registry</h2><table><tr><th>Sub</th><th>Teacher</th><th>Class</th><th>P/W</th></tr>`;
    REGISTRY.forEach(r => h += `<tr><td>${r.sub}</td><td>${r.tea}</td><td>${r.frm}</td><td>${r.pwk}</td></tr>`);
    document.getElementById("app").innerHTML = h + "</table></div>";
}
</script>
</body>
</html>
