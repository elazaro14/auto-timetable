<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TT-PRO Enterprise+</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root {
  --primary:#0f172a; --accent:#22c55e; --bg:#f8fafc;
  --border:#e2e8f0; --danger:#ef4444;
}
body { margin:0; font-family:system-ui; display:flex; height:100vh; background:var(--bg); }

.sidebar {
  width:300px; background:#0f172a; color:white; padding:15px; overflow:auto;
}
.sidebar h2 { color:var(--accent); text-align:center; }

.setting-card { margin-bottom:10px; }
.setting-card label { font-size:11px; display:block; }
.setting-card input, select {
  width:100%; padding:6px; margin-bottom:5px;
}

.btn {
  width:100%; padding:10px; margin-top:5px;
  background:var(--accent); border:none; cursor:pointer;
}

.main { flex:1; display:flex; flex-direction:column; }
.top { padding:10px; background:white; border-bottom:1px solid var(--border); }

.content { padding:15px; overflow:auto; }

.card {
  background:white; padding:10px; border-radius:8px;
  border:1px solid var(--border);
}

.stats { display:flex; gap:10px; margin-bottom:10px; }

table { width:100%; border-collapse:collapse; }
th, td { border:1px solid black; font-size:10px; text-align:center; padding:4px; }

.slot { background:#dcfce7; font-weight:bold; }
.break { background:#ddd; }
.special { background:#fef3c7; font-weight:bold; }

</style>
</head>

<body>

<div class="sidebar">
<h2>TT-PRO+</h2>

<div class="setting-card">
<label>School</label>
<input id="schName" value="SECONDARY SCHOOL">
</div>

<div class="setting-card">
<label>Periods</label>
<select id="totalPeriods">
<option>6</option><option>7</option><option selected>8</option><option>9</option>
</select>

<label>Duration</label>
<input id="dur" type="number" value="40">
</div>

<button class="btn" onclick="generate()">⚡ GENERATE</button>
<button class="btn" onclick="exportPDF()">📄 PDF</button>

<input type="file" id="csv" onchange="loadCSV(event)">

</div>

<div class="main">
<div class="top">
<h3 id="title">TIMETABLE</h3>
</div>

<div class="content">
<div id="stats"></div>
<div id="app"></div>
</div>
</div>

<script>

let REGISTRY=[], DATA=[], CLASSES=[], TEACHERS=[];
const DAYS=["MON","TUE","WED","THU","FRI"];

function loadCSV(e){
 const reader=new FileReader();
 reader.onload=(ev)=>{
  let lines=ev.target.result.split('\n');
  REGISTRY=[]; CLASSES=[]; TEACHERS=[];

  lines.slice(1).forEach(l=>{
    let [sub,tea,pwk,frm]=l.split(',').map(x=>x?.trim().toUpperCase());

    if(!sub || !tea || isNaN(pwk)) return;

    REGISTRY.push({sub,tea,pwk:+pwk,frm});

    if(!CLASSES.includes(frm)) CLASSES.push(frm);
    if(!TEACHERS.includes(tea)) TEACHERS.push(tea);
  });

  alert("Loaded!");
 }
 reader.readAsText(e.target.files[0]);
}

function buildSlots(){
 let total=+document.getElementById('totalPeriods').value;
 let arr=[];
 for(let i=1;i<=total;i++) arr.push("P"+i);
 return arr;
}

function teacherLoad(t){
 return DATA.filter(x=>x.tea===t).length;
}

function canPlace(r,d,p){
 if(DATA.some(x=>x.d===d && x.p===p && (x.tea===r.tea || x.frm===r.frm))) return false;
 return true;
}

function generate(){

 if(REGISTRY.length===0) return alert("Upload CSV");

 DATA=[];

 let slots=buildSlots();

 // sort hard subjects first
 let pool=[...REGISTRY].sort((a,b)=>b.pwk-a.pwk);

 for(let r of pool){

  let left=r.pwk;

  for(let d of shuffle(DAYS)){

   if(left<=0) break;

   // prevent same subject twice per day
   if(DATA.some(x=>x.d===d && x.frm===r.frm && x.sub===r.sub)) continue;

   for(let p of shuffle(slots)){

    if(canPlace(r,d,p)){

      DATA.push({...r,d,p});
      left--;

      break;
    }
   }
  }

  if(left>0){
    alert("Could not fully allocate "+r.sub);
  }
 }

 render();
}

function shuffle(arr){
 return [...arr].sort(()=>Math.random()-0.5);
}

function render(){

 document.getElementById('title').innerText=document.getElementById('schName').value;

 renderStats();

 let slots=buildSlots();

 let html="";

 for(let d of DAYS){

  html+=`<div class="card"><h4>${d}</h4><table><tr><th>Class</th>`;

  slots.forEach(p=>html+=`<th>${p}</th>`);
  html+="</tr>";

  CLASSES.forEach(c=>{
    html+=`<tr><td>${c}</td>`;

    slots.forEach(p=>{
      let m=DATA.find(x=>x.d===d && x.p===p && x.frm===c);

      html+=`<td>${m?`<div class="slot">${m.sub}<br>${m.tea}</div>`:""}</td>`;
    });

    html+="</tr>";
  });

  html+="</table></div><br>";
 }

 document.getElementById('app').innerHTML=html;
}

function renderStats(){

 let totalLessons=DATA.length;
 let teachers=TEACHERS.length;
 let classes=CLASSES.length;

 document.getElementById('stats').innerHTML=`
 <div class="stats">
  <div class="card">Classes: ${classes}</div>
  <div class="card">Teachers: ${teachers}</div>
  <div class="card">Lessons: ${totalLessons}</div>
 </div>`;
}

function exportPDF(){
 html2pdf().from(document.body).save();
}

</script>

</body>
</html>
