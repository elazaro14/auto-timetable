<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TT-PRO ULTIMATE 2026</title>
    <style>
        :root { --primary: #22c55e; --dark: #0f172a; --bg: #f1f5f9; --border: #e2e8f0; }
        body { margin:0; font-family: 'Inter', system-ui, sans-serif; display:flex; height:100vh; background:var(--bg); color:#1e293b; }
        
        .sidebar { width:320px; background:var(--dark); color:white; padding:20px; overflow-y:auto; box-shadow: 2px 0 10px rgba(0,0,0,0.2); }
        .sidebar h2 { color:var(--primary); text-align:center; margin-bottom:20px; font-size:1.4rem; }
        label { font-size:11px; text-transform:uppercase; color:#94a3b8; display:block; margin-top:12px; font-weight:600; }
        input, select { width:100%; padding:8px; margin:4px 0; border-radius:4px; border:1px solid #334155; background:#1e293b; color:white; box-sizing:border-box; }
        button { width:100%; padding:10px; margin-top:8px; background:var(--primary); border:none; border-radius:4px; color:white; font-weight:bold; cursor:pointer; }
        button.alt { background:#334155; }
        .special-entry { background: #1e293b; padding: 10px; border-radius: 4px; margin-top: 10px; border: 1px dashed #475569; }

        .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
        .top { background:white; padding:12px 20px; border-bottom:1px solid var(--border); display:flex; gap:10px; align-items:center; }
        .content { padding:20px; overflow-y:auto; flex:1; }
        
        table { width:100%; border-collapse:collapse; table-layout:fixed; background:white; }
        th, td { border:1px solid #cbd5e1; font-size:10px; text-align:center; padding:5px; }
        th { background:#f8fafc; color:#64748b; font-weight:700; }
        .slot { border-radius:3px; padding:3px; min-height:35px; display:flex; flex-direction:column; justify-content:center; font-weight:bold; }
        .break { background:#f1f5f9; color:#94a3b8; font-style:italic; }
        .special-block { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; font-weight: bold; }

        @media print {
            .sidebar, .top, .no-print { display:none !important; }
            body { background:white; display:block; }
            .main { display:block; width:100%; }
            .card { page-break-inside:avoid; border: 1px solid #eee; margin-bottom: 20px;}
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>TT-PRO ULTIMATE</h2>
    <label>School Name</label>
    <input id="schName" value="SECONDARY SCHOOL">
    
    <label>Standard Setup</label>
    <div style="display:flex; gap:5px">
        <div style="flex:1"><label>Total P</label><input type="number" id="totalPeriods" value="8"></div>
        <div style="flex:1"><label>Dur (m)</label><input type="number" id="periodDur" value="40"></div>
    </div>
    <label>Start Time</label>
    <input type="time" id="startTime" value="08:00">

    <label>Standard Breaks</label>
    <div style="display:flex; gap:5px">
        <div style="flex:1"><label>Break 1 (After P)</label><input type="number" id="breakAfter" value="2"></div>
        <div style="flex:1"><label>Lunch (After P)</label><input type="number" id="lunchAfter" value="4"></div>
    </div>

    <div class="special-entry">
        <label style="color:var(--primary)">Add Special Block</label>
        <input type="text" id="specName" placeholder="e.g. ASSEMBLY">
        <select id="specDay">
            <option value="ALL">Every Day</option>
            <option value="MON">Monday</option><option value="TUE">Tuesday</option>
            <option value="WED">Wednesday</option><option value="THU">Thursday</option>
            <option value="FRI">Friday</option>
        </select>
        <input type="number" id="specAfter" placeholder="After Period #">
        <input type="number" id="specDur" placeholder="Duration (min)">
        <button onclick="addSpecial()" style="background:#3b82f6">+ Add Block</button>
    </div>
    
    <hr style="border:0; border-top:1px solid #334155; margin:15px 0">
    <button onclick="generate()">⚡ Generate Timetable</button>
    <button class="alt" onclick="window.print()">🖨️ Print View</button>
    
    <label>Data</label>
    <input type="file" id="csvFile" style="display:none" onchange="loadCSV(event)">
    <button class="alt" onclick="document.getElementById('csvFile').click()">📥 Import CSV</button>
</div>

<div class="main">
    <div class="top">
        <button onclick="setView('MASTER')">Master View</button>
        <button onclick="setView('STREAM')">Stream</button>
        <button onclick="setView('TEACHER')">Teacher</button>
        <div style="flex:1"></div>
        <select id="filter" onchange="render()" style="width:150px; display:none"></select>
    </div>
    <div class="content">
        <div id="app"></div>
    </div>
</div>

<script>
let REGISTRY=[], DATA=[], CLASSES=[], TEACHERS=[], SLOTS=[], SPECIALS=[];
const DAYS = ["MON", "TUE", "WED", "THU", "FRI"];

function addSpecial() {
    const name = document.getElementById('specName').value;
    const day = document.getElementById('specDay').value;
    const after = parseInt(document.getElementById('specAfter').value);
    const dur = parseInt(document.getElementById('specDur').value);

    if(!name || !after || !dur) return alert("Fill all special block fields");
    
    SPECIALS.push({ name, day, after, dur });
    alert(`Added ${name} to registry.`);
    document.getElementById('specName').value = '';
}

function buildSlots(specificDay) {
    let slots = [];
    let cur = new Date("2026-01-01T" + document.getElementById('startTime').value);
    let dur = +document.getElementById('periodDur').value;
    let total = +document.getElementById('totalPeriods').value;
    let bA = +document.getElementById('breakAfter').value;
    let lA = +document.getElementById('lunchAfter').value;

    for (let i = 1; i <= total; i++) {
        let sTime = cur.toTimeString().slice(0, 5);
        cur.setMinutes(cur.getMinutes() + dur);
        let eTime = cur.toTimeString().slice(0, 5);

        slots.push({ id: "P" + i, label: `P${i}<br>${sTime}-${eTime}`, type: "period" });

        // Standard Breaks
        if (i === bA) {
            slots.push({ type: "break", label: `BREAK<br>${cur.toTimeString().slice(0, 5)}` });
            cur.setMinutes(cur.getMinutes() + 20);
        }
        if (i === lA) {
            slots.push({ type: "break", label: `LUNCH<br>${cur.toTimeString().slice(0, 5)}` });
            cur.setMinutes(cur.getMinutes() + 45);
        }

        // Special Blocks
        SPECIALS.forEach(sp => {
            if (sp.after === i && (sp.day === "ALL" || sp.day === specificDay)) {
                slots.push({ type: "special", label: `${sp.name}<br>${cur.toTimeString().slice(0, 5)}`, dur: sp.dur });
                cur.setMinutes(cur.getMinutes() + sp.dur);
            }
        });
    }
    return slots;
}

function generate() {
    if (REGISTRY.length === 0) return alert("Import CSV first");
    
    // Use a reference set of slots for the generator logic
    SLOTS = buildSlots("MON"); 
    
    let success = false;
    for (let attempt = 0; attempt < 50; attempt++) {
        DATA = []; success = true;
        let pool = [...REGISTRY].sort((a, b) => b.pwk - a.pwk);

        for (let r of pool) {
            let left = r.pwk;
            let shuffledDays = [...DAYS].sort(() => Math.random() - 0.5);

            for (let d of shuffledDays) {
                if (left <= 0) break;
                if (DATA.some(x => x.d === d && x.frm === r.frm && x.sub === r.sub)) continue;

                let periods = SLOTS.filter(s => s.type === "period");

                // DOUBLE Period (Prioritized)
                if (left >= 2) {
                    for (let i = 0; i < periods.length - 1; i++) {
                        let p1 = periods[i], p2 = periods[i+1];
                        if (SLOTS.indexOf(p2) === SLOTS.indexOf(p1) + 1) { // No break in between
                            if (canPlace(r, d, p1.id) && canPlace(r, d, p2.id)) {
                                DATA.push({ ...r, d, p: p1.id }, { ...r, d, p: p2.id });
                                left -= 2; break;
                            }
                        }
                    }
                }
                // SINGLE Period
                if (left > 0) {
                    let avail = periods.filter(p => canPlace(r, d, p.id)).sort(() => Math.random() - 0.5);
                    if (avail.length > 0) { DATA.push({ ...r, d, p: avail[0].id }); left--; }
                }
            }
            if (left > 0) { success = false; break; }
        }
        if (success) break;
    }
    render();
}

function canPlace(r, d, pId) {
    return !DATA.some(x => x.d === d && x.p === pId && (x.tea === r.tea || x.frm === r.frm));
}

function setView(v) {
    const f = document.getElementById('filter');
    f.style.display = (v === "STREAM" || v === "TEACHER") ? "block" : "none";
    if (v === "STREAM") f.innerHTML = CLASSES.sort().map(c => `<option>${c}</option>`).join('');
    if (v === "TEACHER") f.innerHTML = TEACHERS.sort().map(t => `<option>${t}</option>`).join('');
    currentView = v; render();
}

function render() {
    let html = "";
    const app = document.getElementById('app');

    DAYS.forEach(d => {
        const daySlots = buildSlots(d); // Rebuild to include day-specific specials
        html += `<div class="card"><h3>${d}</h3><table><tr><th>Class</th>`;
        daySlots.forEach(s => html += `<th>${s.label}</th>`);
        html += "</tr>";

        CLASSES.sort().forEach(c => {
            html += `<tr><td><b>${c}</b></td>`;
            daySlots.forEach(s => {
                if (s.type === "break") html += `<td class="break">BRK</td>`;
                else if (s.type === "special") html += `<td class="special-block">${s.label.split('<br>')[0]}</td>`;
                else {
                    let m = DATA.find(x => x.d === d && x.p === s.id && x.frm === c);
                    html += `<td>${m ? `<div class="slot" style="background:#dcfce7">${m.sub}<br>${m.tea}</div>` : ""}</td>`;
                }
            });
            html += "</tr>";
        });
        html += "</table></div>";
    });
    app.innerHTML = html;
}

function loadCSV(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        let lines = ev.target.result.split('\n');
        REGISTRY = []; CLASSES = []; TEACHERS = [];
        lines.slice(1).forEach(line => {
            let parts = line.split(/[;,]/).map(x => x.trim().toUpperCase());
            if (parts.length < 4) return;
            let [sub, tea, pwk, frm] = parts;
            REGISTRY.push({ sub, tea, pwk: +pwk, frm });
            if (!CLASSES.includes(frm)) CLASSES.push(frm);
            if (!TEACHERS.includes(tea)) TEACHERS.push(tea);
        });
        render();
    };
    reader.readAsText(e.target.files[0]);
}
</script>
</body>
</html>
