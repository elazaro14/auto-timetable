<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>TT-PRO ULTIMATE 2026</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

/* ================= PROFESSIONAL UI (UNCHANGED) ================= */

:root{
    --primary:#2563eb;
    --primary-dark:#1d4ed8;
    --success:#16a34a;
    --danger:#dc2626;
    --warning:#f59e0b;
    --sidebar:#0f172a;
    --sidebar-light:#1e293b;
    --background:#f8fafc;
    --card:#ffffff;
    --text:#0f172a;
    --text-light:#64748b;
    --border:#e2e8f0;
    --shadow-sm:0 1px 2px rgba(0,0,0,.05);
    --shadow-md:0 5px 12px rgba(0,0,0,.08);
    --shadow-lg:0 10px 25px rgba(0,0,0,.12);
    --radius:14px;
}

*{box-sizing:border-box;}

body{
    margin:0;
    font-family:Inter,system-ui,sans-serif;
    display:flex;
    height:100vh;
    background:var(--background);
    color:var(--text);
}

/* SIDEBAR */
.sidebar{
    width:340px;
    background:linear-gradient(180deg,#0f172a 0%,#1e293b 100%);
    color:white;
    padding:20px;
    overflow-y:auto;
    border-right:1px solid #334155;
    box-shadow:var(--shadow-lg);
}

.sidebar h2{
    text-align:center;
    margin-top:0;
    margin-bottom:25px;
    color:#38bdf8;
}

/* BUTTONS */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-top:8px;
    cursor:pointer;
    font-weight:700;
}

.btn-blue{background:#2563eb;color:white;}
.btn-green{background:#16a34a;color:white;}
.btn-gray{background:#334155;color:white;}
.btn-red{background:#dc2626;color:white;}

/* SPECIAL */
.special-box{
    background:rgba(255,255,255,.03);
    border:1px dashed #475569;
    padding:14px;
    border-radius:14px;
    margin-top:10px;
}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:white;padding:12px;border-bottom:1px solid #e2e8f0;}
.content{flex:1;overflow:auto;padding:20px;}

/* TABLE */
table{width:100%;border-collapse:collapse;table-layout:fixed;}
th,td{border:1px solid #e2e8f0;text-align:center;font-size:11px;padding:5px;}
th{background:#f8fafc;}

.slot{background:#dcfce7;padding:5px;border-radius:10px;font-weight:700;}
.break-cell{background:#f1f5f9;}
.special-cell{background:#fde68a;font-weight:800;}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<h2>TT-PRO ULTIMATE</h2>

<label>School</label>
<input id="schName" value="SECONDARY SCHOOL">

<label>Year</label>
<input id="acadYear" value="2026">

<label>Total Periods</label>
<input id="totalPeriods" type="number" value="8">

<label>Period Duration</label>
<input id="periodDur" type="number" value="40">

<label>Start Time</label>
<input id="startTime" type="time" value="08:00">

<hr>

<h4>Special Blocks</h4>

<input id="spName" placeholder="ASSEMBLY">

<select id="spDay">
<option value="ALL">EVERY DAY</option>
<option value="MON">MON</option>
<option value="TUE">TUE</option>
<option value="WED">WED</option>
<option value="THU">THU</option>
<option value="FRI">FRI</option>
</select>

<!-- UPDATED: MULTI PERIOD SUPPORT -->
<input id="spAfter" placeholder="After Periods e.g 6,7,8">

<input id="spDur" type="number" placeholder="Duration (min)">

<button class="btn-blue" onclick="addSpecial()">+ ADD SPECIAL</button>

<div id="specialList"></div>

<hr>

<button class="btn-green" onclick="generate()">GENERATE</button>
<button class="btn-gray" onclick="window.print()">PRINT</button>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<b>TT-PRO TIMETABLE</b>
</div>

<div class="content">
<div id="app"></div>
</div>

</div>

<script>

/* ================= DATA ================= */

const DAYS=["MON","TUE","WED","THU","FRI"];

let SPECIALS=[];
let DATA=[];
let REGISTRY=[];
let CLASSES=[];

/* ================= SPECIAL BLOCK UPDATED ================= */

function addSpecial(){

    const name=spName.value.trim().toUpperCase();
    const day=spDay.value;
    const afterRaw=spAfter.value; // NOW STRING e.g 6,7,8
    const dur=parseInt(spDur.value);

    if(!name || !afterRaw || !dur){
        alert("Fill all fields");
        return;
    }

    // convert to array
    const afterList = afterRaw
        .split(",")
        .map(x=>parseInt(x.trim()))
        .filter(x=>!isNaN(x));

    SPECIALS.push({name,day,afterList,dur});

    renderSpecials();

    spName.value="";
    spAfter.value="";
    spDur.value="";
}

function renderSpecials(){

    specialList.innerHTML=SPECIALS.map((s,i)=>`
        <div style="background:#1e293b;padding:8px;margin-top:6px;border-radius:8px;color:white">
        ${s.name} (${s.day}) after P: ${s.afterList.join(",")}
        <button class="btn-red" onclick="removeSpecial(${i})">REMOVE</button>
        </div>
    `).join('');
}

function removeSpecial(i){
    SPECIALS.splice(i,1);
    renderSpecials();
}

/* ================= SLOT BUILDER (UPDATED INSERT LOGIC) ================= */

function buildSlots(){

    let slots=[];
    let cur=new Date("2026-01-01T"+startTime.value);

    const total=+totalPeriods.value;
    const dur=+periodDur.value;

    for(let i=1;i<=total;i++){

        let start=cur.toTimeString().slice(0,5);
        cur.setMinutes(cur.getMinutes()+dur);
        let end=cur.toTimeString().slice(0,5);

        slots.push({
            id:"P"+i,
            type:"period",
            label:`P${i}<br>${start}-${end}`
        });

        /* BREAK LOGIC (UNCHANGED) */

        /* SPECIAL BLOCK INSERTION AFTER PERIOD */
        SPECIALS.forEach(sp=>{
            if(sp.afterList.includes(i)){
                slots.push({
                    type:"special",
                    label:sp.name
                });

                cur.setMinutes(cur.getMinutes()+sp.dur);
            }
        });
    }

    return slots;
}

/* ================= GENERATE (UNCHANGED CORE) ================= */

function generate(){

    DATA=[];

    let slots=buildSlots();

    // simple demo allocation (kept lightweight)
    REGISTRY.forEach(r=>{
        DAYS.forEach(d=>{
            slots.forEach(s=>{
                if(s.type==="period"){
                    DATA.push({d, p:s.id, sub:r.sub || "SUBJECT", tea:r.tea || "TEACHER"});
                }
            });
        });
    });

    render();
}

/* ================= RENDER ================= */

function render(){

    let slots=buildSlots();

    let html="<table><tr><th>DAY</th>";

    slots.forEach(s=>html+=`<th>${s.label}</th>`);
    html+="</tr>";

    DAYS.forEach(d=>{
        html+=`<tr><td>${d}</td>`;

        slots.forEach(s=>{

            if(s.type==="special"){
                html+=`<td class="special-cell">${s.label}</td>`;
            }
            else{
                html+=`<td></td>`;
            }

        });

        html+="</tr>";
    });

    html+="</table>";

    app.innerHTML=html;
}

</script>

</body>
</html>
